<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
  <style>
    .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--success); animation:pulse-live 2s ease-in-out infinite; margin-right:5px; }
    @keyframes pulse-live { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .history-section { margin-top:32px; }
    .history-toggle { background:none; border:none; color:var(--tx-2); font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; }
    .history-toggle:hover { color:var(--tx); }
    .order-list-item { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line-2); }
    .order-list-item:last-child { border-bottom:none; }
    @media(max-width:640px){ .kds-board{ display:flex; flex-direction:column; gap:12px; } }
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand"><img src="/logo.png" alt="Avenzo"><span class="admin-brand-name">AVENZO</span></a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Loading...</span>
    <div class="admin-topbar-right"><div id="accountMenu"></div></div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">
      <div id="restCtxBar" class="rest-ctx" style="display:none"></div>
      <div class="admin-subhead">
        <div class="row-between" style="flex-wrap:wrap;gap:10px">
          <div>
            <div class="admin-eyebrow">Live orders</div>
            <h1 class="admin-ph-title" id="restaurantName">Getting orders...</h1>
          </div>
          <div class="row" style="gap:10px">
            <span id="liveIndicator" class="pill pill-success" style="display:none"><span class="live-dot"></span>Live</span>
            <span class="pill pill-default" id="orderCount">0 orders</span>
          </div>
        </div>
        <div class="stat-grid mt-12" id="statusStats"></div>
        <div class="row-between mt-12" style="flex-wrap:wrap;gap:10px">
          <div style="flex:1;min-width:200px" class="field mb-0">
            <input id="orderSearch" class="input" placeholder="Search by code, item..." oninput="setSearch(this.value)">
          </div>
          <div class="tab-bar" id="orderFilters"></div>
        </div>
      </div>
      <div class="kds-board" id="kdsBoard"></div>
      <div class="history-section" id="historySection" hidden>
        <button class="history-toggle" onclick="toggleHistory()">
          <span id="historyArrow">▶</span> Completed &amp; Cancelled
          <span class="pill pill-default" id="historyCount">0</span>
        </button>
        <div id="historyList" hidden></div>
        <div class="row-between mt-12" id="paginationControls"></div>
      </div>
    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>
<script src="/assets/app.js"></script>
<script>
const restaurantId = new URLSearchParams(location.search).get("restaurantId");
const STATUS_META = {
  PENDING:   { pill:"pill-warn",    label:"Pending",    col:"pending" },
  PREPARING: { pill:"pill-brand",   label:"Preparing",  col:"preparing" },
  READY:     { pill:"pill-success", label:"Ready",      col:"ready" },
  COMPLETED: { pill:"pill-success", label:"Completed",  col:"history" },
  CANCELLED: { pill:"pill-danger",  label:"Cancelled",  col:"history" }
};
const TRANSITIONS = { PENDING:["PREPARING","CANCELLED"], PREPARING:["READY","CANCELLED"], READY:["COMPLETED"], COMPLETED:[], CANCELLED:[] };
const ACTION_LABELS = { PREPARING:"Accept — start preparing", READY:"Mark ready for pickup", COMPLETED:"Mark collected", CANCELLED:"Cancel order" };

let allOrders = [];
let historyOrders = [];
let activeStatus = "ALL";
let orderSearch = "";
let ordersLoaded = false;
let isLoading = false;
let pollingTimer = null;
let orderPage = 1;
const orderLimit = 50;
let orderPagination = { page:1, totalPages:1, total:0 };
let historyOpen = false;

async function loadOrders() {
  if (isLoading) return;
  isLoading = true;
  try {
    if (!ordersLoaded) {
      document.getElementById("statusStats").innerHTML = skeletonCards(3);
      document.getElementById("kdsBoard").innerHTML = '<div class="stack">' + skeletonCards(3) + '</div>';
    }
    const params = new URLSearchParams({ page: String(orderPage), limit: String(orderLimit) });
    if (activeStatus !== "ALL") params.set("status", activeStatus);
    const data = await request(`/admin/orders/${restaurantId}?${params.toString()}`);
    allOrders = data.orders || [];
    orderPagination = data.pagination || { page:1, totalPages:1, total: allOrders.length };
    ordersLoaded = true;
    document.getElementById("adminContext").textContent = data.restaurant?.name || "Orders";
    document.getElementById("restaurantName").textContent = data.restaurant?.name || "Restaurant Orders";
    document.getElementById("liveIndicator").style.display = "";
    if (data.restaurant) {
      document.getElementById("restCtxBar").style.display = "";
      renderRestaurantContext(data.restaurant, "orders", restaurantId);
    }
    const total = orderPagination.total || allOrders.length;
    document.getElementById("orderCount").textContent = `${total} order${total === 1 ? "" : "s"}`;
    renderStats(allOrders);
    renderFilters(allOrders);
    renderKDS(allOrders);
    renderHistory(allOrders);
  } catch (err) {
    if (err.status === 423) {
      stopPolling();
      document.getElementById("kdsBoard").innerHTML = `<div class="card card-p"><div class="admin-ph-title">Workspace paused</div><p class="muted mt-8">${escapeHtml(err.message || "Contact the Avenzo team to reactivate.")}</p></div>`;
    } else {
      document.getElementById("kdsBoard").innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Could not load orders</div><div class="empty-state-sub">${escapeHtml(err.message || "")}</div></div>`;
    }
  } finally { isLoading = false; }
}

function renderStats(orders) {
  const counts = orders.reduce((a,o) => { a[o.status] = (a[o.status]||0)+1; return a; }, {});
  document.getElementById("statusStats").innerHTML = ["PENDING","PREPARING","READY"].map(s => `
    <div class="stat-card clickable ${s === "PENDING" ? "stat-top-warn" : s === "PREPARING" ? "stat-top-brand" : "stat-top-ready"}" onclick="setStatus('${s}')">
      <div class="stat-card-label">${STATUS_META[s].label}</div>
      <div class="stat-card-value">${counts[s] || 0}</div>
      <span class="pill ${STATUS_META[s].pill}">${STATUS_META[s].label}</span>
    </div>
  `).join("");
}

function renderFilters(orders) {
  const counts = orders.reduce((a,o) => { a[o.status]=(a[o.status]||0)+1; return a; }, {});
  document.getElementById("orderFilters").innerHTML = `
    <button class="tab-btn ${activeStatus==="ALL"?"active":""}" onclick="setStatus('ALL')">All <span class="pill pill-default">${orders.length}</span></button>
    ${Object.keys(STATUS_META).map(s => `<button class="tab-btn ${activeStatus===s?"active":""}" onclick="setStatus('${s}')">${STATUS_META[s].label} <span class="pill pill-default">${counts[s]||0}</span></button>`).join("")}
  `;
}

function getElapsed(isoDate) {
  if (!isoDate) return null;
  const ms = Date.now() - new Date(isoDate).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}

function timerClass(status, isoDate) {
  if (!isoDate) return "";
  const mins = Math.floor((Date.now() - new Date(isoDate).getTime()) / 60000);
  if (status === "PENDING" && mins >= 10) return "urgent";
  if (status === "PENDING" && mins >= 5) return "warning";
  if (status === "PREPARING" && mins >= 15) return "urgent";
  if (status === "PREPARING" && mins >= 10) return "warning";
  return "";
}

function renderKDS(orders) {
  let filtered = orders.filter(o => ["PENDING","PREPARING","READY"].includes(o.status));
  if (orderSearch) filtered = filtered.filter(o => [o.pickupCode, String(o.orderNumber), ...(o.items||[]).map(i=>i.nameAtOrder)].join(" ").toLowerCase().includes(orderSearch));

  const cols = ["PENDING","PREPARING","READY"];
  document.getElementById("kdsBoard").innerHTML = cols.map(status => {
    const colOrders = filtered.filter(o => o.status === status);
    return `
      <div class="kds-col kds-col-${status.toLowerCase()}">
        <div class="kds-col-head">
          <span class="kds-col-title">${STATUS_META[status].label}</span>
          <span class="kds-col-count">${colOrders.length}</span>
        </div>
        ${colOrders.length ? colOrders.map(order => renderKDSOrder(order)).join("") : `<div style="padding:24px 16px;text-align:center;color:var(--tx-3);font-size:13px">No ${STATUS_META[status].label.toLowerCase()} orders</div>`}
      </div>
    `;
  }).join("");
}

function renderKDSOrder(order) {
  const items = (order.items||[]).map(i => `${escapeHtml(i.nameAtOrder)} ×${i.quantity}`).join(", ");
  const elapsed = getElapsed(order.status === "PREPARING" ? (order.preparingAt || order.createdAt) : order.createdAt);
  const tClass = timerClass(order.status, order.status === "PREPARING" ? (order.preparingAt || order.createdAt) : order.createdAt);
  const nextStatuses = TRANSITIONS[order.status] || [];
  const primaryAction = nextStatuses[0];
  const cancelAction = nextStatuses.find(s => s === "CANCELLED");
  const payBanner = order.paymentStatus === "PAYMENT_CLAIMED" ? `<div class="kds-payment-banner">Customer says paid — verify then confirm<br><button class="btn btn-sm btn-success-soft mt-8" style="width:100%" onclick="confirmPayment(this,'${order.id}')">Confirm payment received</button></div>` :
    order.paymentStatus === "PAYMENT_PENDING" ? `<span class="pill pill-danger" style="font-size:12px">Awaiting payment</span>` : "";
  return `
    <div class="kds-order">
      <div class="kds-order-top">
        <div>
          <div class="kds-code">${escapeHtml(order.pickupCode)}</div>
          <div class="kds-num">Order #${order.orderNumber || order.pickupCode}${order.tableNumber ? ` · Table ${escapeHtml(order.tableNumber)}` : ""}</div>
        </div>
        ${elapsed ? `<span class="kds-timer ${tClass}">⏱ ${elapsed}</span>` : ""}
      </div>
      <div class="kds-items">${escapeHtml(items)}</div>
      ${payBanner}
      <div class="kds-foot">
        <span class="kds-total">${money(order.totalPrice)}</span>
        <span class="pill pill-default" style="font-size:11px">${paymentLabel(order.paymentStatus)}</span>
      </div>
      ${primaryAction && primaryAction !== "CANCELLED" ? `<button class="btn btn-primary kds-action" onclick="updateStatus(this,'${order.id}','${primaryAction}')">${ACTION_LABELS[primaryAction] || primaryAction}</button>` : ""}
      ${cancelAction ? `<button class="btn btn-danger-soft kds-action" style="margin-top:6px" onclick="updateStatus(this,'${order.id}','CANCELLED')">Cancel order</button>` : ""}
    </div>
  `;
}

function renderHistory(orders) {
  const hist = orders.filter(o => ["COMPLETED","CANCELLED"].includes(o.status));
  historyOrders = hist;
  const sec = document.getElementById("historySection");
  document.getElementById("historyCount").textContent = hist.length;
  sec.hidden = hist.length === 0;
  if (historyOpen) renderHistoryList();
}

function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById("historyList").hidden = !historyOpen;
  document.getElementById("historyArrow").textContent = historyOpen ? "▼" : "▶";
  if (historyOpen) renderHistoryList();
}

function renderHistoryList() {
  if (!historyOrders.length) { document.getElementById("historyList").innerHTML = `<div class="muted text-sm mt-8">No history in this view.</div>`; return; }
  document.getElementById("historyList").innerHTML = `<div class="card card-p mt-12">` + historyOrders.map(order => {
    const itemSummary = (order.items || []).map(i => `${escapeHtml(i.nameAtOrder)} ×${i.quantity}`).join(", ");
    return `
    <div class="order-list-item">
      <div>
        <div><span class="font-bold">${escapeHtml(order.pickupCode)}</span><span class="muted text-sm ml-2">#${order.orderNumber || ""} · ${formatDate(order.createdAt)}</span></div>
        ${itemSummary ? `<div class="muted text-sm" style="margin-top:2px">${itemSummary}</div>` : ""}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span class="pill ${STATUS_META[order.status]?.pill || "pill-default"}">${STATUS_META[order.status]?.label || order.status}</span>
        ${order.totalPrice ? `<div class="font-bold text-sm" style="margin-top:4px">${money(order.totalPrice)}</div>` : ""}
      </div>
    </div>
  `}).join("") + `</div>`;
  renderPagination();
}

function renderPagination() {
  const total = orderPagination.totalPages || 1;
  document.getElementById("paginationControls").innerHTML = total > 1 ? `
    <button class="btn btn-ghost" onclick="changePage(-1)" ${orderPage<=1?"disabled":""}>← Previous</button>
    <span class="muted text-sm">Page ${orderPage} of ${total}</span>
    <button class="btn btn-ghost" onclick="changePage(1)" ${orderPage>=total?"disabled":""}>Next →</button>
  ` : "";
}

function setStatus(s) { activeStatus = s; orderPage = 1; loadOrders(); }
function setSearch(v) { orderSearch = v.trim().toLowerCase(); renderKDS(allOrders); }
function changePage(d) { const t = orderPagination.totalPages||1; orderPage = Math.min(Math.max(orderPage+d,1),t); loadOrders(); }
function paymentLabel(v) { return {PAYMENT_NOT_REQUIRED:"Not required",PAYMENT_PENDING:"Awaiting payment",PAYMENT_CLAIMED:"Customer says paid",PAID:"Paid",PAYMENT_FAILED:"Failed",REFUNDED:"Refunded",PARTIALLY_REFUNDED:"Partial refund"}[v]||"—"; }

async function updateStatus(btn, id, status) {
  setLoading(btn, true, STATUS_META[status]?.label || "Updating");
  try {
    await request(`/order/${id}/status`, { method:"PATCH", body:JSON.stringify({status}) });
    toast("Status updated");
  } catch(err) { toast(err.message); }
  finally { setLoading(btn, false); loadOrders(); }
}

async function confirmPayment(btn, id) {
  setLoading(btn, true, "Confirming...");
  try {
    await request(`/admin/order/${id}/confirm-payment`, { method:"POST" });
    toast("Payment confirmed");
  } catch(err) { toast(err.message || "Could not confirm"); }
  finally { setLoading(btn, false); loadOrders(); }
}

function startPolling() {
  if (pollingTimer) return;
  pollingTimer = setInterval(() => { if (!document.hidden) loadOrders(); }, 5000);
}
function stopPolling() { clearInterval(pollingTimer); pollingTimer=null; }

document.addEventListener("visibilitychange", () => { if (!document.hidden && restaurantId) loadOrders(); });
window.addEventListener("pagehide", stopPolling);

initAdminLayout("orders", restaurantId).then(user => {
  if (!user) return;
  loadOrders();
  startPolling();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
