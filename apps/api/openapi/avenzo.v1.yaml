openapi: "3.1.0"
info:
  title: Avenzo API
  description: Restaurant dine-in ordering platform REST API
  version: "1.0.0"
  contact:
    name: Avenzo Engineering
servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://api.avenzo.in
    description: Production
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [System]
      responses:
        "200":
          description: Service is healthy
  /api/v1/customer/auth/login:
    post:
      summary: Customer email login
      operationId: customerLogin
      tags: [Customer Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
  /api/v1/restaurant/auth/login:
    post:
      summary: Restaurant partner login
      operationId: restaurantLogin
      tags: [Restaurant Auth]
      responses:
        "200":
          description: Login successful
  /api/v1/public/restaurants/{slug}:
    get:
      summary: Get public restaurant info
      operationId: getPublicRestaurant
      tags: [Public]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restaurant details
  /api/v1/public/restaurants/{slug}/menu:
    get:
      summary: Get restaurant menu
      operationId: getPublicMenu
      tags: [Public]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Menu items list
  /api/v1/customer/orders:
    post:
      summary: Create order
      operationId: createOrder
      tags: [Orders]
      responses:
        "201":
          description: Order created
    get:
      summary: List customer orders
      operationId: listOrders
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders list
  /api/v1/customer/payments/razorpay/create:
    post:
      summary: Create Razorpay payment order
      operationId: createRazorpayOrder
      tags: [Payments]
      responses:
        "200":
          description: Razorpay order created
  /api/v1/restaurant/orders:
    get:
      summary: List restaurant orders
      operationId: listRestaurantOrders
      tags: [Restaurant Orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: System
  - name: Customer Auth
  - name: Restaurant Auth
  - name: Public
  - name: Orders
  - name: Payments
  - name: Restaurant Orders
