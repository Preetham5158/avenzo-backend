<!DOCTYPE html>
<html>
<head>
  <title>Track Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h2>Order Status</h2>
<p id="status" style="font-size:20px; font-weight:bold;">Loading...</p>

<script>
const API = "https://avenzo.app";
const orderId = window.location.pathname.split("/track/")[1];

async function loadStatus() {
  try {
    const res = await fetch(`${API}/order/${orderId}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("status").innerText = "Order not found";
      return;
    }

    document.getElementById("status").innerText = data.status;

  } catch (err) {
    document.getElementById("status").innerText = "Error loading status";
  }
}

// initial load
loadStatus();

// 🔥 AUTO REFRESH (every 3 sec)
setInterval(loadStatus, 3000);
</script>

</body>
</html>
