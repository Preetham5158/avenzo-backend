<!DOCTYPE html>
<html>

<head>
  <title>Track Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .status-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .step {
      min-height: 8px;
      border-radius: 999px;
      background: #e6e9f0;
    }

    .step.active {
      background: linear-gradient(45deg, var(--brand), var(--brand-2));
    }

    .pickup-code {
      font-size: clamp(44px, 12vw, 72px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
  </style>
</head>

<body>
  <main class="page" style="max-width:720px;">
    <section class="hero-panel stack" style="text-align:center;">
      <div class="brand" style="justify-content:center;">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>
      <div>
        <div class="eyebrow">Order tracking</div>
        <h1 id="restaurantName">Loading...</h1>
        <p class="muted" id="orderNumber">Checking your order status.</p>
      </div>
    </section>

    <section class="card card-pad stack" style="margin-top:16px;">
      <div class="row-between">
        <span class="pill pill-dark" id="statusBadge">Loading</span>
        <span class="muted" id="placedAt"></span>
      </div>

      <div class="status-steps" id="steps">
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
      </div>

      <div style="text-align:center; padding:20px 0;">
        <div class="muted">Pickup code</div>
        <div class="pickup-code" id="pickup">----</div>
        <p class="muted" id="readyText">Updating every few seconds.</p>
      </div>

      <div class="stack" id="items"></div>

      <div class="row-between" style="border-top:1px solid var(--line); padding-top:14px;">
        <strong>Total</strong>
        <strong id="total">₹0</strong>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    const orderId = window.location.pathname.split("/track/")[1];
    const statuses = ["PENDING", "PREPARING", "READY", "COMPLETED"];

    function badgeClass(status) {
      if (status === "READY" || status === "COMPLETED") return "pill-success";
      if (status === "CANCELLED") return "pill-danger";
      return "pill-warning";
    }

    async function loadStatus() {
      try {
        const data = await request(`/order/${orderId}`, { headers: {} });

        const restaurant = await request(`/restaurant/${data.restaurantId}`, { headers: {} });
        document.getElementById("restaurantName").textContent = restaurant.name;
        document.getElementById("orderNumber").textContent = data.orderNumber ? `Order #${data.orderNumber}` : "Order received";
        document.getElementById("pickup").textContent = data.pickupCode;
        document.getElementById("placedAt").textContent = formatDate(data.createdAt);

        const badge = document.getElementById("statusBadge");
        badge.className = `pill ${badgeClass(data.status)}`;
        badge.textContent = data.status;

        const activeIndex = Math.max(0, statuses.indexOf(data.status));
        document.querySelectorAll(".step").forEach((step, index) => {
          step.classList.toggle("active", index <= activeIndex && data.status !== "CANCELLED");
        });

        document.getElementById("readyText").textContent = data.status === "READY"
          ? "Your order is ready to collect."
          : data.status === "COMPLETED"
            ? "Order completed. Thank you."
            : data.status === "CANCELLED"
              ? "This order was cancelled."
              : "We will update this screen as the restaurant prepares your order.";

        let total = 0;
        document.getElementById("items").innerHTML = (data.items || []).map(item => {
          const line = item.priceAtOrder * item.quantity;
          total += line;
          return `
            <div class="row-between">
              <span>${escapeHtml(item.nameAtOrder)} x ${item.quantity}</span>
              <strong>${money(line)}</strong>
            </div>
          `;
        }).join("");
        document.getElementById("total").textContent = money(total);
      } catch (err) {
        document.getElementById("restaurantName").textContent = "Order not found";
        document.getElementById("readyText").textContent = err.message || "Unable to load order.";
      }
    }

    loadStatus();
    setInterval(loadStatus, 3000);
  </script>
</body>

</html>
