<!DOCTYPE html>
<html>

<head>
  <title>Track Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .status-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .step {
      min-height: 8px;
      border-radius: 999px;
      background: #e6e9f0;
    }

    .step.active {
      background: linear-gradient(45deg, var(--brand), var(--brand-2));
    }

    .order-code {
      font-size: clamp(44px, 12vw, 72px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .saved-orders {
      display: grid;
      gap: 10px;
    }

    .saved-order {
      width: 100%;
      text-align: left;
      background: white;
    }
  </style>
</head>

<body>
  <main class="page track-page">
    <section class="hero-panel stack track-hero">
      <div class="brand center-brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>
      <div>
        <div class="eyebrow">Order tracking</div>
        <h1 id="restaurantName">Getting your order...</h1>
        <p class="muted" id="orderNumber">Your food status will appear here.</p>
      </div>
    </section>

    <section class="card card-pad stack mt-16">
      <div class="row-between">
        <span class="pill pill-dark" id="statusBadge">Checking</span>
        <span class="muted" id="placedAt"></span>
      </div>

      <div class="status-steps" id="steps">
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
      </div>

      <div class="track-code-block">
        <div class="muted">Order code</div>
        <div class="order-code" id="orderCode">----</div>
        <p class="muted" id="readyText">This screen updates automatically.</p>
      </div>

      <div class="stack" id="items"></div>

      <div class="row-between top-line">
        <strong>Total</strong>
        <strong id="total">₹0</strong>
      </div>
    </section>

    <section class="card card-pad stack mt-16" id="savedOrdersCard" hidden>
      <div>
        <h3 class="section-title">Recent orders on this device</h3>
        <div class="muted">No login needed. Orders placed from this browser appear here.</div>
      </div>
      <div class="saved-orders" id="savedOrders"></div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    const trackingToken = window.location.pathname.split("/track/")[1] || "";
    const statuses = ["PENDING", "PREPARING", "READY", "COMPLETED"];
    let isLoadingStatus = false;
    let statusPollingTimer = null;

    function badgeClass(status) {
      if (status === "READY" || status === "COMPLETED") return "pill-success";
      if (status === "CANCELLED") return "pill-danger";
      return "pill-warning";
    }

    async function loadStatus() {
      if (!trackingToken) {
        showSavedOrders();
        return;
      }

      if (isLoadingStatus) return;
      isLoadingStatus = true;
      try {
  const data = await request(`/order/${trackingToken}`, { headers: {} });

  document.getElementById("restaurantName").textContent = data.restaurant?.name || "Restaurant";
  document.getElementById("orderNumber").textContent = Number.isInteger(data.orderNumber) ? `Order #${data.orderNumber}` : "Order received";
  document.getElementById("orderCode").textContent = data.pickupCode;
  document.getElementById("placedAt").textContent = formatDate(data.createdAt);
        const badge = document.getElementById("statusBadge");
        badge.className = `pill ${badgeClass(data.status)}`;
        badge.textContent = data.status;

        const activeIndex = Math.max(0, statuses.indexOf(data.status));
        document.querySelectorAll(".step").forEach((step, index) => {
          step.classList.toggle("active", index <= activeIndex && data.status !== "CANCELLED");
        });

        document.getElementById("readyText").textContent = data.status === "READY"
          ? "Your food is ready."
          : data.status === "COMPLETED"
            ? "Done. Enjoy your meal."
            : data.status === "CANCELLED"
              ? "This order was cancelled."
              : "The restaurant is preparing your food.";

        let total = 0;
        document.getElementById("items").innerHTML = (data.items || []).map(item => {
          const line = item.priceAtOrder * item.quantity;
          total += line;
          return `
            <div class="row-between">
              <span>${escapeHtml(item.nameAtOrder)} x ${item.quantity}</span>
              <strong>${money(line)}</strong>
            </div>
          `;
        }).join("");
        document.getElementById("total").textContent = money(total);
      } catch (err) {
        document.getElementById("restaurantName").textContent = "Order not found";
        document.getElementById("readyText").textContent = err.message || "Unable to load order.";
      } finally {
        isLoadingStatus = false;
      }
    }

    function showSavedOrders() {
      let orders = [];
      try {
        orders = JSON.parse(localStorage.getItem("avenzoRecentOrders") || "[]");
      } catch {
        orders = [];
      }

      document.getElementById("restaurantName").textContent = "Find your order";
      document.getElementById("orderNumber").textContent = "Recent orders from this browser are listed below.";
      document.getElementById("statusBadge").textContent = "Recent";
      document.getElementById("orderCode").textContent = "----";
      document.getElementById("readyText").textContent = orders.length ? "Choose an order to continue tracking." : "No recent orders are saved on this device.";
      document.getElementById("items").innerHTML = "";
      document.getElementById("total").textContent = money(0);

      const card = document.getElementById("savedOrdersCard");
      const list = document.getElementById("savedOrders");
      card.hidden = false;
      list.innerHTML = orders.length
        ? orders.map(order => `
          <button class="saved-order card card-pad row-between cursor-pointer" type="button" onclick="location.href='/track/${order.trackingToken}'">
            <span>
              <strong>${order.orderNumber ? `Order #${order.orderNumber}` : "Order"}</strong>
              <span class="muted">Code ${escapeHtml(order.pickupCode || "----")}</span>
            </span>
            <span class="pill">Track</span>
          </button>
        `).join("")
        : `<div class="empty">Place an order from this same browser, or use the restaurant menu's Find order option with your mobile number.</div>`;
    }

    function startStatusPolling() {
      if (statusPollingTimer) return;
      statusPollingTimer = setInterval(() => {
        if (document.hidden) return;
        loadStatus();
      }, 3000);
    }

    function stopStatusPolling() {
      if (!statusPollingTimer) return;
      clearInterval(statusPollingTimer);
      statusPollingTimer = null;
    }

    loadStatus();
    if (trackingToken) startStatusPolling();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      loadStatus();
    });

    window.addEventListener("pagehide", stopStatusPolling);
  </script>
</body>

</html>
