<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Scan Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .qr-grid {
      align-items: stretch;
    }

    .qr-img {
      width: 210px;
      height: 210px;
      border-radius: var(--radius);
      background: white;
      padding: 10px;
      border: 1px solid var(--line);
      display: block;
      margin: 0 auto;
    }

    .qr-card {
      display: grid;
      justify-items: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 16% 10%, rgba(255, 200, 87, 0.22), transparent 35%),
        linear-gradient(165deg, #fffdf9 0%, #fff4e6 55%, #f8fbff 100%);
      border: 1px solid rgba(255, 107, 22, 0.15);
      box-shadow: 0 18px 36px rgba(64, 31, 15, 0.12);
      min-height: 420px;
    }

    .qr-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 42px rgba(255, 107, 22, 0.16);
    }

    .qr-head {
      width: 100%;
      display: grid;
      gap: 4px;
      justify-items: center;
    }

    .qr-subtext {
      max-width: 280px;
    }

    .qr-sticker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(18, 116, 91, 0.24);
      background: rgba(18, 116, 91, 0.09);
      color: #0d5f4a;
      font-size: 12px;
      font-weight: 800;
    }

    .qr-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 7px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    @media (max-width: 760px) {
      .qr-card {
        min-height: 390px;
      }

      .qr-img {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head">
        <div>
          <div class="eyebrow">Dine-in scan cards</div>
          <h1>Restaurant scan cards</h1>
          <p class="muted">Print friendly table cards so guests can order while seated.</p>
        </div>
      </section>

      <section class="grid grid-3 qr-grid" id="container"></section>
    </main>
  </div>
  <nav class="admin-dock">
    <a href="/admin/dashboard.html">Home</a>
    <a class="active" href="#">Cards</a>
  </nav>

  <script src="/assets/app.js"></script>
  <script>
    const selectedRestaurantId = new URLSearchParams(location.search).get("restaurantId");

    async function loadRestaurants() {
      try {
        document.getElementById("container").innerHTML = skeletonCards(6);
        const data = await request("/restaurants");
        let restaurants = data.restaurants || [];
        if (selectedRestaurantId) {
          restaurants = restaurants.filter(r => r.id === selectedRestaurantId);
        }
        restaurants = restaurants.filter(r => r.isActive && !["EXPIRED", "SUSPENDED"].includes(r.subscriptionStatus));

        const container = document.getElementById("container");
        if (!restaurants.length) {
          container.innerHTML = `<div class="empty empty-full">Scan cards will appear here when the restaurant service is active.</div>`;
          return;
        }

        window.__restaurants = restaurants;
        container.innerHTML = restaurants.map(r => {
          const url = `${API}/r/${r.slug}?guest=1`;
          const qr = qrUrl(url, 220);
          return `
            <article class="card card-pad stack qr-card">
              <div class="qr-head">
                <span class="qr-sticker">Scan to order</span>
                <h3>${escapeHtml(r.name)}</h3>
                <div class="muted qr-subtext">${escapeHtml(r.address || r.locality || "Scan and order at the restaurant")}</div>
              </div>
              <img class="qr-img" loading="lazy" decoding="async" src="${qr}" alt="Scan card for ${escapeHtml(r.name)}">
              <button class="btn btn-primary" onclick='downloadCard(${JSON.stringify(r.id)}, ${JSON.stringify(r.name)})'>Download card</button>
            </article>
          `;
        }).join("");
      } catch (err) {
        document.getElementById("container").innerHTML = `<div class="empty empty-full">${escapeHtml(err.message)}</div>`;
      }
    }

    function qrUrl(url, size) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;
    }

    function downloadCard(id, name) {
      const restaurant = (window.__restaurants || []).find(r => r.id === id);
      const url = `${API}/r/${restaurant?.slug || id}?guest=1`;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const qrImage = new Image();
      qrImage.crossOrigin = "anonymous";
      canvas.width = 700;
      canvas.height = 900;

      qrImage.onload = function () {
        const gradient = ctx.createLinearGradient(0, 0, 700, 900);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(1, "#fff1e5");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 700, 900);

        ctx.fillStyle = "#101114";
        ctx.font = "800 46px Arial";
        ctx.textAlign = "center";
        ctx.fillText("AVENZO", 350, 90);

        ctx.font = "700 34px Arial";
        ctx.fillText(name, 350, 155);

        ctx.fillStyle = "#ff6a00";
        ctx.fillRect(70, 185, 560, 12);

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(150, 230, 400, 400);
        ctx.drawImage(qrImage, 175, 255, 350, 350);

        ctx.fillStyle = "#ff6a00";
        ctx.font = "800 32px Arial";
        ctx.fillText("Order from your seat", 350, 700);

        ctx.fillStyle = "#667085";
        ctx.font = "20px Arial";
        ctx.fillText("Scan. Choose. Enjoy it here.", 350, 740);

        const link = document.createElement("a");
        link.download = `${name}-avenzo-qr.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
      };

      qrImage.src = qrUrl(url, 350);
    }

    initPartnerPage().then((user) => {
      if (!user) return;
      loadRestaurants();
    });
  </script>
</body>

</html>
