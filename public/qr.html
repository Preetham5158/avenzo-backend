<!DOCTYPE html>
<html>

<head>
  <title>Avenzo QR Codes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .qr-img {
      width: 210px;
      height: 210px;
      border-radius: var(--radius);
      background: white;
      padding: 10px;
      border: 1px solid var(--line);
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div class="row">
          <button class="btn btn-ghost" onclick="window.location.href='/admin/dashboard.html'">Dashboard</button>
          <button class="btn btn-ghost" onclick="logout()">Logout</button>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="page-head">
        <div>
          <div class="eyebrow">QR ordering</div>
          <h1>Restaurant QR codes</h1>
          <p class="muted">Download polished scan cards for customer self-ordering.</p>
        </div>
      </section>

      <section class="grid grid-3" id="container">Loading QR codes...</section>
    </main>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    requireAuth();

    const selectedRestaurantId = new URLSearchParams(location.search).get("restaurantId");

    async function loadRestaurants() {
      try {
        const data = await request("/restaurants");
        let restaurants = data.restaurants || [];
        if (selectedRestaurantId) {
          restaurants = restaurants.filter(r => r.id === selectedRestaurantId);
        }

        const container = document.getElementById("container");
        if (!restaurants.length) {
          container.innerHTML = `<div class="empty" style="grid-column:1/-1;">No QR codes available for your account.</div>`;
          return;
        }

        container.innerHTML = restaurants.map(r => {
          const url = `${API}/menu.html?restaurantId=${r.id}`;
          const qr = qrUrl(url, 220);
          return `
            <article class="card card-pad stack" style="align-items:center; text-align:center;">
              <div>
                <h3>${escapeHtml(r.name)}</h3>
                <div class="muted">${escapeHtml(url)}</div>
              </div>
              <img class="qr-img" src="${qr}" alt="QR code for ${escapeHtml(r.name)}">
              <button class="btn btn-primary" onclick='downloadCard(${JSON.stringify(r.id)}, ${JSON.stringify(r.name)})'>Download card</button>
            </article>
          `;
        }).join("");
      } catch (err) {
        document.getElementById("container").innerHTML = `<div class="empty" style="grid-column:1/-1;">${escapeHtml(err.message)}</div>`;
      }
    }

    function qrUrl(url, size) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;
    }

    function downloadCard(id, name) {
      const url = `${API}/menu.html?restaurantId=${id}`;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const qrImage = new Image();
      qrImage.crossOrigin = "anonymous";
      canvas.width = 700;
      canvas.height = 900;

      qrImage.onload = function () {
        const gradient = ctx.createLinearGradient(0, 0, 700, 900);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(1, "#fff1e5");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 700, 900);

        ctx.fillStyle = "#101114";
        ctx.font = "800 46px Arial";
        ctx.textAlign = "center";
        ctx.fillText("AVENZO", 350, 90);

        ctx.font = "700 34px Arial";
        ctx.fillText(name, 350, 155);

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(150, 230, 400, 400);
        ctx.drawImage(qrImage, 175, 255, 350, 350);

        ctx.fillStyle = "#ff6a00";
        ctx.font = "800 28px Arial";
        ctx.fillText("Scan to order", 350, 700);

        ctx.fillStyle = "#667085";
        ctx.font = "20px Arial";
        ctx.fillText("Browse the menu and place your order instantly", 350, 740);

        const link = document.createElement("a");
        link.download = `${name}-avenzo-qr.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
      };

      qrImage.src = qrUrl(url, 350);
    }

    loadRestaurants();
  </script>
</body>

</html>
