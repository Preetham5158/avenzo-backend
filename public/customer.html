<!DOCTYPE html>
<html lang="en">
<head>
  <title>Avenzo — Home</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>try{if(localStorage.getItem('avenzo-theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0C0B0F;--bg-2:#151318;--bg-3:#1E1C24;--bg-4:#272530;--tx:#F2E8D4;--tx-2:#C8BA9C;--tx-3:#9A8C7A;--brand:#E8401C;--brand-d:#C43318;--brand-soft:rgba(232,64,28,0.12);--success:#27C96B;--warn:#E8A53A;--line:rgba(255,255,255,0.07);--glass:rgba(9,8,10,0.88);--r:16px;--r-sm:10px;--nav-h:60px;--bn-h:64px}
    html.light{--bg:#FAFAF8;--bg-2:#F2EEE5;--bg-3:#EAE4D9;--bg-4:#DDD6C8;--tx:#1A1008;--tx-2:#5C4F3C;--tx-3:#9A8B7A;--line:rgba(0,0,0,0.08);--glass:rgba(250,250,248,0.92)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);padding-bottom:var(--bn-h);min-height:100dvh}
    a{color:inherit;text-decoration:none}button,input,select{font:inherit;border:0;outline:none;background:none;color:inherit;cursor:pointer}

    .toast{position:fixed;left:50%;bottom:calc(var(--bn-h)+14px);z-index:999;transform:translateX(-50%) translateY(10px);background:var(--bg-4);color:var(--tx);padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── NAV ── */
    .c-nav{position:sticky;top:0;z-index:50;height:var(--nav-h);background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--line)}
    .c-nav-in{height:100%;max-width:1160px;margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:12px}
    .c-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}.c-logo img{width:26px;height:26px;border-radius:7px}.c-logo span{font-size:16px;font-weight:800;letter-spacing:1.6px}
    .c-dlinks{display:none;align-items:center;gap:2px;margin-left:8px}.c-dlinks a{padding:7px 13px;border-radius:8px;font-size:14px;font-weight:600;color:var(--tx-2);transition:color .12s,background .12s}.c-dlinks a:hover{color:var(--tx);background:var(--bg-3)}.c-dlinks a.on{color:var(--tx)}
    .c-sp{flex:1}
    .c-um{position:relative}.c-ub{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 8px;background:var(--bg-3);border:1px solid var(--line);border-radius:99px;cursor:pointer;transition:border-color .12s}.c-ub:hover{border-color:rgba(255,255,255,.16)}.c-uav{width:28px;height:28px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}.c-unm{font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.c-uca{color:var(--tx-3)}
    .c-udd{display:none;position:absolute;right:0;top:calc(100% + 8px);min-width:186px;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 16px 50px rgba(0,0,0,.55);overflow:hidden;z-index:80}.c-udd.open{display:block}
    .c-uinfo{padding:12px 14px;border-bottom:1px solid var(--line)}.c-uinfo strong{display:block;font-size:13px;margin-bottom:2px}.c-uinfo small{font-size:12px;color:var(--tx-3)}
    .c-ui{display:block;width:100%;padding:11px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--tx-2);cursor:pointer;transition:background .1s,color .1s}.c-ui:hover{background:var(--bg-4);color:var(--tx)}.c-ui.red{color:var(--brand)}

    /* ── HERO ── */
    .c-wrap{max-width:1160px;margin:0 auto;padding:0 22px}
    .c-hero{padding:28px 0 20px;background:radial-gradient(ellipse 70% 80% at 80% 110%,rgba(232,64,28,.07) 0%,transparent 55%),radial-gradient(ellipse 45% 55% at 15% 110%,rgba(232,64,28,.04) 0%,transparent 50%),var(--bg)}
    .c-greet{font-size:clamp(24px,4vw,42px);font-weight:800;line-height:1.1}
    .c-greet-sub{font-size:14px;color:var(--tx-3);margin-top:4px;margin-bottom:6px}
    /* mobile stats line — hidden desktop */
    .c-m-stats{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .c-m-stat{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--tx-3)}
    .c-m-stat strong{color:var(--tx-2);font-weight:700}
    .c-tier-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
    .c-tb-new{background:rgba(154,140,122,.18);color:var(--tx-3)}.c-tb-exp{background:rgba(39,201,107,.15);color:var(--success)}.c-tb-reg{background:rgba(232,165,58,.18);color:var(--warn)}.c-tb-val{background:rgba(232,64,28,.18);color:var(--brand)}
    .c-sbar{display:flex;align-items:center;gap:12px;height:52px;max-width:620px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:14px;padding:0 18px;transition:border-color .15s,box-shadow .15s}
    .c-sbar:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
    .c-sbar svg{color:var(--tx-3);flex-shrink:0}.c-sbar input{flex:1;font-size:15px;color:var(--tx);background:transparent}.c-sbar input::placeholder{color:var(--tx-3)}
    .c-sbar-x{color:var(--tx-3);padding:4px;border-radius:50%;transition:color .12s;display:none;line-height:0;align-items:center}.c-sbar-x:hover{color:var(--tx)}.c-sbar.hv .c-sbar-x{display:flex}

    /* ── STICKY CHIPS ── */
    .c-chips-bar{position:sticky;top:var(--nav-h);z-index:40;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 0}
    .c-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}.c-chips::-webkit-scrollbar{display:none}
    .c-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-weight:600;color:var(--tx-2);white-space:nowrap;cursor:pointer;transition:all .15s}
    .c-chip:hover{border-color:rgba(255,255,255,.18);color:var(--tx)}.c-chip.on{background:var(--brand-soft);border-color:rgba(232,64,28,.5);color:var(--brand)}

    /* ── BODY SECTIONS ── */
    .c-body{padding:24px 0 52px}
    .c-sec{margin-bottom:32px}
    .c-sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
    .c-sec-title{font-size:17px;font-weight:800}
    .c-sec-lnk{font-size:13px;font-weight:600;color:var(--tx-3);transition:color .12s}.c-sec-lnk:hover{color:var(--tx-2)}
    .c-skel{background:linear-gradient(90deg,var(--bg-3) 25%,var(--bg-4) 50%,var(--bg-3) 75%);background-size:200% 100%;border-radius:var(--r);animation:sk 1.5s linear infinite}
    @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── LIVE ORDER CARD (prominent, with step tracker) ── */
    .c-live{background:var(--bg-2);border:1.5px solid rgba(232,165,58,.4);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;display:block;transition:border-color .15s}
    .c-live:hover{border-color:rgba(232,165,58,.65)}
    .c-live-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
    .c-live-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--warn);margin-right:7px;animation:lp 1.8s ease-in-out infinite;vertical-align:middle}
    @keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    .c-live-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--warn)}
    .c-live-name{font-size:16px;font-weight:800;margin-top:3px;line-height:1.2}
    .c-live-meta{font-size:12px;color:var(--tx-3);margin-top:3px}
    .c-live-arr{color:var(--tx-3);flex-shrink:0;margin-top:2px}
    /* step tracker */
    .c-steps{display:flex;align-items:flex-start;padding-top:14px;border-top:1px solid var(--line)}
    .c-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
    .c-step-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg-4);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;transition:all .25s;flex-shrink:0}
    .c-step.done .c-step-dot{border-color:var(--success);background:var(--success);color:#fff}
    .c-step.now .c-step-dot{border-color:var(--warn);background:var(--warn);color:#fff;box-shadow:0 0 0 4px rgba(232,165,58,.2)}
    .c-step-lbl{font-size:10px;font-weight:600;color:var(--tx-3);text-align:center;line-height:1.2}
    .c-step.done .c-step-lbl,.c-step.now .c-step-lbl{color:var(--tx-2)}
    .c-step-ln{position:absolute;top:10px;left:calc(50% + 11px);right:calc(-50% + 11px);height:2px;background:var(--bg-4)}
    .c-step.done .c-step-ln{background:var(--success)}
    .c-live-actions{display:flex;gap:8px;margin-top:14px}
    .c-live-btn{flex:1;padding:9px 0;border-radius:9px;font-size:13px;font-weight:700;text-align:center;transition:all .15s}
    .c-live-btn-p{background:var(--brand);color:#fff}.c-live-btn-p:hover{background:var(--brand-d)}
    .c-live-btn-g{background:var(--bg-3);color:var(--tx-2);border:1px solid var(--line)}.c-live-btn-g:hover{color:var(--tx)}

    /* ── CONTEXTUAL PROMPT CARD ── */
    .c-prompt{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px;cursor:pointer;transition:border-color .15s}
    .c-prompt:hover{border-color:rgba(255,255,255,.12)}
    .c-prompt-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .c-prompt-icon.star{background:rgba(232,165,58,.15)}.c-prompt-icon.phone{background:var(--brand-soft)}
    .c-prompt-body{flex:1;min-width:0}
    .c-prompt-title{font-size:13px;font-weight:700}
    .c-prompt-sub{font-size:12px;color:var(--tx-3);margin-top:2px}
    .c-prompt-cta{font-size:12px;font-weight:700;color:var(--brand);flex-shrink:0;white-space:nowrap}

    /* ── ORDER AGAIN CTA CARD ── */
    .c-reorder{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;align-items:stretch;margin-bottom:8px;transition:border-color .15s}
    .c-reorder:hover{border-color:rgba(255,255,255,.12)}
    .c-reorder-ban{width:76px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px}
    .c-reorder-body{flex:1;padding:13px 14px}
    .c-reorder-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--tx-3);margin-bottom:3px}
    .c-reorder-name{font-size:15px;font-weight:800;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-reorder-sub{font-size:12px;color:var(--tx-3);margin-top:2px}
    .c-reorder-arr{display:flex;align-items:center;justify-content:center;padding:0 16px;color:var(--brand);font-size:13px;font-weight:700;flex-shrink:0;gap:4px}

    /* ── YOUR SPOTS ── */
    .c-spots{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}.c-spots::-webkit-scrollbar{display:none}
    .c-spot{flex:0 0 120px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:transform .15s,border-color .15s}
    .c-spot:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.12)}
    .c-spot-ban{height:68px;display:flex;align-items:center;justify-content:center;font-size:26px}
    .c-spot-bd{padding:7px 9px 10px}
    .c-spot-nm{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-spot-lc{font-size:10px;color:var(--tx-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-spot-ct{font-size:11px;font-weight:600;color:var(--brand);margin-top:4px}

    /* ── FEATURE / TONIGHT'S PICK ── */
    .c-feat{position:relative;border-radius:var(--r);overflow:hidden;height:230px;background:var(--bg-3);display:flex;align-items:flex-end}
    .c-feat-media{position:absolute;inset:0}
    .c-feat-media img{width:100%;height:100%;object-fit:cover;display:block}
    .c-fslides{position:absolute;inset:0}.c-fslide{position:absolute;inset:0;opacity:0;transition:opacity .8s}.c-fslide.on{opacity:1}.c-fslide img{width:100%;height:100%;object-fit:cover;display:block}
    .c-feat-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(9,8,15,.95) 0%,rgba(9,8,15,.55) 45%,rgba(9,8,15,.08) 100%)}
    .c-feat-body{position:relative;z-index:1;padding:20px 22px 24px;width:100%}
    .c-feat-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(232,64,28,.85);border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;margin-bottom:9px}
    .c-feat-name{font-size:clamp(19px,4vw,28px);font-weight:800;line-height:1.1;color:#fff;margin-bottom:5px}
    .c-feat-meta{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .c-feat-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border-radius:99px;background:#fff;color:#0C0B0F;font-size:13px;font-weight:700;transition:opacity .15s}.c-feat-btn:hover{opacity:.9}

    /* ── DISCOVERY ROWS ── */
    .c-drow{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}.c-drow::-webkit-scrollbar{display:none}
    .c-dcard{flex:0 0 164px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,border-color .15s}
    .c-dcard:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.12)}
    .c-dcard-ban{height:100px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:34px}
    .c-dcard-ban .c-slides{position:absolute;inset:0}.c-dcard-ban .c-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s}.c-dcard-ban .c-slide.on{opacity:1}.c-dcard-ban .c-slide img{width:100%;height:100%;object-fit:cover;display:block}
    .c-dcard-bd{padding:9px 11px 11px;flex:1;display:flex;flex-direction:column;gap:3px}
    .c-dcard-nm{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-dcard-lc{font-size:11px;color:var(--tx-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-dcard-ft{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:7px}
    .c-dcard-st{font-size:11px;font-weight:600;color:var(--tx-2);display:flex;align-items:center;gap:2px}
    .c-si{color:#E8A53A}

    /* ── MAIN GRID ── */
    .c-sort-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .c-res-ct{font-size:14px;font-weight:700;color:var(--tx-2)}
    .c-sort-wr{position:relative;display:flex;align-items:center;gap:6px}
    .c-sort-lb{font-size:12px;color:var(--tx-3);font-weight:600}
    .c-sort-sl{padding:6px 26px 6px 12px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-weight:600;color:var(--tx-2);-webkit-appearance:none;appearance:none;transition:border-color .15s}.c-sort-sl:hover{border-color:rgba(255,255,255,.18)}
    .c-sort-ca{position:absolute;right:10px;pointer-events:none;color:var(--tx-3)}
    .c-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .c-rcard{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,border-color .18s,box-shadow .18s}
    .c-rcard:hover:not(.c-rcard--p){transform:translateY(-3px);border-color:rgba(255,255,255,.13);box-shadow:0 12px 40px rgba(0,0,0,.44)}
    .c-rcard-ban{height:118px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:42px}
    .c-rcard--p .c-rcard-ban{filter:saturate(.15) brightness(.65)}
    .c-rcard-ban .c-slides{position:absolute;inset:0}.c-rcard-ban .c-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s}.c-rcard-ban .c-slide.on{opacity:1}.c-rcard-ban .c-slide img{width:100%;height:100%;object-fit:cover;display:block}
    .c-rcard-pov{position:absolute;inset:0;background:rgba(9,8,10,.52);display:flex;align-items:center;justify-content:center}
    .c-rcard-pov span{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(0,0,0,.55);color:rgba(255,255,255,.75);padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.09)}
    .c-rbg{position:absolute;top:7px;left:7px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:3px 8px;border-radius:99px;z-index:2}
    .c-rbg-n{background:rgba(39,201,107,.85);color:#fff}.c-rbg-t{background:rgba(232,64,28,.85);color:#fff}
    .c-rcard-bd{padding:11px 13px 13px;flex:1;display:flex;flex-direction:column;gap:4px}
    .c-rcard-nm{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-rcard-lc{font-size:12px;color:var(--tx-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-rcard-ft{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px}
    .c-rcard-st{font-size:12px;font-weight:600;color:var(--tx-2);display:flex;align-items:center;gap:3px}
    .c-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
    .c-po{background:rgba(39,201,107,.14);color:var(--success)}.c-pp{background:rgba(232,165,58,.14);color:var(--warn)}
    .c-empty{grid-column:1/-1;padding:44px 20px;text-align:center;color:var(--tx-3)}.c-empty-i{font-size:44px;margin-bottom:12px}.c-empty p{font-size:14px;color:var(--tx-2);margin:6px 0 16px}
    .c-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
    .c-btn-g{background:var(--bg-4);color:var(--tx-2);border:1px solid var(--line)}.c-btn-g:hover{color:var(--tx);border-color:rgba(255,255,255,.15)}

    /* ── BOTTOM NAV ── */
    .c-bnav{position:fixed;bottom:0;left:0;right:0;z-index:60;height:var(--bn-h);background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
    .c-bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--tx-3);font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .15s}.c-bnav a svg{transition:stroke .15s}.c-bnav a.on{color:var(--brand)}.c-bnav a.on svg{stroke:var(--brand)}
    .c-theme{position:fixed;right:20px;bottom:calc(var(--bn-h)+14px);z-index:55;display:flex;align-items:center;gap:7px;background:var(--bg-3);border:1px solid var(--line);border-radius:99px;padding:8px 14px 8px 10px;font-size:13px;font-weight:600;color:var(--tx-2);cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.35);transition:color .15s,border-color .15s}.c-theme:hover{color:var(--tx);border-color:rgba(255,255,255,.18)}
    html.light .c-theme .t-sun{display:none}html:not(.light) .c-theme .t-moon{display:none}html.light .c-theme .t-dark{display:none}html:not(.light) .c-theme .t-light{display:none}

    /* ── RESPONSIVE ── */
    @media(min-width:901px){
      :root{--bn-h:0px}body{padding-bottom:0}.c-bnav{display:none}.c-dlinks{display:flex}.c-theme{bottom:20px}

  </style>

<script src="/assets/app.js"></script>
<script>
if (!sessionStorage.getItem("token")) location.href = "/customer-login.html";

const BANNERS = [
  {grad:"linear-gradient(135deg,#2E1510,#1A0C08)",emoji:"🍖"},
  {grad:"linear-gradient(135deg,#0D2018,#081410)",emoji:"🌿"},
  {grad:"linear-gradient(135deg,#0E1832,#09102A)",emoji:"🍱"},
  {grad:"linear-gradient(135deg,#261F08,#181404)",emoji:"🌾"},
  {grad:"linear-gradient(135deg,#1E0D26,#130919)",emoji:"🍜"},
  {grad:"linear-gradient(135deg,#081E28,#051318)",emoji:"🐟"}
];
const EMOJIS = {PURE_VEG:"🌿", BOTH:"🍱", NON_VEG:"🍖"};
function hash(s){return[...s].reduce((a,c)=>(a*31+c.charCodeAt(0))&0xffff,0)}

let allRests=[], activeChip="", openOnly=false, searchQ="", liveTimer=null, currentUser=null;

(async()=>{
  try {
    const [u, rd, od] = await Promise.all([
      request("/auth/me"),
      request("/customer/restaurants"),
      request("/customer/orders?limit=50").catch(()=>({orders:[]}))
    ]);
    if (u.role !== "USER") { location.href = "/admin/dashboard.html"; return; }
    currentUser = u;
    document.getElementById("uAv").textContent = (u.name||u.email||"U")[0].toUpperCase();
    document.getElementById("uNm").textContent = u.name ? u.name.split(" ")[0] : u.email.split("@")[0];
    document.getElementById("uFull").textContent = u.name || u.email || "—";
    document.getElementById("uEmail").textContent = u.email || "";
    setGreeting(u.name);
    allRests = rd.restaurants || [];
    const orders = od.orders || [];
    hydrateStats(orders);
    renderLive(orders);
    renderPrompt(orders, u);
    renderReorder(orders);
    renderSpots(orders);
    renderFeat();
    renderOpenRow();
    renderNewRow();
    renderGrid();
    startCycle();
  } catch { location.href = "/customer-login.html"; }
})();

/* ── GREETING ── */
function setGreeting(name) {
  const h = new Date().getHours();
  const t = h < 12 ? "morning" : h < 17 ? "afternoon" : "evening";
  const f = name ? name.split(" ")[0] : null;
  document.getElementById("greeting").textContent = f ? `Good ${t}, ${f}` : `Good ${t}`;
  const subs = h < 12 ? "Start your day with a great meal"
    : h < 15 ? "Looking for a lunch spot?"
    : h < 20 ? "Where are we eating tonight?"
    : "Late night? We've still got you";
  document.getElementById("greetSub").textContent = subs;
}

/* ── MOBILE STATS LINE ── */
function hydrateStats(orders) {
  const n = orders.length;
  const tier = n >= 15 ? {name:"Valued member",cls:"c-tb-val"}
    : n >= 5  ? {name:"Regular",cls:"c-tb-reg"}
    : n >= 1  ? {name:"Explorer",cls:"c-tb-exp"}
    : {name:"New member",cls:"c-tb-new"};
  document.getElementById("mOrderCt").textContent = n;
  const tb = document.getElementById("mTier");
  tb.textContent = tier.name;
  tb.className = `c-tier-badge ${tier.cls}`;
  document.getElementById("mStats").style.display = "flex";
}

/* ── LIVE ORDER with step progress ── */
function renderLive(orders) {
  const o = orders.find(x => ["PENDING","PREPARING","READY"].includes(x.status));
  const el = document.getElementById("liveMount");
  if (!o) { el.innerHTML = ""; stopLiveRefresh(); return; }

  const STEPS = [
    {key:"PENDING",  label:"Received"},
    {key:"PREPARING",label:"Preparing"},
    {key:"READY",    label:"Ready!"}
  ];
  const cur = STEPS.findIndex(s => s.key === o.status);
  const stepsHtml = STEPS.map((s, i) => {
    const cls = i < cur ? "done" : i === cur ? "now" : "";
    const dot = i < cur ? "✓" : i === cur ? "●" : "";
    const line = i < STEPS.length - 1 ? `<div class="c-step-ln"></div>` : "";
    return `<div class="c-step ${cls}">${line}<div class="c-step-dot">${dot}</div><div class="c-step-lbl">${s.label}</div></div>`;
  }).join("");

  const itemCount = (o.items||[]).reduce((s,i) => s + i.quantity, 0);
  const menuHref = o.restaurant?.slug ? `/r/${encodeURIComponent(o.restaurant.slug)}` : "/customer-restaurants.html";

  el.innerHTML = `
    <div class="c-live" style="margin-bottom:16px">
      <div class="c-live-top">
        <div>
          <div class="c-live-lbl"><span class="c-live-dot"></span>Order in progress</div>
          <div class="c-live-name">${escapeHtml(o.restaurant?.name||"Restaurant")}</div>
          <div class="c-live-meta">${itemCount} item${itemCount!==1?"s":""}${o.tableNumber?` · Table ${escapeHtml(o.tableNumber)}`:""} · Code: ${escapeHtml(o.pickupCode)}</div>
        </div>
        <svg class="c-live-arr" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="c-steps">${stepsHtml}</div>
      <div class="c-live-actions">
        <a class="c-live-btn c-live-btn-p" href="/track/${o.trackingToken}">Track order</a>
        <a class="c-live-btn c-live-btn-g" href="${menuHref}">Add more items</a>
      </div>
    </div>`;

  startLiveRefresh();
}

function startLiveRefresh() {
  if (liveTimer) return;
  liveTimer = setInterval(async () => {
    try {
      const d = await request("/customer/orders?limit=10");
      const orders = d.orders || [];
      renderLive(orders);
      renderPrompt(orders, currentUser);
    } catch {}
  }, 30000);
}
function stopLiveRefresh() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
}

/* ── CONTEXTUAL PROMPT ── */
function renderPrompt(orders, u) {
  const el = document.getElementById("promptMount");
  // Rate most recent completed unrated order
  const unrated = orders.find(o => o.status === "COMPLETED" && !o.rating);
  if (unrated) {
    el.innerHTML = `
      <div class="c-prompt" onclick="location.href='/customer-orders.html'">
        <div class="c-prompt-icon star">⭐</div>
        <div class="c-prompt-body">
          <div class="c-prompt-title">How was ${escapeHtml(unrated.restaurant?.name||"your last visit")}?</div>
          <div class="c-prompt-sub">Leave a quick rating — it only takes a second</div>
        </div>
        <span class="c-prompt-cta">Rate →</span>
      </div>`;
    return;
  }
  // Nudge to add phone if missing
  if (u && !u.phone) {
    el.innerHTML = `
      <div class="c-prompt" onclick="location.href='/customer-profile.html'">
        <div class="c-prompt-icon phone">📱</div>
        <div class="c-prompt-body">
          <div class="c-prompt-title">Add your phone number</div>
          <div class="c-prompt-sub">Skip the phone step every time you order at a table</div>
        </div>
        <span class="c-prompt-cta">Add →</span>
      </div>`;
    return;
  }
  el.innerHTML = "";
}

/* ── ORDER AGAIN CTA ── */
function renderReorder(orders) {
  const hasActive = orders.some(o => ["PENDING","PREPARING","READY"].includes(o.status));
  if (hasActive) { document.getElementById("reorderSec").style.display = "none"; return; }
  const last = orders.find(o => o.status === "COMPLETED" && o.restaurant?.slug);
  if (!last) { document.getElementById("reorderSec").style.display = "none"; return; }
  document.getElementById("reorderSec").style.display = "";
  const r = allRests.find(x => x.slug === last.restaurant.slug) || last.restaurant;
  const b = BANNERS[hash(last.restaurant.name||"") % BANNERS.length];
  const open = r.serviceAvailable !== false;
  document.getElementById("reorderMount").innerHTML = `
    <a class="c-reorder" href="${open?`/r/${encodeURIComponent(last.restaurant.slug)}`:"javascript:void(0)"}">
      <div class="c-reorder-ban" style="background:${b.grad}">${EMOJIS[r.foodType]||b.emoji}</div>
      <div class="c-reorder-body">
        <div class="c-reorder-lbl">Order again</div>
        <div class="c-reorder-name">${escapeHtml(last.restaurant.name)}</div>
        <div class="c-reorder-sub">${open?"Open now · Tap to visit menu":"Currently paused"}</div>
      </div>
      ${open?`<div class="c-reorder-arr">Go <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>`:""}
    </a>`;
}

/* ── YOUR SPOTS ── */
function renderSpots(orders) {
  const rm = new Map(allRests.map(r => [r.slug, r]));
  const seen = new Set(), spots = [];
  for (const o of orders) {
    const s = o.restaurant?.slug;
    if (s && !seen.has(s)) { seen.add(s); const r = rm.get(s); if (r) spots.push(r); }
    if (spots.length >= 5) break;
  }
  if (!spots.length) { document.getElementById("spotsSec").style.display = "none"; return; }
  document.getElementById("spotsSec").style.display = "";
  document.getElementById("spotsRow").innerHTML = spots.map(r => {
    const open = r.serviceAvailable !== false, b = BANNERS[hash(r.name) % BANNERS.length];
    return `<a class="c-spot" href="${open?`/r/${encodeURIComponent(r.slug)}`:"javascript:void(0)"}">
      <div class="c-spot-ban" style="background:${b.grad}">${EMOJIS[r.foodType]||b.emoji}</div>
      <div class="c-spot-bd">
        <div class="c-spot-nm">${escapeHtml(r.name)}</div>
        <div class="c-spot-lc">${escapeHtml(r.locality||r.address||"")}</div>
        <div class="c-spot-ct">${open?"Visit again →":"Paused"}</div>
      </div>
    </a>`;
  }).join("");
}

/* ── TONIGHT'S PICK ── */
function renderFeat() {
  const open = allRests.filter(r => r.serviceAvailable !== false);
  const pick = open.filter(r => r.avgRating && r.ratingCount >= 3).sort((a,b) => (b.avgRating||0)-(a.avgRating||0))[0] || open[0];
  if (!pick) { document.getElementById("featMount").innerHTML = ""; return; }
  const b = BANNERS[hash(pick.name) % BANNERS.length], imgs = pick.previewImages || [];
  const media = imgs.length
    ? `<div class="c-fslides">${imgs.map((u,i) => `<div class="c-fslide${i===0?" on":""}"><img src="${escapeHtml(u)}" alt="" loading="lazy"></div>`).join("")}</div>`
    : `<div style="position:absolute;inset:0;background:${b.grad}"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.18">${EMOJIS[pick.foodType]||b.emoji}</div>`;
  document.getElementById("featMount").innerHTML = `
    <a class="c-feat" href="/r/${encodeURIComponent(pick.slug)}">
      <div class="c-feat-media">${media}</div>
      <div class="c-feat-grad"></div>
      <div class="c-feat-body">
        <div class="c-feat-badge">★ Tonight's pick</div>
        <div class="c-feat-name">${escapeHtml(pick.name)}</div>
        <div class="c-feat-meta">
          <span>${escapeHtml(pick.locality||pick.address||"")}</span>
          ${pick.avgRating?`<span>·</span><span>${pick.avgRating} ★ (${pick.ratingCount})</span>`:""}
        </div>
        <span class="c-feat-btn">Book a table →</span>
      </div>
    </a>`;
}

/* ── DISCOVERY ROWS ── */
function dBan(r) {
  const b = BANNERS[hash(r.name) % BANNERS.length], imgs = r.previewImages || [];
  if (imgs.length) {
    const sl = imgs.map((u,i) => `<div class="c-slide${i===0?" on":""}"><img src="${escapeHtml(u)}" alt="" loading="lazy"></div>`).join("");
    return `<div class="c-dcard-ban" style="background:${b.grad}"><div class="c-slides">${sl}</div></div>`;
  }
  return `<div class="c-dcard-ban" style="background:${b.grad}">${EMOJIS[r.foodType]||b.emoji}</div>`;
}
function dCard(r) {
  const open = r.serviceAvailable !== false, href = open ? `/r/${encodeURIComponent(r.slug)}` : "javascript:void(0)";
  const st = r.avgRating ? `<span class="c-si">★</span>${r.avgRating}` : `<span style="color:var(--tx-3)">New</span>`;
  return `<a class="c-dcard" href="${href}">${dBan(r)}<div class="c-dcard-bd"><div class="c-dcard-nm">${escapeHtml(r.name)}</div><div class="c-dcard-lc">${escapeHtml(r.locality||r.address||"")}</div><div class="c-dcard-ft"><div class="c-dcard-st">${st}</div><span class="c-pill ${open?"c-po":"c-pp"}">${open?"Open":"Paused"}</span></div></div></a>`;
}
function renderOpenRow() {
  const open = allRests.filter(r => r.serviceAvailable !== false).slice(0, 8);
  document.getElementById("openRow").innerHTML = open.length ? open.map(dCard).join("") : `<p style="color:var(--tx-3);font-size:13px;padding:10px 0">No restaurants open right now.</p>`;
}
function renderNewRow() {
  const n = allRests.filter(r => r.ratingCount < 4).slice(0, 8);
  if (!n.length) { document.getElementById("newSec").style.display = "none"; return; }
  document.getElementById("newSec").style.display = "";
  document.getElementById("newRow").innerHTML = n.map(dCard).join("");
}

/* ── MAIN GRID ── */
function gBan(r, badge, open) {
  const b = BANNERS[hash(r.name) % BANNERS.length], pov = open ? "" : `<div class="c-rcard-pov"><span>Paused</span></div>`, imgs = r.previewImages || [];
  if (imgs.length) {
    const sl = imgs.map((u,i) => `<div class="c-slide${i===0?" on":""}"><img src="${escapeHtml(u)}" alt="" loading="lazy"></div>`).join("");
    return `<div class="c-rcard-ban" style="background:${b.grad}">${badge}<div class="c-slides">${sl}</div>${pov}</div>`;
  }
  return `<div class="c-rcard-ban" style="background:${b.grad}">${badge}${EMOJIS[r.foodType]||b.emoji}${pov}</div>`;
}
function renderGrid() {
  let list = [...allRests];
  if (searchQ) list = list.filter(r => [r.name,r.locality,r.address].join(" ").toLowerCase().includes(searchQ));
  if (openOnly) list = list.filter(r => r.serviceAvailable !== false);
  else if (activeChip) list = list.filter(r => r.foodType === activeChip);
  const by = document.getElementById("sortSel")?.value || "open";
  if (by === "open") list.sort((a,b) => (b.serviceAvailable?1:0) - (a.serviceAvailable?1:0));
  else if (by === "rating") list.sort((a,b) => (b.avgRating||0) - (a.avgRating||0));
  else list.sort((a,b) => a.name.localeCompare(b.name));
  const n = list.length;
  document.getElementById("gridCt").innerHTML = n ? `<strong>${n}</strong> restaurant${n!==1?"s":""}` : "No results";
  const g = document.getElementById("restGrid");
  if (!n) { g.innerHTML = `<div class="c-empty"><div class="c-empty-i">🔍</div><p>No restaurants match this filter.</p><button class="c-btn c-btn-g" onclick="clearFilters()">Clear filters</button></div>`; return; }
  g.innerHTML = list.map(r => {
    const open = r.serviceAvailable !== false;
    const badge = r.avgRating>=4&&r.ratingCount>=5 ? `<div class="c-rbg c-rbg-t">Top rated</div>` : r.ratingCount<4 ? `<div class="c-rbg c-rbg-n">New</div>` : "";
    const st = r.avgRating ? `<span class="c-si">★</span>${r.avgRating}<span style="color:var(--tx-3);font-weight:400"> (${r.ratingCount})</span>` : `<span style="color:var(--tx-3)">No ratings yet</span>`;
    return `<a class="c-rcard${open?"":" c-rcard--p"}" href="${open?`/r/${encodeURIComponent(r.slug)}`:"javascript:void(0)"}">
      ${gBan(r, badge, open)}
      <div class="c-rcard-bd"><div class="c-rcard-nm">${escapeHtml(r.name)}</div><div class="c-rcard-lc">${escapeHtml(r.locality||r.address||"Dine-in")}</div><div class="c-rcard-ft"><div class="c-rcard-st">${st}</div><span class="c-pill ${open?"c-po":"c-pp"}">${open?"Open":"Paused"}</span></div></div>
    </a>`;
  }).join("");
}

/* ── IMAGE CYCLE ── */
function startCycle() {
  setInterval(() => {
    document.querySelectorAll(".c-slides").forEach(w => {
      const sl = w.querySelectorAll(".c-slide"); if (sl.length <= 1) return;
      const cur = w.querySelector(".c-slide.on") || sl[0], idx = [...sl].indexOf(cur);
      cur.classList.remove("on"); sl[(idx+1) % sl.length].classList.add("on");
    });
    document.querySelectorAll(".c-fslides").forEach(w => {
      const sl = w.querySelectorAll(".c-fslide"); if (sl.length <= 1) return;
      const cur = w.querySelector(".c-fslide.on") || sl[0], idx = [...sl].indexOf(cur);
      cur.classList.remove("on"); sl[(idx+1) % sl.length].classList.add("on");
    });
  }, 3000);
}

/* ── SEARCH / FILTER ── */
function setDiscoverVis(show) { document.getElementById("discoverZone").style.display = show ? "" : "none"; }
function onSearch() {
  const v = document.getElementById("searchIn").value;
  searchQ = v.trim().toLowerCase();
  document.getElementById("sbarEl").classList.toggle("hv", searchQ.length > 0);
  setDiscoverVis(!searchQ && !activeChip && !openOnly);
  renderGrid();
}
function clearSearch() { document.getElementById("searchIn").value = ""; onSearch(); }
function setChip(btn, val) {
  activeChip = val; openOnly = false;
  document.querySelectorAll(".c-chip").forEach(c => c.classList.remove("on"));
  btn.classList.add("on");
  setDiscoverVis(!val);
  renderGrid();
}
function setOpenChip(btn) {
  openOnly = !openOnly; activeChip = "";
  document.querySelectorAll(".c-chip").forEach(c => c.classList.remove("on"));
  (openOnly ? btn : document.getElementById("chipAll")).classList.add("on");
  setDiscoverVis(!openOnly);
  renderGrid();
}
function clearFilters() {
  searchQ = ""; activeChip = ""; openOnly = false;
  document.getElementById("searchIn").value = "";
  document.getElementById("sbarEl").classList.remove("hv");
  document.querySelectorAll(".c-chip").forEach((c,i) => c.classList.toggle("on", i === 0));
  setDiscoverVis(true);
  renderGrid();
}

/* ── MISC ── */
function toggleMenu() { document.getElementById("uDrop").classList.toggle("open") }
document.addEventListener("click", e => { if (!document.getElementById("uBtn")?.contains(e.target)) document.getElementById("uDrop")?.classList.remove("open") });
function doSignOut() { sessionStorage.removeItem("token"); location.href = "/customer-login.html" }
function toggleTheme() { const on = document.documentElement.classList.toggle("light"); localStorage.setItem("avenzo-theme", on ? "light" : "dark") }
</script>
</body>
