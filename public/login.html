<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>

<body>
  <main class="auth-page">
    <section class="card auth-card">
      <div class="brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>

      <div class="stack" style="text-align:center; margin-bottom:20px;">
        <div class="eyebrow">Team access</div>
        <h1 style="font-size:30px;">Welcome back</h1>
        <p class="muted">Your restaurant workspace, ready when you are.</p>
      </div>

      <form class="stack" onsubmit="login(event)">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="input" type="email" autocomplete="email" placeholder="you@avenzo.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </div>

        <button id="loginBtn" class="btn btn-primary" type="submit">Login</button>
        <div id="error" class="muted" style="min-height:20px;"></div>
      </form>

      <p class="muted" style="text-align:center; margin:18px 0 0;">
        Need an account?
        <a href="/signup.html" style="color:var(--brand); font-weight:800;">Sign up</a>
      </p>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    async function login(event) {
      event.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";
      setLoading(btn, true, "Logging in...");

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok || !data.token) throw new Error(data.error || "Login failed");

        localStorage.setItem("token", data.token);
        window.location.href = "/admin/dashboard.html";
      } catch (err) {
        errorEl.textContent = err.message;
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>

</html>
