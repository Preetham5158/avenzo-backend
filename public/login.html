<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .choice-wrap {
      width: min(760px, calc(100vw - 32px));
      display: grid;
      gap: 16px;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 16px;
    }

    .choice-card {
      min-height: 220px;
      display: grid;
      align-content: space-between;
    }

    @media (max-width: 720px) {
      .choice-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="auth-page">
    <section class="choice-wrap">
      <div class="brand center-brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>

      <section class="choice-grid">
        <article class="card card-pad choice-card">
          <div>
            <div class="eyebrow">Customers</div>
            <h1 class="h1-auth">Customer sign in</h1>
            <p class="muted">View your dine-in order history, tracking links, and future repeat-ordering features.</p>
          </div>
          <div class="stack">
            <a class="btn btn-primary" href="/customer-login.html">Sign in</a>
            <a class="btn btn-ghost" href="/customer-signup.html">Create customer account</a>
          </div>
        </article>

        <article class="card card-pad choice-card">
          <div>
            <div class="eyebrow">Restaurant partners</div>
            <h2>Restaurant login</h2>
            <p class="muted">For approved Avenzo restaurant partners only.</p>
          </div>
          <div class="stack">
            <a class="btn btn-dark" href="/restaurant-login.html">Restaurant login</a>
            <a class="auth-link" href="/restaurant-interest.html">Submit restaurant interest</a>
          </div>
        </article>
      </section>
    </section>
  </main>
</body>

</html>
