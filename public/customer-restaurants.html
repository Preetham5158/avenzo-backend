<!DOCTYPE html>
<html lang="en">
<head>
  <title>Avenzo — Explore</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>try{if(localStorage.getItem('avenzo-theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0C0B0F;--bg-2:#151318;--bg-3:#1E1C24;--bg-4:#272530;--tx:#F2E8D4;--tx-2:#C8BA9C;--tx-3:#9A8C7A;--brand:#E8401C;--brand-d:#C43318;--brand-soft:rgba(232,64,28,0.12);--line:rgba(255,255,255,0.07);--glass:rgba(9,8,10,0.84);--success:#27C96B;--warn:#E8A53A;--r:16px;--r-sm:11px;--nav-h:60px;--bn-h:66px}
    html.light{--bg:#FAFAF8;--bg-2:#F2EEE5;--bg-3:#EAE4D9;--bg-4:#DDD6C8;--tx:#1A1008;--tx-2:#5C4F3C;--tx-3:#9A8B7A;--line:rgba(0,0,0,0.08);--glass:rgba(250,250,248,0.90)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);padding-bottom:var(--bn-h);min-height:100dvh}
    a{color:inherit;text-decoration:none}button,input,select{font:inherit;border:0;outline:none;background:none;color:inherit;cursor:pointer}

    .toast{position:fixed;left:50%;bottom:calc(var(--bn-h)+14px);z-index:999;transform:translateX(-50%) translateY(10px);background:var(--bg-4);color:var(--tx);padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* nav */
    .c-nav{position:sticky;top:0;z-index:50;height:var(--nav-h);background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--line)}
    .c-nav-inner{height:100%;max-width:1160px;margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:16px}
    .c-logo{display:flex;align-items:center;gap:9px}.c-logo img{width:26px;height:26px;border-radius:7px}.c-logo span{font-size:16px;font-weight:800;letter-spacing:1.6px}
    .c-dlinks{display:none;align-items:center;gap:2px;margin-left:8px}.c-dlinks a{padding:7px 13px;border-radius:8px;font-size:14px;font-weight:600;color:var(--tx-2);transition:color .12s,background .12s}.c-dlinks a:hover{color:var(--tx);background:var(--bg-3)}.c-dlinks a.on{color:var(--tx)}
    .c-spacer{flex:1}
    .c-umenu-wrap{position:relative}.c-ubtn{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 8px;background:var(--bg-3);border:1px solid var(--line);border-radius:99px;cursor:pointer;transition:border-color .12s}.c-ubtn:hover{border-color:rgba(255,255,255,0.16)}.c-uav{width:28px;height:28px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}.c-uname{font-size:13px;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.c-ucaret{color:var(--tx-3)}
    .c-udropdown{display:none;position:absolute;right:0;top:calc(100% + 8px);min-width:186px;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 16px 50px rgba(0,0,0,0.55);overflow:hidden;z-index:80}.c-udropdown.open{display:block}
    .c-uinfo{padding:12px 14px;border-bottom:1px solid var(--line)}.c-uinfo strong{display:block;font-size:13px;margin-bottom:2px}.c-uinfo small{font-size:12px;color:var(--tx-3)}
    .c-umitem{display:block;width:100%;padding:11px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--tx-2);cursor:pointer;transition:background .1s,color .1s}.c-umitem:hover{background:var(--bg-4);color:var(--tx)}.c-umitem.red{color:var(--brand)}

    /* hero */
    .c-wrap{max-width:1160px;margin:0 auto;padding:0 22px}
    .c-hero{padding:28px 0 0;background:radial-gradient(ellipse 70% 90% at 96% 120%,rgba(232,64,28,0.11) 0%,transparent 55%),var(--bg);border-bottom:1px solid var(--line)}
    .c-page-tag{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
    .c-hero-h1{font-size:clamp(24px,3.5vw,36px);font-weight:800;line-height:1.12;color:var(--tx);margin-bottom:18px}
    .c-sbar{display:flex;align-items:center;gap:10px;height:52px;max-width:560px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:14px;padding:0 16px;transition:border-color .15s,box-shadow .15s}
    .c-sbar:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
    .c-sbar svg{color:var(--tx-3);flex-shrink:0}.c-sbar input{flex:1;font-size:15px;color:var(--tx);background:transparent}.c-sbar input::placeholder{color:var(--tx-3)}

    /* filter row */
    .c-filter-row{display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;padding:14px 0 0}
    .c-filter-row::-webkit-scrollbar{display:none}
    .c-fchip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;padding:8px 15px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-weight:600;color:var(--tx-2);white-space:nowrap;cursor:pointer;transition:all .15s}
    .c-fchip:hover{border-color:rgba(255,255,255,0.18)}.c-fchip.on{background:var(--brand-soft);border-color:rgba(232,64,28,0.5);color:var(--brand)}

    /* sort + count bar */
    .c-sortbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 0 14px}
    .c-res-count{font-size:14px;font-weight:700;color:var(--tx-2)}
    .c-res-count span{color:var(--tx-3);font-weight:500;font-size:13px}
    .c-sort-wrap{position:relative;display:flex;align-items:center;gap:7px}
    .c-sort-label{font-size:12px;color:var(--tx-3);font-weight:600;white-space:nowrap}
    .c-sort-select{padding:7px 12px;background:var(--bg-3);border:1.5px solid var(--line);border-radius:99px;font-size:13px;font-weight:600;color:var(--tx-2);cursor:pointer;transition:border-color .15s;-webkit-appearance:none;appearance:none;padding-right:28px}
    .c-sort-select:hover{border-color:rgba(255,255,255,0.18)}
    .c-sort-caret{position:absolute;right:10px;pointer-events:none;color:var(--tx-3)}

    /* grid */
    .c-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

    /* restaurant card */
    .c-rcard{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,border-color .18s,box-shadow .18s}
    .c-rcard:hover:not(.c-rcard--paused){transform:translateY(-3px);border-color:rgba(255,255,255,0.13);box-shadow:0 14px 44px rgba(0,0,0,0.44)}
    .c-rcard-banner{height:110px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:44px}
    .c-rcard--paused .c-rcard-banner{filter:saturate(0.15) brightness(0.65)}
    .c-rcard-paused-ov{position:absolute;inset:0;background:rgba(9,8,10,0.52);display:flex;align-items:center;justify-content:center}
    .c-rcard-paused-ov span{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.75);padding:4px 11px;border-radius:99px;border:1px solid rgba(255,255,255,0.09)}
    .c-slides{position:absolute;inset:0}.c-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s}.c-slide.on{opacity:1}.c-slide img{width:100%;height:100%;object-fit:cover;display:block}
    .c-rcard-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;padding:3px 9px;border-radius:99px;z-index:2}
    .c-badge-new{background:rgba(39,201,107,0.85);color:#fff}
    .c-badge-top{background:rgba(232,64,28,0.85);color:#fff}
    .c-rcard-body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;gap:4px}
    .c-rcard-name{font-size:14px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-rcard-loc{font-size:12px;color:var(--tx-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-rcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .c-rcard-stars{font-size:12px;font-weight:600;color:var(--tx-2);display:flex;align-items:center;gap:3px}
    .c-star-icon{color:#E8A53A}
    .c-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
    .c-pill-open{background:rgba(39,201,107,0.14);color:var(--success)}.c-pill-paused{background:rgba(232,165,58,0.14);color:var(--warn)}

    /* skeletons & empty */
    .c-skel{background:linear-gradient(90deg,var(--bg-3) 25%,var(--bg-4) 50%,var(--bg-3) 75%);background-size:200% 100%;border-radius:var(--r);animation:cskel 1.5s linear infinite}
    @keyframes cskel{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .c-empty{grid-column:1/-1;padding:52px 20px;text-align:center;color:var(--tx-3)}.c-empty-icon{font-size:50px;margin-bottom:14px}.c-empty p{font-size:14px;color:var(--tx-2);margin:6px 0 18px}
    .c-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
    .c-btn-ghost{background:var(--bg-4);color:var(--tx-2);border:1px solid var(--line)}.c-btn-ghost:hover{color:var(--tx);border-color:rgba(255,255,255,0.15)}

    /* bottom nav */
    .c-bnav{position:fixed;bottom:0;left:0;right:0;z-index:60;height:var(--bn-h);background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
    .c-bnav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--tx-3);font-size:10px;font-weight:600;letter-spacing:0.3px;transition:color .15s}.c-bnav a svg{transition:stroke .15s}.c-bnav a.on{color:var(--brand)}.c-bnav a.on svg{stroke:var(--brand)}
    .c-theme{position:fixed;right:20px;bottom:calc(var(--bn-h)+14px);z-index:55;display:flex;align-items:center;gap:7px;background:var(--bg-3);border:1px solid var(--line);border-radius:99px;padding:8px 14px 8px 10px;font-size:13px;font-weight:600;color:var(--tx-2);cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.35);transition:color .15s,border-color .15s}.c-theme:hover{color:var(--tx);border-color:rgba(255,255,255,0.18)}
    html.light .c-theme .t-sun{display:none}html:not(.light) .c-theme .t-moon{display:none}html.light .c-theme .t-dark{display:none}html:not(.light) .c-theme .t-light{display:none}

    @media(min-width:901px){:root{--bn-h:0px}body{padding-bottom:0}.c-bnav{display:none}.c-dlinks{display:flex}.c-theme{bottom:20px}}
    @media(min-width:1200px){.c-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:1440px){.c-grid{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:480px){.c-rcard-banner{height:90px;font-size:36px}.c-wrap{padding:0 16px}}
  </style>
</head>
<body>
  <header class="c-nav">
    <div class="c-nav-inner">
      <a class="c-logo" href="/customer.html"><img src="/logo.png" alt="Avenzo"><span>AVENZO</span></a>
      <nav class="c-dlinks">
        <a href="/customer.html">Home</a>
        <a class="on" href="/customer-restaurants.html">Explore</a>
        <a href="/customer-orders.html">Orders</a>
        <a href="/customer-profile.html">Profile</a>
      </nav>
      <div class="c-spacer"></div>
      <div class="c-umenu-wrap">
        <button class="c-ubtn" id="uBtn" onclick="toggleUMenu()">
          <div class="c-uav" id="uAv">U</div>
          <span class="c-uname" id="uNm">…</span>
          <svg class="c-ucaret" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="c-udropdown" id="uDrop">
          <div class="c-uinfo"><strong id="uFullName">—</strong><small id="uEmail">—</small></div>
          <a class="c-umitem" href="/customer-profile.html">My profile</a>
          <a class="c-umitem" href="/customer-orders.html">My orders</a>
          <button class="c-umitem red" onclick="doSignOut()">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <section class="c-hero">
    <div class="c-wrap">
      <p class="c-page-tag">Explore</p>
      <h1 class="c-hero-h1">Find a place to dine in</h1>
      <div class="c-sbar">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchIn" type="search" placeholder="Restaurant name or area…" oninput="renderRests()">
      </div>
      <div class="c-filter-row">
        <button class="c-fchip on" onclick="setFoodFilter(this,'')">All types</button>
        <button class="c-fchip" onclick="setFoodFilter(this,'PURE_VEG')">🌿 Pure Veg</button>
        <button class="c-fchip" onclick="setFoodFilter(this,'BOTH')">🍱 Veg &amp; Non-Veg</button>
        <button class="c-fchip" onclick="setFoodFilter(this,'NON_VEG')">🍖 Non-Veg</button>
        <button class="c-fchip" id="openChip" onclick="setAvailFilter(this)">⚡ Open now</button>
      </div>
      <div class="c-sortbar">
        <div class="c-res-count" id="resCount">Loading…</div>
        <div class="c-sort-wrap">
          <span class="c-sort-label">Sort</span>
          <select class="c-sort-select" id="sortSel" onchange="renderRests()">
            <option value="open">Open first</option>
            <option value="rating">Top rated</option>
            <option value="name">Name A–Z</option>
          </select>
          <svg class="c-sort-caret" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </div>
  </section>

  <section style="padding-top:4px">
    <div class="c-wrap">
      <div class="c-grid" id="restGrid">
        <div class="c-skel" style="height:220px"></div>
        <div class="c-skel" style="height:220px"></div>
        <div class="c-skel" style="height:220px"></div>
        <div class="c-skel" style="height:220px"></div>
      </div>
    </div>
  </section>
  <div style="height:40px"></div>

  <nav class="c-bnav">
    <a href="/customer.html" aria-label="Home"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a class="on" href="/customer-restaurants.html" aria-label="Explore"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explore</a>
    <a href="/customer-orders.html" aria-label="Orders"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>Orders</a>
    <a href="/customer-profile.html" aria-label="Profile"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </nav>
  <button class="c-theme" onclick="toggleTheme()">
    <svg class="t-sun" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="t-moon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <span class="t-light">Light</span><span class="t-dark">Dark</span>
  </button>

  <script src="/assets/app.js"></script>
  <script>
    if (!sessionStorage.getItem("token")) location.href = "/customer-login.html";

    const BANNERS = [
      {grad:"linear-gradient(135deg,#2E1510,#1A0C08)",emoji:"🍖"},
      {grad:"linear-gradient(135deg,#0D2018,#081410)",emoji:"🌿"},
      {grad:"linear-gradient(135deg,#0E1832,#09102A)",emoji:"🍱"},
      {grad:"linear-gradient(135deg,#261F08,#181404)",emoji:"🌾"},
      {grad:"linear-gradient(135deg,#1E0D26,#130919)",emoji:"🍜"},
      {grad:"linear-gradient(135deg,#081E28,#051318)",emoji:"🐟"}
    ];
    const EMOJIS = {PURE_VEG:"🌿",BOTH:"🍱",NON_VEG:"🍖"};
    function hash(s){return[...s].reduce((a,c)=>(a*31+c.charCodeAt(0))&0xffff,0)}

    let allRests = [], foodFilter = "", openOnly = false;

    (async () => {
      try {
        const u = await request("/auth/me");
        if (u.role !== "USER") { location.href = "/admin/dashboard.html"; return; }
        document.getElementById("uAv").textContent = (u.name||u.email||"U")[0].toUpperCase();
        document.getElementById("uNm").textContent = u.name ? u.name.split(" ")[0] : u.email.split("@")[0];
        document.getElementById("uFullName").textContent = u.name || u.email || "—";
        document.getElementById("uEmail").textContent = u.email || "";
        const d = await request("/customer/restaurants");
        allRests = d.restaurants || [];
        renderRests();
        startImageCycle();
      } catch { location.href = "/customer-login.html"; }
    })();

    function setFoodFilter(btn, val) {
      foodFilter = val; openOnly = false;
      document.querySelectorAll(".c-fchip").forEach(c => c.classList.remove("on"));
      btn.classList.add("on");
      renderRests();
    }
    function setAvailFilter(btn) {
      openOnly = !openOnly; foodFilter = "";
      document.querySelectorAll(".c-fchip").forEach(c => c.classList.remove("on"));
      if (openOnly) btn.classList.add("on");
      renderRests();
    }

    function sorted(list) {
      const by = document.getElementById("sortSel")?.value || "open";
      if (by === "open") return [...list].sort((a,b) => (b.serviceAvailable ? 1 : 0) - (a.serviceAvailable ? 1 : 0));
      if (by === "rating") return [...list].sort((a,b) => (b.avgRating||0) - (a.avgRating||0));
      return [...list].sort((a,b) => a.name.localeCompare(b.name));
    }

    function bannerHtml(r, badge) {
      const bnr = BANNERS[hash(r.name) % BANNERS.length];
      const open = r.serviceAvailable !== false;
      const pausedOv = open ? "" : `<div class="c-rcard-paused-ov"><span>Paused</span></div>`;
      const imgs = r.previewImages || [];
      if (imgs.length) {
        const slides = imgs.map((url, i) =>
          `<div class="c-slide${i===0?" on":""}"><img src="${escapeHtml(url)}" alt="" loading="lazy"></div>`
        ).join("");
        return `<div class="c-rcard-banner" style="background:${bnr.grad}">${badge}<div class="c-slides">${slides}</div>${pausedOv}</div>`;
      }
      return `<div class="c-rcard-banner" style="background:${bnr.grad}">${badge}${EMOJIS[r.foodType]||bnr.emoji}${pausedOv}</div>`;
    }

    function startImageCycle() {
      setInterval(() => {
        document.querySelectorAll(".c-slides").forEach(wrap => {
          const slides = wrap.querySelectorAll(".c-slide");
          if (slides.length <= 1) return;
          const cur = wrap.querySelector(".c-slide.on") || slides[0];
          const idx = [...slides].indexOf(cur);
          cur.classList.remove("on");
          slides[(idx + 1) % slides.length].classList.add("on");
        });
      }, 3000);
    }

    function renderRests() {
      const q = document.getElementById("searchIn").value.trim().toLowerCase();
      let list = allRests;
      if (q) list = list.filter(r => [r.name, r.locality, r.address].join(" ").toLowerCase().includes(q));
      if (openOnly) list = list.filter(r => r.serviceAvailable !== false);
      else if (foodFilter) list = list.filter(r => r.foodType === foodFilter);
      list = sorted(list);

      const n = list.length;
      document.getElementById("resCount").innerHTML = n
        ? `<strong>${n}</strong> restaurant${n !== 1 ? "s" : ""}`
        : "No results";

      const g = document.getElementById("restGrid");
      if (!n) {
        g.innerHTML = `<div class="c-empty"><div class="c-empty-icon">🔍</div><p>No restaurants match this filter.</p><button class="c-btn c-btn-ghost" style="padding:8px 18px;font-size:13px" onclick="clearAll()">Clear filters</button></div>`;
        return;
      }
      g.innerHTML = list.map(r => {
        const open = r.serviceAvailable !== false;
        const isNew = r.ratingCount < 4;
        const isTop = r.avgRating >= 4.0 && r.ratingCount >= 5;
        const badge = isTop
          ? `<div class="c-rcard-badge c-badge-top">Top rated</div>`
          : isNew ? `<div class="c-rcard-badge c-badge-new">New</div>` : "";
        const stars = r.avgRating
          ? `<span class="c-star-icon">★</span>${r.avgRating}<span style="color:var(--tx-3);font-weight:400"> (${r.ratingCount})</span>`
          : `<span style="color:var(--tx-3)">No ratings yet</span>`;
        const href = open ? `/r/${encodeURIComponent(r.slug)}` : "javascript:void(0)";
        return `<a class="c-rcard${open ? "" : " c-rcard--paused"}" href="${href}">
          ${bannerHtml(r, badge)}
          <div class="c-rcard-body">
            <div class="c-rcard-name">${escapeHtml(r.name)}</div>
            <div class="c-rcard-loc">${escapeHtml(r.locality || r.address || "Dine-in")}</div>
            <div class="c-rcard-foot">
              <div class="c-rcard-stars">${stars}</div>
              <span class="c-pill ${open ? "c-pill-open" : "c-pill-paused"}">${open ? "Open" : "Paused"}</span>
            </div>
          </div>
        </a>`;
      }).join("");
    }

    function clearAll() {
      foodFilter = ""; openOnly = false;
      document.getElementById("searchIn").value = "";
      document.querySelectorAll(".c-fchip").forEach((c, i) => c.classList.toggle("on", i === 0));
      renderRests();
    }

    function toggleUMenu() { document.getElementById("uDrop").classList.toggle("open") }
    document.addEventListener("click", e => { if (!document.getElementById("uBtn")?.contains(e.target)) document.getElementById("uDrop")?.classList.remove("open") });
    function doSignOut() { sessionStorage.removeItem("token"); location.href = "/customer-login.html" }
    function toggleTheme() { const on = document.documentElement.classList.toggle("light"); localStorage.setItem("avenzo-theme", on ? "light" : "dark") }
  </script>
</body>
</html>
