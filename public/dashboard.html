<!DOCTYPE html>
<html>
<head>
  <title>Avenzo Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f6f7fb;
    }

    header {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 30px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: linear-gradient(45deg,#ff7a00,#ffb300);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      width: 70%;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/logo.png">
    <b>Avenzo</b>
  </div>

  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <h3>Your Restaurants</h3>

  <div>
    <input id="name" placeholder="New restaurant name">
    <button onclick="createRestaurant()">Create</button>
  </div>

  <br>

  <div id="list"></div>

</div>

<script>
const API = "https://avenzo.app";

function getToken() {
  return localStorage.getItem("token");
}

// 🔐 protect page
if (!getToken()) {
  window.location.href = "/login.html";
}

// 📥 load restaurants
async function loadRestaurants() {
  const res = await fetch(`${API}/restaurants`, {
    headers: { "Authorization": getToken() }
  });

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>
        <b>${r.name}</b><br>
        <small>${r.id}</small>
      </div>

      <div>
        <button onclick="openMenu('${r.id}')">Manage</button>
        <button onclick="deleteRestaurant('${r.id}')">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

// ➕ create
async function createRestaurant() {
  const name = document.getElementById("name").value;

  await fetch(`${API}/restaurant`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": getToken()
    },
    body: JSON.stringify({ name })
  });

  document.getElementById("name").value = "";
  loadRestaurants();
}

// ❌ delete
async function deleteRestaurant(id) {
  await fetch(`${API}/restaurant/${id}`, {
    method: "DELETE",
    headers: { "Authorization": getToken() }
  });

  loadRestaurants();
}

// 👉 go to menu page
function openMenu(id) {
  window.location.href = `/menu-admin.html?restaurantId=${id}`;
}

// 🚪 logout
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

loadRestaurants();
</script>

</body>
</html>
