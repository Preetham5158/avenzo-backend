<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Avenzo — Partner Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b16">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .lead-card {
      display: grid;
      gap: 14px;
    }

    .lead-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .lead-restaurant {
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.2;
    }

    .lead-meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    .lead-unseen-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .lead-detail-grid {
      gap: 10px;
    }

    .lead-detail-grid .detail-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }

    .lead-detail-grid .detail-value {
      font-weight: 700;
      font-size: 14px;
      color: var(--ink);
      word-break: break-word;
    }

    .lead-detail-grid a.detail-value {
      color: var(--brand);
      text-decoration: none;
    }

    .lead-detail-grid a.detail-value:hover { text-decoration: underline; }

    .lead-message {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--line);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-wrap {
      display: grid;
      gap: 6px;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .note-count {
      font-size: 11px;
      color: var(--muted);
    }

    .note-count.near-limit { color: var(--danger); }

    .lead-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .lead-actions-divider {
      width: 1px;
      height: 24px;
      background: var(--line);
      flex-shrink: 0;
    }

    .lead-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Stats grid: 5 cards — use auto-fill so it adapts cleanly */
    #leadStats {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }

    .stat-total {
      border-top: 3px solid var(--brand);
    }

    .filter-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .status-tabbar {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .status-tabbar::-webkit-scrollbar { display: none; }

    @media (max-width: 600px) {
      .filter-bar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .lead-detail-grid.grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }
      .lead-detail-grid.grid-2 {
        grid-template-columns: 1fr;
      }
      .lead-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .lead-actions .btn { width: 100%; justify-content: center; }
      .lead-actions-divider { width: 100%; height: 1px; }
      .lead-tools { width: 100%; }
      .lead-tools .btn { flex: 1; }
    }

    /* Dock clearance */
    .page { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head restaurant-sticky">
        <div>
          <div class="eyebrow">Sales pipeline</div>
          <h1>Partner leads</h1>
          <p class="muted">Review, qualify, and convert restaurant interest submissions.</p>
        </div>
        <div class="row row-wrap">
          <button id="markSeenBtn" class="btn btn-ghost" type="button" onclick="markSeen(this)">Mark all seen</button>
        </div>
      </section>

      <section class="grid" id="leadStats" style="margin-bottom:16px"></section>

      <section class="card card-pad">
        <div class="filter-bar">
          <div class="field mb-0">
            <label for="leadSearch">Search leads</label>
            <input id="leadSearch" class="input" placeholder="Restaurant, contact, phone, email..." oninput="setSearch(this.value)" autocomplete="off">
          </div>
          <button class="btn btn-ghost" type="button" onclick="clearFilters()">Clear</button>
        </div>
        <div class="status-tabbar mt-12" id="statusTabbar"></div>
      </section>

      <p class="muted" id="leadsCount" style="font-size:13px;margin:12px 0 4px;padding:0 4px"></p>
      <section class="stack" id="leads"></section>
    </main>
  </div>

  <nav class="admin-dock">
    <a href="/admin/dashboard.html">Home</a>
    <a class="active" href="#">Leads</a>
  </nav>

  <script src="/assets/app.js"></script>
  <script>
    const STATUS_META = {
      NEW:       { label: "New",       pill: "pill-danger",  btnClass: "btn-ghost" },
      CONTACTED: { label: "Contacted", pill: "pill-warning", btnClass: "btn-ghost" },
      QUALIFIED: { label: "Qualified", pill: "pill-success", btnClass: "btn-ghost" },
      CONVERTED: { label: "Converted", pill: "pill-success", btnClass: "btn-primary" },
      CLOSED:    { label: "Closed",    pill: "pill",         btnClass: "btn-ghost" }
    };
    const STATUS_ACTION_LABELS = {
      CONTACTED: "Mark contacted",
      QUALIFIED: "Mark qualified",
      CONVERTED: "Mark converted",
      CLOSED:    "Close lead",
      NEW:       "Reopen"
    };
    const ALL_STATUSES = Object.keys(STATUS_META);

    let currentUser = null;
    let activeStatus = "";
    let search = "";
    let searchTimer = null;
    let allLeads = [];
    let allCounts = {};
    let unseenNewCount = 0;

    async function init() {
      currentUser = await initPartnerPage();
      if (!currentUser) return;
      if (currentUser.role !== "ADMIN") {
        document.getElementById("leads").innerHTML = `<div class="empty">Only Avenzo admins can view partner leads.</div>`;
        return;
      }
      renderStatusTabbar();
      loadLeads();
    }

    async function loadLeads() {
      try {
        document.getElementById("leads").innerHTML = skeletonCards(4);
        const params = new URLSearchParams({ limit: "100" });
        if (activeStatus) params.set("status", activeStatus);
        if (search) params.set("search", search);
        const data = await request(`/admin/restaurant-leads?${params.toString()}`);
        allLeads = data.leads || [];
        allCounts = data.counts || {};
        unseenNewCount = data.unseenNewCount || 0;
        renderStats();
        renderStatusTabbar();
        document.getElementById("leadsCount").textContent = allLeads.length
          ? `Showing ${allLeads.length} lead${allLeads.length === 1 ? "" : "s"}${activeStatus ? ` · ${STATUS_META[activeStatus]?.label || activeStatus}` : ""}${search ? ` · "${search}"` : ""}`
          : "";
        renderLeads(allLeads);
      } catch (err) {
        document.getElementById("leads").innerHTML = `<div class="empty">${escapeHtml(err.message || "Could not load leads.")}</div>`;
      }
    }

    function renderStats() {
      const total = ALL_STATUSES.reduce((sum, s) => sum + (allCounts[s] || 0), 0);
      const cards = [
        { label: "Total", value: total, pill: "", pillClass: "pill", topBorder: true },
        { label: "New",       value: allCounts.NEW       || 0, extra: unseenNewCount ? ` <span class="pill pill-danger" style="font-size:11px">${unseenNewCount} unseen</span>` : "", pillClass: "pill-danger" },
        { label: "Contacted", value: allCounts.CONTACTED || 0, pillClass: "pill-warning" },
        { label: "Qualified", value: allCounts.QUALIFIED || 0, pillClass: "pill-success" },
        { label: "Converted", value: allCounts.CONVERTED || 0, pillClass: "pill-success" },
        { label: "Closed",    value: allCounts.CLOSED    || 0, pillClass: "pill" }
      ];
      document.getElementById("leadStats").innerHTML = cards.map(c => `
        <article class="card card-pad ${c.topBorder ? "stat-total" : ""}" style="cursor:pointer" onclick="${c.topBorder ? "clearFilters()" : `setStatus('${c.label === "New" ? "NEW" : c.label.toUpperCase()}')`}">
          <div class="muted">${c.label}</div>
          <h3>${c.value}${c.extra || ""}</h3>
          <span class="pill ${c.pillClass || ""}">${c.label}</span>
        </article>
      `).join("");
    }

    function renderStatusTabbar() {
      document.getElementById("statusTabbar").innerHTML = `
        <button class="btn tab ${!activeStatus ? "active" : ""}" onclick="setStatus('')">All</button>
        ${ALL_STATUSES.map(s => `
          <button class="btn tab ${activeStatus === s ? "active" : ""}" onclick="setStatus('${s}')">
            ${STATUS_META[s].label}
            <span class="pill" style="font-size:11px">${allCounts[s] || 0}</span>
          </button>
        `).join("")}
      `;
    }

    function renderLeads(leads) {
      const container = document.getElementById("leads");
      if (!leads.length) {
        container.innerHTML = `<div class="empty">No leads match this view. Try a different filter or search.</div>`;
        return;
      }

      container.innerHTML = leads.map(lead => {
        const meta = STATUS_META[lead.status] || { label: lead.status, pill: "pill" };
        const isUnseen = lead.status === "NEW" && !lead.seenAt;

        const statusActions = ALL_STATUSES
          .filter(s => s !== lead.status)
          .map(s => {
            const isCta = s === "CONVERTED";
            const isClose = s === "CLOSED";
            const cls = isCta ? "btn-soft" : isClose ? "btn-danger-outline" : "btn-ghost";
            return `<button class="btn ${cls}" type="button" onclick="updateLead(this,'${lead.id}','${s}')">${STATUS_ACTION_LABELS[s] || s}</button>`;
          }).join("");

        return `
          <article class="card card-pad lead-card">
            <div class="lead-header">
              <div>
                <div class="lead-restaurant">
                  ${isUnseen ? `<span class="lead-unseen-dot" title="New — not yet seen"></span>` : ""}
                  ${escapeHtml(lead.restaurantName)}
                </div>
                <div class="lead-meta">
                  ${escapeHtml(lead.location || "Location not provided")}
                  &nbsp;·&nbsp;
                  ${formatDate(lead.createdAt)}
                </div>
              </div>
              <span class="pill ${meta.pill}">${meta.label}</span>
            </div>

            <div class="lead-detail-grid grid grid-3">
              <div>
                <div class="detail-label">Contact</div>
                <div class="detail-value">${escapeHtml(lead.contactName || "—")}</div>
              </div>
              <div>
                <div class="detail-label">Phone</div>
                ${lead.phone ? `<a class="detail-value" href="tel:${escapeHtml(lead.phone)}">${escapeHtml(lead.phone)}</a>` : `<div class="detail-value muted">—</div>`}
              </div>
              <div>
                <div class="detail-label">Email</div>
                ${lead.email ? `<a class="detail-value" href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a>` : `<div class="detail-value muted">—</div>`}
              </div>
            </div>

            <div class="lead-detail-grid grid grid-2">
              <div>
                <div class="detail-label">Restaurant type</div>
                <div class="detail-value">${escapeHtml(lead.restaurantType || "Not specified")}</div>
              </div>
              <div>
                <div class="detail-label">Daily orders (approx.)</div>
                <div class="detail-value">${escapeHtml(lead.approxDailyOrders || "Not specified")}</div>
              </div>
            </div>

            ${lead.message ? `<div class="lead-message">${escapeHtml(lead.message)}</div>` : ""}

            <div class="note-wrap">
              <label for="note-${lead.id}" class="muted" style="font-size:12px;font-weight:700">Internal note</label>
              <textarea id="note-${lead.id}" class="textarea" rows="2" placeholder="Add follow-up notes..." maxlength="500" data-lead-id="${lead.id}" oninput="onNoteInput(this)">${escapeHtml(lead.internalNote || "")}</textarea>
              <div class="note-footer">
                <span class="note-count" id="noteCount_${lead.id}">${(lead.internalNote || "").length}/500</span>
                <button id="saveNoteBtn-${lead.id}" class="btn btn-soft" type="button" onclick="saveNote(this,'${lead.id}')">Save note</button>
              </div>
            </div>

            <div class="lead-actions">
              <div class="lead-tools" style="flex-wrap:wrap;gap:6px">
                ${statusActions}
              </div>
              <span class="lead-actions-divider"></span>
              <div class="lead-tools">
                ${lead.phone ? `<button class="btn btn-ghost" type="button" data-copy="${escapeHtml(lead.phone)}" onclick="copyFromAttr(this)">Copy phone</button>` : ""}
                ${lead.email ? `<button class="btn btn-ghost" type="button" data-copy="${escapeHtml(lead.email)}" onclick="copyFromAttr(this)">Copy email</button>` : ""}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function onNoteInput(textarea) {
      const count = textarea.value.length;
      const counter = document.getElementById("noteCount_" + textarea.dataset.leadId);
      if (counter) {
        counter.textContent = `${count}/500`;
        counter.className = `note-count ${count > 450 ? "near-limit" : ""}`;
      }
    }

    function statusPillClass(status) {
      return STATUS_META[status]?.pill || "pill";
    }

    function setStatus(value) {
      activeStatus = value;
      loadLeads();
    }

    function setSearch(value) {
      search = value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadLeads, 280);
    }

    function clearFilters() {
      activeStatus = "";
      search = "";
      document.getElementById("leadSearch").value = "";
      loadLeads();
    }

    function copyFromAttr(btn) {
      const text = btn.dataset.copy || "";
      navigator.clipboard.writeText(text)
        .then(() => toast("Copied!"))
        .catch(() => {
          // Fallback for older browsers
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.cssText = "position:fixed;opacity:0";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            toast("Copied!");
          } catch {
            toast("Could not copy — try selecting manually.");
          }
        });
    }

    async function updateLead(btn, id, status) {
      setLoading(btn, true, STATUS_ACTION_LABELS[status] || status);
      try {
        await request(`/admin/restaurant-leads/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ status })
        });
        toast(`Lead marked ${STATUS_META[status]?.label || status}`);
        loadLeads();
      } catch (err) {
        toast(err.message || "Could not update lead status");
      } finally {
        setLoading(btn, false);
      }
    }

    async function saveNote(btn, id) {
      setLoading(btn, true, "Saving...");
      try {
        const note = document.getElementById(`note-${id}`)?.value || "";
        await request(`/admin/restaurant-leads/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ internalNote: note })
        });
        toast("Note saved");
      } catch (err) {
        toast(err.message || "Could not save note");
      } finally {
        setLoading(btn, false);
      }
    }

    async function markSeen(btn) {
      setLoading(btn, true, "Marking...");
      try {
        await request("/admin/restaurant-leads/mark-seen", { method: "POST", body: JSON.stringify({}) });
        toast("All new leads marked as seen");
        loadLeads();
      } catch (err) {
        toast(err.message || "Could not mark leads seen");
      } finally {
        setLoading(btn, false);
      }
    }

    init();
  </script>
  <noscript><div style="padding:20px;text-align:center;font-family:sans-serif">Please enable JavaScript to use Avenzo.</div></noscript>
</body>

</html>
