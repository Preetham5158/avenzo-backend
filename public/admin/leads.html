<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Partner Leads — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
  <style>
    .lead-card { display: flex; flex-direction: column; gap: 14px; }
    .lead-name { font-size: 17px; font-weight: 800; color: var(--tx); line-height: 1.2; }
    .lead-meta { font-size: 13px; color: var(--tx-2); margin-top: 3px; }
    .lead-unseen-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--danger);
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .lead-detail-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--tx-2);
      margin-bottom: 2px;
    }
    .lead-detail-value {
      font-weight: 700;
      font-size: 14px;
      color: var(--tx);
      word-break: break-word;
    }
    .lead-detail-value a { color: var(--brand); text-decoration: none; }
    .lead-detail-value a:hover { text-decoration: underline; }
    .lead-message {
      font-size: 13px;
      color: var(--tx-2);
      line-height: 1.6;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: var(--r-sm);
      border: 1px solid var(--line);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .lead-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .note-count { font-size: 11px; color: var(--tx-2); }
    .note-count.near-limit { color: var(--danger); }
    @media (max-width: 480px) {
      .lead-actions { flex-direction: column; align-items: stretch; }
      .lead-actions .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand"><img src="/logo.png" alt="Avenzo"><span class="admin-brand-name">AVENZO</span></a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Loading...</span>
    <div class="admin-topbar-right"><div id="accountMenu"></div></div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">

      <div class="admin-ph">
        <div>
          <div class="admin-eyebrow">Sales pipeline</div>
          <h1 class="admin-ph-title">Partner Leads</h1>
          <p class="admin-ph-sub">Review, qualify and convert restaurant interest submissions.</p>
        </div>
        <div class="admin-ph-actions">
          <button id="markSeenBtn" class="btn btn-ghost" type="button" onclick="markSeen(this)">Mark all seen</button>
        </div>
      </div>

      <div class="stat-grid" id="leadStats" style="margin-bottom:16px"></div>

      <div class="card card-p" style="margin-bottom:12px">
        <div class="g2" style="align-items:end">
          <div class="field mb-0">
            <label for="leadSearch">Search leads</label>
            <input id="leadSearch" class="input" placeholder="Restaurant, contact, phone, email..." oninput="setSearch(this.value)" autocomplete="off">
          </div>
          <button class="btn btn-ghost" type="button" onclick="clearFilters()">Clear</button>
        </div>
        <div class="tab-bar" id="statusTabbar" style="margin-top:12px;overflow-x:auto"></div>
      </div>

      <p class="muted" id="leadsCount" style="font-size:13px;margin:8px 0 4px;color:var(--tx-2)"></p>
      <div class="stack" id="leads"></div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<script src="/assets/app.js"></script>
<script>
const STATUS_META = {
  NEW:       { label: "New",       pill: "pill-danger"  },
  CONTACTED: { label: "Contacted", pill: "pill-warn"    },
  QUALIFIED: { label: "Qualified", pill: "pill-success" },
  CONVERTED: { label: "Converted", pill: "pill-success" },
  CLOSED:    { label: "Closed",    pill: "pill-default" }
};
const STATUS_ACTION_LABELS = {
  CONTACTED: "Mark contacted",
  QUALIFIED: "Mark qualified",
  CONVERTED: "Mark converted",
  CLOSED:    "Close lead",
  NEW:       "Reopen"
};
const ALL_STATUSES = Object.keys(STATUS_META);

let currentUser = null;
let activeStatus = "";
let search = "";
let searchTimer = null;
let allLeads = [];
let allCounts = {};
let unseenNewCount = 0;

async function loadLeads() {
  try {
    document.getElementById("leads").innerHTML = skeletonCards(4);
    const params = new URLSearchParams({ limit: "100" });
    if (activeStatus) params.set("status", activeStatus);
    if (search) params.set("search", search);
    const data = await request(`/admin/restaurant-leads?${params.toString()}`);
    allLeads = data.leads || [];
    allCounts = data.counts || {};
    unseenNewCount = data.unseenNewCount || 0;
    renderStats();
    renderStatusTabbar();
    const count = allLeads.length;
    document.getElementById("leadsCount").textContent = count
      ? `Showing ${count} lead${count === 1 ? "" : "s"}${activeStatus ? ` · ${STATUS_META[activeStatus]?.label || activeStatus}` : ""}${search ? ` · "${search}"` : ""}`
      : "";
    renderLeads(allLeads);
  } catch(err) {
    document.getElementById("leads").innerHTML = `
      <div class="empty-state">
        <div class="empty-state-title">Could not load leads</div>
        <div class="empty-state-sub">${escapeHtml(err.message || "An error occurred.")}</div>
      </div>`;
  }
}

function renderStats() {
  const total = ALL_STATUSES.reduce((sum, s) => sum + (allCounts[s] || 0), 0);
  const cards = [
    { key: "",          label: "Total",     value: total,                     topClass: "stat-top-brand",  clickFn: "clearFilters()" },
    { key: "NEW",       label: "New",       value: allCounts.NEW       || 0,  topClass: "stat-top-danger", clickFn: "setStatus('NEW')" },
    { key: "CONTACTED", label: "Contacted", value: allCounts.CONTACTED || 0,  topClass: "stat-top-warn",   clickFn: "setStatus('CONTACTED')" },
    { key: "QUALIFIED", label: "Qualified", value: allCounts.QUALIFIED || 0,  topClass: "stat-top-ready",  clickFn: "setStatus('QUALIFIED')" },
    { key: "CONVERTED", label: "Converted", value: allCounts.CONVERTED || 0,  topClass: "stat-top-ready",  clickFn: "setStatus('CONVERTED')" },
    { key: "CLOSED",    label: "Closed",    value: allCounts.CLOSED    || 0,  topClass: "stat-top-brand",  clickFn: "setStatus('CLOSED')" }
  ];
  document.getElementById("leadStats").innerHTML = cards.map(c => {
    const extra = c.key === "NEW" && unseenNewCount
      ? ` <span class="pill pill-danger" style="font-size:11px">${unseenNewCount} unseen</span>`
      : "";
    return `
      <div class="stat-card ${c.topClass} clickable" onclick="${c.clickFn}">
        <div class="stat-card-label">${c.label}</div>
        <div class="stat-card-value">${c.value}${extra}</div>
      </div>`;
  }).join("");
}

function renderStatusTabbar() {
  document.getElementById("statusTabbar").innerHTML =
    `<button class="tab-btn ${!activeStatus ? "active" : ""}" onclick="setStatus('')">All</button>` +
    ALL_STATUSES.map(s => `
      <button class="tab-btn ${activeStatus === s ? "active" : ""}" onclick="setStatus('${s}')">
        ${STATUS_META[s].label}
        <span class="pill pill-default" style="font-size:11px">${allCounts[s] || 0}</span>
      </button>`
    ).join("");
}

function renderLeads(leads) {
  const container = document.getElementById("leads");
  if (!leads.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128203;</div>
        <div class="empty-state-title">No leads found</div>
        <div class="empty-state-sub">Try a different filter or search term.</div>
      </div>`;
    return;
  }

  container.innerHTML = leads.map(lead => {
    const meta = STATUS_META[lead.status] || { label: lead.status, pill: "pill-default" };
    const isUnseen = lead.status === "NEW" && !lead.seenAt;

    // Build status action buttons — all except current status
    const statusButtons = ALL_STATUSES
      .filter(s => s !== lead.status)
      .map(s => {
        let cls = "btn-ghost btn-sm";
        if (s === "CONVERTED") cls = "btn-primary btn-sm";
        else if (s === "CLOSED") cls = "btn-danger-soft btn-sm";
        return `<button class="btn ${cls}" type="button" onclick="updateLead(this,'${lead.id}','${s}')">${STATUS_ACTION_LABELS[s] || s}</button>`;
      }).join("");

    return `
      <div class="card card-p lead-card">
        <div class="row-between" style="align-items:flex-start">
          <div>
            <div class="lead-name">
              ${isUnseen ? `<span class="lead-unseen-dot" title="New — not yet seen"></span>` : ""}
              ${escapeHtml(lead.restaurantName)}
            </div>
            <div class="lead-meta">${escapeHtml(lead.location || "Location not provided")} &middot; ${formatDate(lead.createdAt)}</div>
          </div>
          <span class="pill ${meta.pill}">${meta.label}</span>
        </div>

        <div class="g3">
          <div>
            <div class="lead-detail-label">Contact</div>
            <div class="lead-detail-value">${escapeHtml(lead.contactName || "—")}</div>
          </div>
          <div>
            <div class="lead-detail-label">Phone</div>
            <div class="lead-detail-value">
              ${lead.phone ? `<a href="tel:${escapeHtml(lead.phone)}">${escapeHtml(lead.phone)}</a>` : "—"}
            </div>
          </div>
          <div>
            <div class="lead-detail-label">Email</div>
            <div class="lead-detail-value">
              ${lead.email ? `<a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a>` : "—"}
            </div>
          </div>
        </div>

        <div class="g2">
          <div>
            <div class="lead-detail-label">Type</div>
            <div class="lead-detail-value">${escapeHtml(lead.restaurantType || "Not specified")}</div>
          </div>
          <div>
            <div class="lead-detail-label">Daily orders</div>
            <div class="lead-detail-value">${escapeHtml(lead.approxDailyOrders || "Not specified")}</div>
          </div>
        </div>

        ${lead.message ? `<div class="lead-message">${escapeHtml(lead.message)}</div>` : ""}

        <div style="display:flex;flex-direction:column;gap:6px">
          <label for="note-${lead.id}" style="font-size:12px;font-weight:700;color:var(--tx-2)">Internal note</label>
          <textarea
            id="note-${lead.id}"
            class="textarea"
            rows="2"
            placeholder="Add follow-up notes..."
            maxlength="500"
            data-lead-id="${lead.id}"
            oninput="onNoteInput(this)"
          >${escapeHtml(lead.internalNote || "")}</textarea>
          <div class="row-between">
            <span class="note-count" id="noteCount_${lead.id}">${(lead.internalNote || "").length}/500</span>
            <button class="btn btn-soft btn-sm" type="button" onclick="saveNote(this,'${lead.id}')">Save note</button>
          </div>
        </div>

        <div class="lead-actions">
          ${statusButtons}
          <span style="width:1px;height:24px;background:var(--line);flex-shrink:0"></span>
          ${lead.phone ? `<button class="btn btn-ghost btn-sm" type="button" data-copy="${escapeHtml(lead.phone)}" onclick="copyFromAttr(this)">Copy phone</button>` : ""}
          ${lead.email ? `<button class="btn btn-ghost btn-sm" type="button" data-copy="${escapeHtml(lead.email)}" onclick="copyFromAttr(this)">Copy email</button>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

function onNoteInput(textarea) {
  const count = textarea.value.length;
  const counter = document.getElementById("noteCount_" + textarea.dataset.leadId);
  if (counter) {
    counter.textContent = `${count}/500`;
    counter.className = `note-count${count > 450 ? " near-limit" : ""}`;
  }
}

function setStatus(value) {
  activeStatus = value;
  loadLeads();
}

function setSearch(value) {
  search = value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadLeads, 280);
}

function clearFilters() {
  activeStatus = "";
  search = "";
  const el = document.getElementById("leadSearch");
  if (el) el.value = "";
  loadLeads();
}

function copyFromAttr(btn) {
  const text = btn.dataset.copy || "";
  navigator.clipboard.writeText(text)
    .then(() => toast("Copied!"))
    .catch(() => {
      // Fallback for older browsers
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;opacity:0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast("Copied!");
      } catch {
        toast("Could not copy — try selecting manually.");
      }
    });
}

async function updateLead(btn, id, status) {
  setLoading(btn, true, STATUS_ACTION_LABELS[status] || status);
  try {
    await request(`/admin/restaurant-leads/${id}`, {
      method: "PATCH",
      body: JSON.stringify({ status })
    });
    toast(`Lead marked ${STATUS_META[status]?.label || status}`);
    loadLeads();
  } catch(err) {
    toast(err.message || "Could not update lead");
  } finally {
    setLoading(btn, false);
  }
}

async function saveNote(btn, id) {
  setLoading(btn, true, "Saving...");
  try {
    const note = document.getElementById(`note-${id}`)?.value || "";
    await request(`/admin/restaurant-leads/${id}`, {
      method: "PATCH",
      body: JSON.stringify({ internalNote: note })
    });
    toast("Note saved");
  } catch(err) {
    toast(err.message || "Could not save note");
  } finally {
    setLoading(btn, false);
  }
}

async function markSeen(btn) {
  setLoading(btn, true, "Marking...");
  try {
    await request("/admin/restaurant-leads/mark-seen", { method: "POST", body: JSON.stringify({}) });
    toast("All new leads marked as seen");
    loadLeads();
  } catch(err) {
    toast(err.message || "Could not mark leads seen");
  } finally {
    setLoading(btn, false);
  }
}

initAdminLayout("leads").then(user => {
  if (!user) return;
  if (user.role !== "ADMIN") {
    document.getElementById("leads").innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128274;</div>
        <div class="empty-state-title">Admin only</div>
        <div class="empty-state-sub">Only Avenzo admins can view partner leads.</div>
      </div>`;
    return;
  }
  document.getElementById("adminContext").textContent = "Partner Leads";
  renderStatusTabbar();
  loadLeads();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
