<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Avenzo Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b16">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    @media (max-width: 480px) {
      .lead-detail-grid.grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }
      .lead-detail-grid.grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .lead-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .lead-actions .btn { width: 100%; }
    }

    @media (max-width: 480px) {
      .filter-form.grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head restaurant-sticky">
        <div>
          <div class="eyebrow">Restaurant leads</div>
          <h1>Partner requests</h1>
          <p class="muted">Review, qualify, and convert restaurant interest submissions.</p>
        </div>
        <div class="row row-wrap">
          <button class="btn btn-ghost" type="button" onclick="markSeen()">Mark all seen</button>
          <a class="btn btn-ghost" href="/admin/dashboard.html">Dashboard</a>
        </div>
      </section>

      <section class="grid grid-3" id="leadStats"></section>

      <section class="card card-pad mt-16">
        <div class="filter-form grid grid-2">
          <div class="field">
            <label for="leadSearch">Search</label>
            <input id="leadSearch" class="input" placeholder="Restaurant, contact, phone, email..." oninput="setSearch(this.value)">
          </div>
          <div class="field">
            <label for="statusFilter">Status</label>
            <select id="statusFilter" class="select" onchange="setStatus(this.value)">
              <option value="">All</option>
              <option value="NEW">New</option>
              <option value="CONTACTED">Contacted</option>
              <option value="QUALIFIED">Qualified</option>
              <option value="CONVERTED">Converted</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>
        </div>
      </section>

      <section class="stack mt-16" id="leads"></section>
    </main>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    const statuses = ["NEW", "CONTACTED", "QUALIFIED", "CONVERTED", "CLOSED"];
    let activeStatus = "";
    let search = "";
    let searchTimer = null;

    async function loadLeads() {
      try {
        const user = await initPartnerPage();
        if (!user) return;
        if (user?.role !== "ADMIN") {
          document.getElementById("leads").innerHTML = `<div class="empty">Only Avenzo admins can view restaurant leads.</div>`;
          return;
        }

        document.getElementById("leads").innerHTML = skeletonCards(4);
        const params = new URLSearchParams({ limit: "50" });
        if (activeStatus) params.set("status", activeStatus);
        if (search) params.set("search", search);
        const data = await request(`/admin/restaurant-leads?${params.toString()}`);
        renderStats(data.counts || {}, data.unseenNewCount || 0);
        renderLeads(data.leads || []);
      } catch (err) {
        document.getElementById("leads").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderStats(counts, unseen) {
      const cards = [
        ["NEW", "New", unseen],
        ["CONTACTED", "Contacted", counts.CONTACTED || 0],
        ["QUALIFIED", "Qualified", counts.QUALIFIED || 0],
        ["CONVERTED", "Converted", counts.CONVERTED || 0],
        ["CLOSED", "Closed", counts.CLOSED || 0]
      ];
      document.getElementById("leadStats").innerHTML = cards.map(([key, label, value]) => `
        <article class="card card-pad">
          <div class="muted">${label}</div>
          <h3>${value}</h3>
          <span class="pill ${key === "NEW" && value ? "pill-danger" : "pill"}">${key === "NEW" ? "Unseen new" : key}</span>
        </article>
      `).join("");
    }

    function renderLeads(leads) {
      if (!leads.length) {
        document.getElementById("leads").innerHTML = `<div class="empty">No restaurant leads match this view.</div>`;
        return;
      }

      document.getElementById("leads").innerHTML = leads.map(lead => `
        <article class="card card-pad">
          <div class="row-between">
            <div>
              <h3 class="h3-tight">${escapeHtml(lead.restaurantName)}</h3>
              <div class="muted">${escapeHtml(lead.location || "Location not shared")} - ${formatDate(lead.createdAt)}</div>
            </div>
            <span class="pill ${statusClass(lead.status)}">${escapeHtml(lead.status)}</span>
          </div>
          <div class="lead-detail-grid grid grid-3 mt-12">
            <div><div class="muted">Contact</div><strong>${escapeHtml(lead.contactName)}</strong></div>
            <div><div class="muted">Phone</div><strong>${escapeHtml(lead.phone)}</strong></div>
            <div><div class="muted">Email</div><strong>${escapeHtml(lead.email)}</strong></div>
          </div>
          <div class="lead-detail-grid grid grid-2 mt-12">
            <div><div class="muted">Type</div><strong>${escapeHtml(lead.restaurantType || "Not shared")}</strong></div>
            <div><div class="muted">Daily orders</div><strong>${escapeHtml(lead.approxDailyOrders || "Not shared")}</strong></div>
          </div>
          ${lead.message ? `<p class="muted mt-12">${escapeHtml(lead.message)}</p>` : ""}
          <div class="field mt-12">
            <label for="note-${lead.id}">Internal note</label>
            <textarea id="note-${lead.id}" class="textarea note-textarea" placeholder="Add follow-up note" maxlength="500" data-lead-id="${lead.id}">${escapeHtml(lead.internalNote || "")}</textarea>
            <div class="muted" style="font-size:11px;text-align:right;margin-top:4px" id="noteCount_${lead.id}">${(lead.internalNote || "").length}/500</div>
          </div>
          <div class="lead-actions row row-wrap mt-12">
            ${statuses.filter(status => status !== lead.status).map(status => `
              <button class="btn btn-ghost" type="button" onclick="updateLead('${lead.id}', '${status}')">${statusLabel(status)}</button>
            `).join("")}
            <button class="btn btn-soft" type="button" onclick="saveNote('${lead.id}')">Save note</button>
            <button class="btn btn-ghost" type="button" onclick="copyText('${escapeHtml(lead.phone)}')">Copy phone</button>
            <button class="btn btn-ghost" type="button" onclick="copyText('${escapeHtml(lead.email)}')">Copy email</button>
          </div>
        </article>
      `).join("");

      // Wire up note character counters after rendering
      document.querySelectorAll('.note-textarea').forEach(ta => {
        ta.addEventListener('input', () => {
          const counter = document.getElementById('noteCount_' + ta.dataset.leadId);
          if (counter) counter.textContent = ta.value.length + '/500';
        });
      });
    }

    function statusClass(status) {
      if (status === "NEW") return "pill-danger";
      if (["QUALIFIED", "CONVERTED"].includes(status)) return "pill-success";
      if (status === "CLOSED") return "pill";
      return "pill-warning";
    }

    function statusLabel(status) {
      return {
        CONTACTED: "Mark contacted",
        QUALIFIED: "Mark qualified",
        CONVERTED: "Mark converted",
        CLOSED: "Close",
        NEW: "Reopen new"
      }[status] || status;
    }

    // Clipboard copy with proper error handling
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        toast('Copied!');
      }).catch(() => {
        toast('Could not copy — try manually selecting the text.');
      });
    }

    async function updateLead(id, status) {
      await request(`/admin/restaurant-leads/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ status })
      });
      toast("Lead updated");
      loadLeads();
    }

    async function saveNote(id) {
      await request(`/admin/restaurant-leads/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ internalNote: document.getElementById(`note-${id}`).value })
      });
      toast("Note saved");
      loadLeads();
    }

    async function markSeen() {
      await request("/admin/restaurant-leads/mark-seen", { method: "POST", body: JSON.stringify({}) });
      toast("New leads marked seen");
      loadLeads();
    }

    function setStatus(value) {
      activeStatus = value;
      loadLeads();
    }

    function setSearch(value) {
      search = value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadLeads, 250);
    }

    loadLeads();
  </script>
  <noscript>Please enable JavaScript.</noscript>
</body>

</html>
