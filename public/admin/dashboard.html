<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <button class="btn btn-ghost" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="page">
      <section class="hero-panel" style="margin-bottom:20px;">
        <div class="row-between">
          <div>
            <div class="eyebrow">Admin workspace</div>
            <h1 id="pageTitle">Restaurants</h1>
            <p id="roleText" class="muted">Loading access...</p>
          </div>
          <button id="createBtn" class="btn btn-primary" onclick="openRestaurantModal()">Add restaurant</button>
        </div>
      </section>

      <section class="grid grid-3" id="stats"></section>
      <section class="grid grid-3" id="list" style="margin-top:16px;"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="restaurantModal">
    <form class="modal" onsubmit="createRestaurant(event)">
      <div class="modal-head row-between">
        <div>
          <h3 style="margin:0;">Create restaurant</h3>
          <div class="muted">Only super admins can add new restaurants.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeRestaurantModal()">X</button>
      </div>
      <div class="modal-body stack">
        <div class="field">
          <label for="restaurantName">Restaurant name</label>
          <input id="restaurantName" class="input" required placeholder="Avenzo Cafe">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeRestaurantModal()">Cancel</button>
        <button id="saveRestaurantBtn" class="btn btn-primary" type="submit">Create</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="deleteModal">
    <div class="modal">
      <div class="modal-head">
        <h3 style="margin:0;">Delete restaurant</h3>
        <div class="muted" id="deleteText"></div>
      </div>
      <div class="modal-body">
        <p class="muted" style="margin:0;">This removes the restaurant, categories, menu items, and orders.</p>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
        <button id="deleteBtn" type="button" class="btn btn-danger" onclick="deleteRestaurant()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    requireAuth();

    let canCreateRestaurant = false;
    let deleteTarget = null;

    async function loadRestaurants() {
      try {
        const data = await request("/restaurants");
        const restaurants = data.restaurants || [];
        canCreateRestaurant = !!data.canCreateRestaurant;

        document.getElementById("pageTitle").textContent = canCreateRestaurant ? "All Restaurants" : "Your Restaurants";
        document.getElementById("roleText").textContent = canCreateRestaurant
          ? "Super admin access across every restaurant."
          : "Only restaurants assigned to your account are shown.";
        document.getElementById("createBtn").style.display = canCreateRestaurant ? "inline-flex" : "none";

        renderStats(restaurants, data.user);
        renderRestaurants(restaurants);
      } catch (err) {
        document.getElementById("list").innerHTML = `<div class="empty">${escapeHtml(err.message || "No access")}</div>`;
        toast(err.message);
      }
    }

    function renderStats(restaurants, user) {
      document.getElementById("stats").innerHTML = `
        <div class="card card-pad">
          <div class="muted">Signed in as</div>
          <h3>${escapeHtml(user?.email || "Unknown")}</h3>
          <span class="pill pill-dark">${escapeHtml(user?.role || "USER")}</span>
        </div>
        <div class="card card-pad">
          <div class="muted">Restaurants</div>
          <h3>${restaurants.length}</h3>
          <span class="pill">Visible to you</span>
        </div>
        <div class="card card-pad">
          <div class="muted">Access model</div>
          <h3>${canCreateRestaurant ? "Global" : "Owner"}</h3>
          <span class="pill ${canCreateRestaurant ? "pill-success" : "pill-warning"}">${canCreateRestaurant ? "Super admin" : "Scoped"}</span>
        </div>
      `;
    }

    function renderRestaurants(restaurants) {
      const container = document.getElementById("list");
      if (!restaurants.length) {
        container.innerHTML = `<div class="empty" style="grid-column:1/-1;">No restaurants are assigned to your account yet.</div>`;
        return;
      }

      container.innerHTML = restaurants.map(r => `
        <article class="card card-pad stack">
          <div class="row-between">
            <div>
              <h3 style="margin-bottom:4px;">${escapeHtml(r.name)}</h3>
              <div class="muted">/${escapeHtml(r.slug || "")}</div>
            </div>
            <span class="pill ${r.isActive ? "pill-success" : "pill-danger"}">${r.isActive ? "Active" : "Inactive"}</span>
          </div>
          <div class="row" style="flex-wrap:wrap;">
            <button class="btn btn-dark" onclick="openMenu('${r.id}')">Menu</button>
            <button class="btn btn-soft" onclick="openOrders('${r.id}')">Orders</button>
            <button class="btn btn-ghost" onclick="openQr('${r.id}')">QR</button>
            ${canCreateRestaurant ? `<button class="btn btn-danger" onclick='openDeleteModal(${JSON.stringify(r.id)}, ${JSON.stringify(r.name)})'>Delete</button>` : ""}
          </div>
        </article>
      `).join("");
    }

    function openRestaurantModal() {
      document.getElementById("restaurantName").value = "";
      document.getElementById("restaurantModal").classList.add("open");
      document.getElementById("restaurantName").focus();
    }

    function closeRestaurantModal() {
      document.getElementById("restaurantModal").classList.remove("open");
    }

    async function createRestaurant(event) {
      event.preventDefault();
      const btn = document.getElementById("saveRestaurantBtn");
      setLoading(btn, true, "Creating...");
      try {
        await request("/restaurant", {
          method: "POST",
          body: JSON.stringify({ name: document.getElementById("restaurantName").value.trim() })
        });
        closeRestaurantModal();
        toast("Restaurant created");
        loadRestaurants();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    function openDeleteModal(id, name) {
      deleteTarget = { id, name };
      document.getElementById("deleteText").textContent = `You are about to delete ${name}.`;
      document.getElementById("deleteModal").classList.add("open");
    }

    function closeDeleteModal() {
      deleteTarget = null;
      document.getElementById("deleteModal").classList.remove("open");
    }

    async function deleteRestaurant() {
      if (!deleteTarget) return;
      const btn = document.getElementById("deleteBtn");
      setLoading(btn, true, "Deleting...");
      try {
        await request(`/restaurant/${deleteTarget.id}`, { method: "DELETE" });
        closeDeleteModal();
        toast("Restaurant deleted");
        loadRestaurants();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    function openMenu(id) {
      window.location.href = `/admin/menu.html?restaurantId=${id}`;
    }

    function openOrders(id) {
      window.location.href = `/admin/orders.html?restaurantId=${id}`;
    }

    function openQr(id) {
      window.location.href = `/qr.html?restaurantId=${id}`;
    }

    loadRestaurants();
  </script>
</body>

</html>
