<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
  <style>
    .dash-ops-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .ops-card {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 18px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .ops-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .ops-card-orders::before { background: var(--brand); }
    .ops-card-revenue::before { background: var(--success); }
    .ops-card-active::before { background: var(--warn); }
    .ops-card-stock::before { background: var(--danger); }
    .ops-card-stock-ok::before { background: var(--success); }
    .ops-card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--tx-2);
    }
    .ops-card-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--tx);
      line-height: 1;
    }
    .ops-card-sub {
      font-size: 12px;
      color: var(--tx-2);
    }
    .ops-card-action {
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      text-decoration: none;
      margin-top: 2px;
      display: inline-block;
    }
    .ops-card-action:hover { text-decoration: underline; }

    .dash-section-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--tx-2);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dash-section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    @media (max-width: 900px) {
      .dash-ops-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .dash-ops-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .ops-card { padding: 14px 14px 12px; }
      .ops-card-value { font-size: 26px; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand">
      <img src="/logo.png" alt="Avenzo">
      <span class="admin-brand-name">AVENZO</span>
    </a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Dashboard</span>
    <div class="admin-topbar-right">
      <div id="accountMenu"></div>
    </div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">

      <div class="admin-ph">
        <div class="admin-ph-left">
          <div class="admin-eyebrow">Restaurant hub</div>
          <h1 class="admin-ph-title" id="pageTitle">Dashboard</h1>
          <p class="admin-ph-sub" id="pageRole">Loading your workspace...</p>
        </div>
        <div class="admin-ph-actions">
          <button id="leadsBtn" class="btn btn-ghost hidden" onclick="window.location.href='/admin/leads.html'">
            Partner leads <span id="leadsBadge" class="pill pill-danger hidden"></span>
          </button>
          <button id="createBtn" class="btn btn-primary hidden" onclick="window.location.href='/admin/restaurant-edit.html'">+ Add restaurant</button>
        </div>
      </div>

      <div id="greetingCard"></div>
      <div id="alertBanner"></div>

      <!-- Live operations metrics -->
      <div class="dash-section-label">Today's activity</div>
      <div class="dash-ops-grid" id="opsStats">
        <div class="ops-card ops-card-orders">
          <div class="ops-card-label">Orders today</div>
          <div class="ops-card-value ops-skeleton" style="height:38px;border-radius:6px;background:var(--bg-3)"></div>
          <div class="ops-card-sub">All restaurants</div>
        </div>
        <div class="ops-card ops-card-revenue">
          <div class="ops-card-label">Revenue today</div>
          <div class="ops-card-value ops-skeleton" style="height:38px;border-radius:6px;background:var(--bg-3)"></div>
          <div class="ops-card-sub">Completed orders</div>
        </div>
        <div class="ops-card ops-card-active">
          <div class="ops-card-label">Waiting now</div>
          <div class="ops-card-value ops-skeleton" style="height:38px;border-radius:6px;background:var(--bg-3)"></div>
          <div class="ops-card-sub">Pending &amp; preparing</div>
        </div>
        <div class="ops-card ops-card-stock">
          <div class="ops-card-label">Out of stock</div>
          <div class="ops-card-value ops-skeleton" style="height:38px;border-radius:6px;background:var(--bg-3)"></div>
          <div class="ops-card-sub">Active items hidden</div>
        </div>
      </div>

      <!-- Platform health metrics -->
      <div class="dash-section-label">Platform overview</div>
      <div class="stat-grid" id="stats"></div>

      <div class="dash-section-label">Restaurants</div>
      <div id="list"></div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<script src="/assets/app.js"></script>
<script>
let canCreateRestaurant = false;
let canEditRestaurants = false;
let currentUser = null;
let restaurantCache = [];

async function loadDashboard() {
  try {
    document.getElementById("stats").innerHTML = skeletonCards(4);
    document.getElementById("list").innerHTML = skeletonCards(3);
    const data = await request("/restaurants");
    const restaurants = data.restaurants || [];
    canCreateRestaurant = !!data.canCreateRestaurant;
    canEditRestaurants = !!data.canEditRestaurants;
    currentUser = data.user || currentUser;
    restaurantCache = restaurants;

    const roleLabel = canCreateRestaurant ? "Full access" : currentUser?.role === "EMPLOYEE" ? "Service view" : "Owner view";
    document.getElementById("adminContext").textContent = canCreateRestaurant ? "All Restaurants" : "Your Workspace";
    document.getElementById("pageTitle").textContent = canCreateRestaurant ? "All Restaurants" : "Your Restaurants";
    document.getElementById("pageRole").textContent = canCreateRestaurant
      ? "Manage every restaurant on the platform from this hub."
      : "Showing restaurants assigned to your account.";

    if (canCreateRestaurant) {
      document.getElementById("leadsBtn").classList.remove("hidden");
      document.getElementById("createBtn").classList.remove("hidden");
      loadLeadBadge();
    }

    renderGreeting(currentUser, roleLabel);
    renderAlerts(restaurants);
    renderPlatformStats(restaurants);
    renderRestaurants(restaurants);
  } catch (err) {
    document.getElementById("list").innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏪</div><div class="empty-state-title">Could not load restaurants</div><div class="empty-state-sub">${escapeHtml(err.message || "No access")}</div></div>`;
    toast(err.message);
  }
}

async function loadOpsStats() {
  try {
    const data = await request("/admin/dashboard/stats");
    const stockClass = data.outOfStock > 0 ? "ops-card-stock" : "ops-card-stock-ok";
    document.getElementById("opsStats").innerHTML = `
      <div class="ops-card ops-card-orders">
        <div class="ops-card-label">Orders today</div>
        <div class="ops-card-value">${data.ordersToday}</div>
        <div class="ops-card-sub">Across all restaurants</div>
      </div>
      <div class="ops-card ops-card-revenue">
        <div class="ops-card-label">Revenue today</div>
        <div class="ops-card-value">${money(data.revenueToday)}</div>
        <div class="ops-card-sub">From completed orders</div>
      </div>
      <div class="ops-card ops-card-active">
        <div class="ops-card-label">Waiting now</div>
        <div class="ops-card-value">${data.activeOrders}</div>
        <div class="ops-card-sub">Pending &amp; preparing</div>
        ${data.activeOrders > 0 ? `<a class="ops-card-action" href="/admin/orders.html">View orders →</a>` : ""}
      </div>
      <div class="ops-card ${stockClass}">
        <div class="ops-card-label">Out of stock</div>
        <div class="ops-card-value">${data.outOfStock}</div>
        <div class="ops-card-sub">${data.outOfStock > 0 ? "Items hidden from menu" : "All items in stock"}</div>
        ${data.outOfStock > 0 ? `<a class="ops-card-action" href="/admin/menu.html">Update stock →</a>` : ""}
      </div>
    `;
  } catch (err) {
    document.getElementById("opsStats").innerHTML = `<div class="ops-card" style="grid-column:1/-1"><div class="ops-card-sub">Could not load live stats — ${escapeHtml(err.message)}</div></div>`;
  }
}

function renderGreeting(user, roleLabel) {
  const displayName = user?.name || user?.email || "there";
  const hour = new Date().getHours();
  const greeting = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
  document.getElementById("greetingCard").innerHTML = `
    <div class="greeting-card">
      <div class="greeting-name">${escapeHtml(greeting)}, ${escapeHtml(displayName)}</div>
      <div class="greeting-sub">Here's what's happening across your restaurants today.</div>
      <span class="greeting-role">${escapeHtml(roleLabel)}</span>
    </div>
  `;
}

function renderAlerts(restaurants) {
  const expired   = restaurants.filter(r => r.subscriptionStatus === "EXPIRED" || r.subscriptionStatus === "SUSPENDED");
  const expiring  = restaurants.filter(r => {
    if (!r.subscriptionEndsAt) return false;
    const daysLeft = Math.ceil((new Date(r.subscriptionEndsAt) - Date.now()) / 86400000);
    return daysLeft >= 0 && daysLeft <= 7 && r.subscriptionStatus === "ACTIVE";
  });
  let html = "";
  if (expired.length) {
    html += `<div class="alert-card alert-card-danger"><span class="alert-icon">⚠️</span><span>${expired.length} restaurant${expired.length > 1 ? "s" : ""} paused or expired — subscription renewal needed.</span></div>`;
  }
  if (expiring.length) {
    html += `<div class="alert-card alert-card-warn"><span class="alert-icon">⏳</span><span>${expiring.length} subscription${expiring.length > 1 ? "s" : ""} expiring within 7 days.</span></div>`;
  }
  document.getElementById("alertBanner").innerHTML = html;
}

function renderPlatformStats(restaurants) {
  const active  = restaurants.filter(r => r.isActive && r.subscriptionStatus !== "EXPIRED" && r.subscriptionStatus !== "SUSPENDED").length;
  const trial   = restaurants.filter(r => r.subscriptionStatus === "TRIALING").length;
  const issues  = restaurants.filter(r => !r.isActive || r.subscriptionStatus === "EXPIRED" || r.subscriptionStatus === "SUSPENDED").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat-card stat-top-brand">
      <div class="stat-card-label">Total restaurants</div>
      <div class="stat-card-value">${restaurants.length}</div>
      <span class="pill pill-default">Assigned to you</span>
    </div>
    <div class="stat-card stat-top-ready">
      <div class="stat-card-label">Accepting orders</div>
      <div class="stat-card-value">${active}</div>
      <span class="pill pill-success">Live now</span>
    </div>
    <div class="stat-card stat-top-warn">
      <div class="stat-card-label">On trial</div>
      <div class="stat-card-value">${trial}</div>
      <span class="pill pill-warn">Trial period</span>
    </div>
    <div class="stat-card ${issues > 0 ? "stat-top-danger" : "stat-top-ready"}">
      <div class="stat-card-label">Needs attention</div>
      <div class="stat-card-value">${issues}</div>
      <span class="pill ${issues > 0 ? "pill-danger" : "pill-success"}">${issues > 0 ? "Action needed" : "All good"}</span>
    </div>
  `;
}

function renderRestaurants(restaurants) {
  const container = document.getElementById("list");
  if (!restaurants.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏪</div><div class="empty-state-title">No restaurants yet</div><div class="empty-state-sub">No restaurants are assigned to your account yet.</div></div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "g3 mt-4";
  grid.innerHTML = restaurants.map(r => {
    const subLabel = { ACTIVE: "Active", TRIALING: "Trial", EXPIRED: "Expired", SUSPENDED: "Paused" }[r.subscriptionStatus] || "Unknown";
    const subPill  = { ACTIVE: "pill-success", TRIALING: "pill-warn", EXPIRED: "pill-danger", SUSPENDED: "pill-danger" }[r.subscriptionStatus] || "pill-default";
    const isLive   = r.isActive && r.subscriptionStatus !== "EXPIRED" && r.subscriptionStatus !== "SUSPENDED";
    const svcPill  = isLive ? "pill-success" : "pill-danger";
    const svcLabel = !r.isActive ? "Paused" : r.subscriptionStatus === "SUSPENDED" ? "Suspended" : r.subscriptionStatus === "EXPIRED" ? "Expired" : "Live";
    const foodLabel = { PURE_VEG: "Pure veg", NON_VEG: "Non-veg", BOTH: "Veg & non-veg" }[r.foodType] || "";
    const foodPill  = r.foodType === "PURE_VEG" ? "pill-success" : r.foodType === "NON_VEG" ? "pill-danger" : "pill-brand";
    const initial   = (r.name || "R")[0].toUpperCase();
    const avatarMod = !r.isActive ? " paused" : (!isLive ? " expired" : "");

    let expiryHtml = "";
    if (r.subscriptionEndsAt) {
      const daysLeft = Math.ceil((new Date(r.subscriptionEndsAt) - Date.now()) / 86400000);
      const expiryDate = new Date(r.subscriptionEndsAt).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
      if (daysLeft < 0) {
        expiryHtml = `<div class="rest-card-expiry expired">Expired ${expiryDate}</div>`;
      } else if (daysLeft <= 7) {
        expiryHtml = `<div class="rest-card-expiry expiring">Expires in ${daysLeft} day${daysLeft !== 1 ? "s" : ""}</div>`;
      } else {
        expiryHtml = `<div class="rest-card-expiry">Renews ${expiryDate}</div>`;
      }
    }

    const isEmployee = currentUser?.role === "EMPLOYEE";
    let actions = "";
    if (isEmployee) {
      actions = `<button class="btn btn-primary" onclick="window.location.href='/restaurant/employee.html'">Kitchen view</button>`;
    } else {
      actions = `
        <button class="btn btn-primary btn-sm" onclick="window.location.href='/admin/orders.html?restaurantId=${r.id}'">Orders</button>
        <button class="btn btn-soft btn-sm" onclick="window.location.href='/admin/menu.html?restaurantId=${r.id}'">Menu</button>
        ${canManageStaff(r) ? `<button class="btn btn-ghost btn-sm" onclick="window.location.href='/admin/staff.html?restaurantId=${r.id}'">Staff</button>` : ""}
        ${canEditRestaurants ? `<button class="btn btn-ghost btn-sm" onclick="window.location.href='/admin/payments.html?restaurantId=${r.id}'">Payments</button>` : ""}
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='/qr.html?restaurantId=${r.id}'">QR</button>
        ${canEditRestaurants ? `<button class="btn btn-ghost btn-sm" onclick="window.location.href='/admin/restaurant-edit.html?restaurantId=${r.id}'">Edit</button>` : ""}
      `;
    }

    return `
      <article class="rest-card">
        <div class="rest-card-header">
          <div class="rest-card-avatar${avatarMod}">${escapeHtml(initial)}</div>
          <div class="rest-card-title">
            <div class="rest-card-name" title="${escapeHtml(r.name)}">${escapeHtml(r.name)}</div>
            <div class="rest-card-loc">${escapeHtml(r.address || r.locality || "No address set")}</div>
          </div>
          <span class="pill ${svcPill}" style="flex-shrink:0">${svcLabel}</span>
        </div>
        <div class="rest-card-body">
          <div class="rest-card-meta">
            <span class="pill ${subPill}">${subLabel}</span>
            <span class="pill ${foodPill}">${foodLabel}</span>
          </div>
          ${expiryHtml}
          ${r.owner?.email && canEditRestaurants ? `<div class="rest-card-owner">Owner: ${escapeHtml(r.owner.email)}</div>` : ""}
        </div>
        <div class="rest-card-actions">${actions}</div>
      </article>
    `;
  }).join("");

  container.innerHTML = "";
  container.appendChild(grid);
}

function canManageStaff(r) {
  if (canCreateRestaurant) return true;
  if (currentUser?.role === "RESTAURANT_OWNER" && r.ownerId === currentUser?.id) return true;
  return false;
}

async function loadLeadBadge() {
  try {
    const data = await request("/admin/restaurant-leads/summary");
    const count = data.unseenNewCount || 0;
    const badge = document.getElementById("leadsBadge");
    if (badge) { badge.textContent = count; badge.classList.toggle("hidden", count === 0); }
  } catch {}
}

initAdminLayout("home").then(user => {
  if (!user) return;
  currentUser = user;
  loadOpsStats();
  loadDashboard();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
