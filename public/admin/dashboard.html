<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .workspace-hero {
      position: sticky;
      top: var(--topbar-height);
      z-index: 12;
      margin-bottom: 18px;
    }

    .metric-card h3 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .restaurant-card {
      min-height: 230px;
      display: grid;
      align-content: space-between;
      gap: 16px;
      overflow: hidden;
    }

    .restaurant-card::before {
      content: "";
      height: 5px;
      margin: -16px -16px 0;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    .restaurant-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 760px) {
      .workspace-hero {
        top: var(--topbar-height);
      }

      .restaurant-actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="hero-panel workspace-hero">
        <div class="row-between">
          <div>
            <div class="eyebrow">Restaurant hub</div>
            <h1 id="pageTitle">Restaurants</h1>
            <p id="roleText" class="muted">Getting your restaurants ready...</p>
          </div>
          <div class="row row-wrap">
            <button id="leadsBtn" class="btn btn-ghost" onclick="openLeads()" hidden style="display:none">Restaurant leads <span id="leadsBadge" class="pill pill-danger" hidden>0</span></button>
            <button id="createBtn" class="btn btn-primary" onclick="openRestaurantModal()" hidden style="display:none">Add restaurant</button>
          </div>
        </div>
      </section>

      <section class="grid grid-3" id="stats"></section>
      <section class="grid grid-3 mt-16" id="list"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="restaurantModal">
    <form class="modal" onsubmit="saveRestaurant(event)">
      <div class="modal-head row-between">
        <div>
          <h3 id="restaurantModalTitle" class="section-title">Create restaurant</h3>
          <div class="muted">Set up the restaurant profile and service status.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeRestaurantModal()">X</button>
      </div>
      <div class="modal-body stack">
        <input id="restaurantId" type="hidden">
        <div class="field">
          <label for="restaurantName">Restaurant name</label>
          <input id="restaurantName" class="input" required placeholder="Avenzo Cafe">
        </div>
        <div class="field">
          <label for="restaurantOwnerEmail">Owner email</label>
          <input id="restaurantOwnerEmail" class="input" type="email" placeholder="owner@example.com">
        </div>
        <div class="field">
          <label for="restaurantAddress">Address</label>
          <input id="restaurantAddress" class="input" placeholder="Street, area, Bengaluru">
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="restaurantLocality">Locality</label>
            <input id="restaurantLocality" class="input" placeholder="Jayanagar">
          </div>
          <div class="field">
            <label for="restaurantFoodType">Restaurant food category</label>
            <select id="restaurantFoodType" class="select">
              <option value="PURE_VEG">Pure veg</option>
              <option value="NON_VEG">Non-veg</option>
              <option value="BOTH">Veg & non-veg</option>
            </select>
          </div>
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="restaurantPickupNote">Guest note</label>
            <input id="restaurantPickupNote" class="input" placeholder="Example: Please stay near the dining area after ordering">
          </div>
          <label class="row card card-pad cursor-pointer">
            <input id="restaurantActive" type="checkbox" checked>
            <span>Service active</span>
          </label>
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="subscriptionStatus">Subscription</label>
            <select id="subscriptionStatus" class="select">
              <option value="ACTIVE">Active</option>
              <option value="TRIALING">Trialing</option>
              <option value="EXPIRED">Expired</option>
              <option value="SUSPENDED">Paused</option>
            </select>
          </div>
          <div class="field">
            <label for="subscriptionEndsAt">Subscription ends</label>
            <input id="subscriptionEndsAt" class="input" type="date">
          </div>
        </div>
        <button type="button" class="btn btn-soft" onclick="renewSubscription30Days()">Renew 30 days</button>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeRestaurantModal()">Cancel</button>
        <button id="saveRestaurantBtn" class="btn btn-primary" type="submit">Save</button>
      </div>
    </form>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let canCreateRestaurant = false;
    let canEditRestaurants = false;
    let currentUser = null;
    let restaurantCache = [];

    async function loadRestaurants() {
      try {
        document.getElementById("stats").innerHTML = skeletonCards(3);
        document.getElementById("list").innerHTML = skeletonCards(6);
        const data = await request("/restaurants");
        const restaurants = data.restaurants || [];
        canCreateRestaurant = !!data.canCreateRestaurant;
        canEditRestaurants = !!data.canEditRestaurants;
        currentUser = data.user || null;
        restaurantCache = restaurants;

        document.getElementById("pageTitle").textContent = canCreateRestaurant ? "All Restaurants" : "Your Restaurants";
        document.getElementById("roleText").textContent = canCreateRestaurant
          ? "You can guide every restaurant from this hub."
          : "Only restaurants assigned to you are shown here.";
        document.getElementById("createBtn").hidden = !canCreateRestaurant;
        document.getElementById("createBtn").style.display = canCreateRestaurant ? "inline-flex" : "none";
        document.getElementById("leadsBtn").hidden = !canCreateRestaurant;
        document.getElementById("leadsBtn").style.display = canCreateRestaurant ? "inline-flex" : "none";
        if (canCreateRestaurant) loadLeadBadge();

        renderStats(restaurants, data.user);
        renderRestaurants(restaurants);
      } catch (err) {
        document.getElementById("list").innerHTML = `<div class="empty">${escapeHtml(err.message || "No access")}</div>`;
        toast(err.message);
      }
    }

    function renderStats(restaurants, user) {
      document.getElementById("stats").innerHTML = `
        <div class="card card-pad metric-card">
          <div class="muted">Signed in as</div>
          <h3>${escapeHtml(user?.name || user?.email || "Avenzo user")}</h3>
          <span class="pill pill-dark">${canCreateRestaurant ? "Full access" : "Restaurant access"}</span>
        </div>
        <div class="card card-pad metric-card">
          <div class="muted">Restaurants</div>
          <h3>${restaurants.length}</h3>
          <span class="pill">Visible to you</span>
        </div>
        <div class="card card-pad metric-card">
          <div class="muted">Access</div>
          <h3>${canCreateRestaurant ? "All locations" : "Assigned locations"}</h3>
          <span class="pill ${canCreateRestaurant ? "pill-success" : "pill-warning"}">${canCreateRestaurant ? "Company view" : user?.role === "EMPLOYEE" ? "Service view" : "Owner view"}</span>
        </div>
      `;
    }

    function renderRestaurants(restaurants) {
      const container = document.getElementById("list");
      if (!restaurants.length) {
        container.innerHTML = `<div class="empty empty-full">No restaurants are assigned to your account yet.</div>`;
        return;
      }

      container.innerHTML = restaurants.map(r => `
        <article class="card card-pad restaurant-card">
          <div class="row-between">
            <div>
              <h3 class="h3-tight">${escapeHtml(r.name)}</h3>
              <div class="muted">${escapeHtml(r.address || r.locality || "Manage menu, dine-in orders, and scan cards")}</div>
            </div>
            <span class="pill ${servicePillClass(r)}">${serviceStatusLabel(r)}</span>
          </div>
          <div class="row row-wrap">
            <span class="pill ${r.subscriptionStatus === "ACTIVE" ? "pill-success" : r.subscriptionStatus === "TRIALING" ? "pill-warning" : "pill-danger"}">${subscriptionLabel(r.subscriptionStatus)}</span>
            <span class="pill ${r.foodType === "NON_VEG" ? "pill-nonveg" : "pill-veg"}">${restaurantFoodTypeLabel(r.foodType)}</span>
            ${r.owner?.email ? `<span class="pill">${escapeHtml(r.owner.email)}</span>` : ""}
          </div>
          <div class="restaurant-actions">
            <button class="btn btn-dark" onclick="openMenu('${r.id}')">Menu</button>
            <button class="btn btn-soft" onclick="openOrders('${r.id}')">Orders</button>
            <button class="btn btn-ghost" onclick="openQr('${r.id}')">Scan card</button>
            ${canManageStaff(r) ? `<button class="btn btn-ghost" onclick="openStaff('${r.id}')">Staff</button>` : ""}
            ${canEditRestaurants ? `<button class="btn btn-ghost" onclick='openRestaurantModal(${JSON.stringify(r.id)})'>Edit</button>` : ""}
          </div>
        </article>
      `).join("");
    }

    function subscriptionLabel(value) {
      return {
        ACTIVE: "Subscription active",
        TRIALING: "Trial running",
        EXPIRED: "Subscription expired",
        SUSPENDED: "Service paused"
      }[value] || "Subscription active";
    }

    function isDateExpired(value) {
      return value && new Date(value) < new Date();
    }

    function serviceStatusLabel(restaurant) {
      if (!restaurant.isActive) return "Paused";
      if (restaurant.subscriptionStatus === "SUSPENDED") return "Suspended";
      if (restaurant.subscriptionStatus === "EXPIRED" || isDateExpired(restaurant.subscriptionEndsAt)) return "Expired";
      return "Active";
    }

    function servicePillClass(restaurant) {
      const label = serviceStatusLabel(restaurant);
      if (label === "Active") return "pill-success";
      if (label === "Paused") return "pill-warning";
      return "pill-danger";
    }

    function dateInputValue(value) {
      if (!value) return "";
      return new Date(value).toISOString().slice(0, 10);
    }

    function canManageStaff(restaurant) {
      return canCreateRestaurant || (currentUser?.role === "RESTAURANT_OWNER" && restaurant.owner?.id === currentUser.id);
    }

    function openRestaurantModal(id = "") {
      if (id && !canEditRestaurants) {
        toast("Only the Avenzo admin team can edit restaurant details.");
        return;
      }

      if (!id && !canCreateRestaurant) {
        toast("Only the Avenzo admin team can add a new restaurant.");
        return;
      }

      const restaurant = restaurantCache.find(r => r.id === id);
      document.getElementById("restaurantModalTitle").textContent = restaurant ? "Edit restaurant" : "Create restaurant";
      document.getElementById("restaurantId").value = restaurant?.id || "";
      document.getElementById("restaurantName").value = restaurant?.name || "";
      document.getElementById("restaurantOwnerEmail").value = restaurant?.owner?.email || "";
      document.getElementById("restaurantAddress").value = restaurant?.address || "";
      document.getElementById("restaurantLocality").value = restaurant?.locality || "";
      document.getElementById("restaurantPickupNote").value = restaurant?.pickupNote || "";
      document.getElementById("restaurantFoodType").value = restaurant?.foodType || "BOTH";
      document.getElementById("restaurantActive").checked = restaurant ? restaurant.isActive : true;
      document.getElementById("subscriptionStatus").value = restaurant?.subscriptionStatus || "ACTIVE";
      document.getElementById("subscriptionEndsAt").value = dateInputValue(restaurant?.subscriptionEndsAt);
      document.getElementById("saveRestaurantBtn").textContent = restaurant ? "Save changes" : "Create";
      document.getElementById("restaurantModal").classList.add("open");
      document.getElementById("restaurantName").focus();
    }

    function closeRestaurantModal() {
      document.getElementById("restaurantModal").classList.remove("open");
    }

    async function saveRestaurant(event) {
      event.preventDefault();
      const btn = document.getElementById("saveRestaurantBtn");
      const id = document.getElementById("restaurantId").value;
      if (id && !canEditRestaurants) {
        toast("Only the Avenzo admin team can edit restaurant details.");
        return;
      }
      if (!id && !canCreateRestaurant) {
        toast("Only the Avenzo admin team can add a new restaurant.");
        return;
      }
      setLoading(btn, true, "Saving...");
      try {
        await request(id ? `/restaurant/${id}` : "/restaurant", {
          method: id ? "PUT" : "POST",
          body: JSON.stringify({
            name: document.getElementById("restaurantName").value.trim(),
            ownerEmail: document.getElementById("restaurantOwnerEmail").value.trim() || null,
            address: document.getElementById("restaurantAddress").value.trim() || null,
            locality: document.getElementById("restaurantLocality").value.trim() || null,
            pickupNote: document.getElementById("restaurantPickupNote").value.trim() || null,
            foodType: document.getElementById("restaurantFoodType").value,
            isActive: document.getElementById("restaurantActive").checked,
            subscriptionStatus: document.getElementById("subscriptionStatus").value,
            subscriptionEndsAt: document.getElementById("subscriptionEndsAt").value || null
          })
        });
        closeRestaurantModal();
        toast(id ? "Restaurant updated" : "Restaurant created");
        loadRestaurants();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    function openMenu(id) {
      window.location.href = `/admin/menu.html?restaurantId=${id}`;
    }

    function openOrders(id) {
      window.location.href = `/admin/orders.html?restaurantId=${id}`;
    }

    function openQr(id) {
      window.location.href = `/qr.html?restaurantId=${id}`;
    }

    function openStaff(id) {
      window.location.href = `/admin/staff.html?restaurantId=${id}`;
    }

    function openLeads() {
      window.location.href = "/admin/leads.html";
    }

    async function loadLeadBadge() {
      try {
        const data = await request("/admin/restaurant-leads/summary");
        const count = data.unseenNewCount || 0;
        const badge = document.getElementById("leadsBadge");
        badge.textContent = count;
        badge.hidden = count === 0;
      } catch {
        document.getElementById("leadsBadge").hidden = true;
      }
    }

    function renewSubscription30Days() {
      const date = new Date();
      date.setDate(date.getDate() + 30);
      document.getElementById("subscriptionStatus").value = "ACTIVE";
      document.getElementById("subscriptionEndsAt").value = date.toISOString().slice(0, 10);
    }

    initPartnerPage().then((user) => {
      if (!user) return;
      loadRestaurants();
    });
  </script>
</body>

</html>
