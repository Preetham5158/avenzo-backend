<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand">
      <img src="/logo.png" alt="Avenzo">
      <span class="admin-brand-name">AVENZO</span>
    </a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Loading...</span>
    <div class="admin-topbar-right">
      <div id="accountMenu"></div>
    </div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">

      <div class="admin-ph">
        <div class="admin-ph-left">
          <div class="admin-eyebrow">Restaurant hub</div>
          <h1 class="admin-ph-title" id="pageTitle">Restaurants</h1>
          <p class="admin-ph-sub" id="pageRole">Getting your restaurants ready...</p>
        </div>
        <div class="admin-ph-actions">
          <button id="leadsBtn" class="btn btn-ghost hidden" onclick="openLeads()">
            Partner leads <span id="leadsBadge" class="pill pill-danger hidden"></span>
          </button>
          <button id="createBtn" class="btn btn-primary hidden" onclick="openRestaurantModal()">Add restaurant</button>
        </div>
      </div>

      <div class="stat-grid" id="stats"></div>

      <div class="g3 mt-16" id="list"></div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<div class="modal-backdrop" id="restaurantModal">
  <form class="modal" onsubmit="saveRestaurant(event)">
    <div class="modal-head">
      <div>
        <div class="modal-head-title" id="modalTitle">Create restaurant</div>
        <div class="modal-head-sub">Set up the restaurant profile and service status.</div>
      </div>
      <button type="button" class="modal-close" onclick="closeRestaurantModal()">✕</button>
    </div>
    <div class="modal-body">
      <input id="restaurantId" type="hidden">
      <div class="field"><label>Restaurant name</label><input id="restaurantName" class="input" required placeholder="Avenzo Cafe"></div>
      <div class="field"><label>Owner email</label><input id="restaurantOwnerEmail" class="input" type="email" placeholder="owner@example.com"></div>
      <div class="field"><label>Address</label><input id="restaurantAddress" class="input" placeholder="Street, area, Bengaluru"></div>
      <div class="g2">
        <div class="field"><label>Locality</label><input id="restaurantLocality" class="input" placeholder="Jayanagar"></div>
        <div class="field"><label>Food category</label><select id="restaurantFoodType" class="select"><option value="PURE_VEG">Pure veg</option><option value="NON_VEG">Non-veg</option><option value="BOTH">Veg &amp; non-veg</option></select></div>
      </div>
      <div class="field"><label>Guest note</label><input id="restaurantPickupNote" class="input" placeholder="e.g. Please wait near the dining area after ordering"></div>
      <div class="g2">
        <div class="field"><label>Subscription</label><select id="subscriptionStatus" class="select"><option value="ACTIVE">Active</option><option value="TRIALING">Trialing</option><option value="EXPIRED">Expired</option><option value="SUSPENDED">Paused</option></select></div>
        <div class="field"><label>Subscription ends</label><input id="subscriptionEndsAt" class="input" type="date"></div>
      </div>
      <button type="button" class="btn btn-ghost btn-sm" onclick="renewSubscription30Days()">Renew 30 days</button>
      <label class="toggle-row">
        <span>Service active</span>
        <label class="toggle" style="margin-left:auto"><input id="restaurantActive" type="checkbox" checked><span class="toggle-track"></span></label>
      </label>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" onclick="closeRestaurantModal()">Cancel</button>
      <button id="saveRestaurantBtn" class="btn btn-primary" type="submit">Save</button>
    </div>
  </form>
</div>

<script src="/assets/app.js"></script>
<script>
let canCreateRestaurant = false;
let canEditRestaurants = false;
let currentUser = null;
let restaurantCache = [];

async function loadRestaurants() {
  try {
    document.getElementById("stats").innerHTML = skeletonCards(3);
    document.getElementById("list").innerHTML = skeletonCards(6);
    const data = await request("/restaurants");
    const restaurants = data.restaurants || [];
    canCreateRestaurant = !!data.canCreateRestaurant;
    canEditRestaurants = !!data.canEditRestaurants;
    currentUser = data.user || currentUser;
    restaurantCache = restaurants;

    document.getElementById("adminContext").textContent = canCreateRestaurant ? "All Restaurants" : "Your Workspace";
    document.getElementById("pageTitle").textContent = canCreateRestaurant ? "All Restaurants" : "Your Restaurants";
    document.getElementById("pageRole").textContent = canCreateRestaurant ? "Manage every restaurant from this hub." : "Showing restaurants assigned to your account.";

    if (canCreateRestaurant) {
      document.getElementById("leadsBtn").classList.remove("hidden");
      document.getElementById("createBtn").classList.remove("hidden");
      loadLeadBadge();
    }
    renderStats(restaurants, data.user);
    renderRestaurants(restaurants);
  } catch (err) {
    document.getElementById("list").innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏪</div><div class="empty-state-title">No restaurants found</div><div class="empty-state-sub">${escapeHtml(err.message || "No access")}</div></div>`;
    toast(err.message);
  }
}

function renderStats(restaurants, user) {
  const active = restaurants.filter(r => r.isActive && r.subscriptionStatus !== "EXPIRED" && r.subscriptionStatus !== "SUSPENDED").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat-card stat-top-brand">
      <div class="stat-card-label">Signed in as</div>
      <div class="stat-card-value" style="font-size:18px;margin-bottom:6px">${escapeHtml(user?.name || user?.email || "Avenzo user")}</div>
      <span class="pill ${canCreateRestaurant ? "pill-brand" : "pill-default"}">${canCreateRestaurant ? "Full access" : user?.role === "EMPLOYEE" ? "Service view" : "Owner view"}</span>
    </div>
    <div class="stat-card stat-top-ready">
      <div class="stat-card-label">Restaurants</div>
      <div class="stat-card-value">${restaurants.length}</div>
      <span class="pill pill-default">Assigned to you</span>
    </div>
    <div class="stat-card stat-top-ready">
      <div class="stat-card-label">Active now</div>
      <div class="stat-card-value">${active}</div>
      <span class="pill pill-success">Accepting orders</span>
    </div>
  `;
}

function renderRestaurants(restaurants) {
  const container = document.getElementById("list");
  if (!restaurants.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏪</div><div class="empty-state-title">No restaurants yet</div><div class="empty-state-sub">No restaurants are assigned to your account yet.</div></div>`;
    return;
  }
  container.innerHTML = restaurants.map(r => {
    const subPill = { ACTIVE: "pill-success", TRIALING: "pill-warn", EXPIRED: "pill-danger", SUSPENDED: "pill-danger" }[r.subscriptionStatus] || "pill-default";
    const subLabel = { ACTIVE: "Active", TRIALING: "Trial", EXPIRED: "Expired", SUSPENDED: "Paused" }[r.subscriptionStatus] || "Unknown";
    const svcPill = (!r.isActive || r.subscriptionStatus === "EXPIRED" || r.subscriptionStatus === "SUSPENDED") ? "pill-danger" : "pill-success";
    const svcLabel = (!r.isActive) ? "Paused" : (r.subscriptionStatus === "SUSPENDED" ? "Suspended" : r.subscriptionStatus === "EXPIRED" ? "Expired" : "Live");
    const foodPill = r.foodType === "PURE_VEG" ? "pill-success" : r.foodType === "NON_VEG" ? "pill-danger" : "pill-brand";
    const foodLabel = { PURE_VEG: "Pure veg", NON_VEG: "Non-veg", BOTH: "Veg & non-veg" }[r.foodType] || "";
    const isEmployee = currentUser?.role === "EMPLOYEE";
    const actions = isEmployee ? `
      <button class="btn btn-primary w-full" onclick="openOrders('${r.id}')">Kitchen view</button>
      <button class="btn btn-ghost w-full" onclick="openMenu('${r.id}')">View menu</button>
    ` : `
      <button class="btn btn-primary" onclick="openOrders('${r.id}')">Orders</button>
      <button class="btn btn-soft" onclick="openMenu('${r.id}')">Menu</button>
      <button class="btn btn-ghost" onclick="openQr('${r.id}')">Scan card</button>
      ${canManageStaff(r) ? `<button class="btn btn-ghost" onclick="openStaff('${r.id}')">Staff</button>` : ""}
      ${canEditRestaurants ? `<button class="btn btn-ghost" onclick="openPayments('${r.id}')">Payments</button>` : ""}
      ${canEditRestaurants ? `<button class="btn btn-ghost" onclick='openRestaurantModal("${r.id}")'>Edit</button>` : ""}
    `;
    return `
      <article class="rest-card">
        <div class="rest-card-bar"></div>
        <div class="rest-card-body">
          <div class="row-between">
            <div>
              <div class="rest-card-name">${escapeHtml(r.name)}</div>
              <div class="rest-card-sub">${escapeHtml(r.address || r.locality || "Manage menu, dine-in orders, and scan cards")}</div>
            </div>
            <span class="pill ${svcPill}">${svcLabel}</span>
          </div>
          <div class="row-wrap">
            <span class="pill ${subPill}">${subLabel}</span>
            <span class="pill ${foodPill}">${foodLabel}</span>
            ${r.owner?.email ? `<span class="pill pill-default">${escapeHtml(r.owner.email)}</span>` : ""}
          </div>
        </div>
        <div class="rest-card-actions">${actions}</div>
      </article>
    `;
  }).join("");
}

function canManageStaff(r) {
  if (canCreateRestaurant) return true;
  if (currentUser?.role === "RESTAURANT_OWNER" && r.ownerId === currentUser?.id) return true;
  return false;
}

function openOrders(id) {
  if (currentUser?.role === "EMPLOYEE") { window.location.href = "/restaurant/employee.html"; return; }
  window.location.href = `/admin/orders.html?restaurantId=${id}`;
}
function openMenu(id)     { window.location.href = `/admin/menu.html?restaurantId=${id}`; }
function openStaff(id)    { window.location.href = `/admin/staff.html?restaurantId=${id}`; }
function openPayments(id) { window.location.href = `/admin/payments.html?restaurantId=${id}`; }
function openQr(id)       { window.location.href = `/qr.html?restaurantId=${id}`; }
function openLeads()      { window.location.href = "/admin/leads.html"; }

async function loadLeadBadge() {
  try {
    const data = await request("/admin/restaurant-leads/summary");
    const count = data.unseenNewCount || 0;
    const badge = document.getElementById("leadsBadge");
    if (badge) { badge.textContent = count; badge.classList.toggle("hidden", count === 0); }
  } catch {}
}

// Create/Edit restaurant modal
let editingRestaurantId = null;

function openRestaurantModal(id = "") {
  editingRestaurantId = id || "";
  const r = restaurantCache.find(x => x.id === id);
  document.getElementById("modalTitle").textContent = r ? "Edit restaurant" : "Create restaurant";
  document.getElementById("restaurantId").value = id;
  document.getElementById("restaurantName").value = r?.name || "";
  document.getElementById("restaurantOwnerEmail").value = r?.owner?.email || "";
  document.getElementById("restaurantAddress").value = r?.address || "";
  document.getElementById("restaurantLocality").value = r?.locality || "";
  document.getElementById("restaurantPickupNote").value = r?.pickupNote || "";
  document.getElementById("restaurantFoodType").value = r?.foodType || "BOTH";
  document.getElementById("restaurantActive").checked = r ? r.isActive : true;
  document.getElementById("subscriptionStatus").value = r?.subscriptionStatus || "ACTIVE";
  document.getElementById("subscriptionEndsAt").value = r?.subscriptionEndsAt ? r.subscriptionEndsAt.slice(0,10) : "";
  document.getElementById("restaurantModal").classList.add("open");
  document.getElementById("restaurantName").focus();
}
function closeRestaurantModal() {
  document.getElementById("restaurantModal").classList.remove("open");
}
function renewSubscription30Days() {
  const d = new Date(); d.setDate(d.getDate() + 30);
  document.getElementById("subscriptionStatus").value = "ACTIVE";
  document.getElementById("subscriptionEndsAt").value = d.toISOString().slice(0,10);
}
async function saveRestaurant(event) {
  event.preventDefault();
  const btn = document.getElementById("saveRestaurantBtn");
  setLoading(btn, true, "Saving...");
  try {
    const id = document.getElementById("restaurantId").value;
    const body = {
      name: document.getElementById("restaurantName").value.trim(),
      ownerEmail: document.getElementById("restaurantOwnerEmail").value.trim() || undefined,
      address: document.getElementById("restaurantAddress").value.trim() || undefined,
      locality: document.getElementById("restaurantLocality").value.trim() || undefined,
      pickupNote: document.getElementById("restaurantPickupNote").value.trim() || undefined,
      foodType: document.getElementById("restaurantFoodType").value,
      isActive: document.getElementById("restaurantActive").checked,
      subscriptionStatus: document.getElementById("subscriptionStatus").value,
      subscriptionEndsAt: document.getElementById("subscriptionEndsAt").value || undefined,
    };
    if (id) {
      await request(`/restaurant/${id}`, { method: "PUT", body: JSON.stringify(body) });
      toast("Restaurant updated");
    } else {
      await request("/restaurant", { method: "POST", body: JSON.stringify(body) });
      toast("Restaurant created");
    }
    closeRestaurantModal();
    loadRestaurants();
  } catch (err) {
    toast(err.message);
  } finally {
    setLoading(btn, false);
  }
}

document.getElementById("restaurantModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeRestaurantModal(); });

initAdminLayout("home").then(user => {
  if (!user) return;
  currentUser = user;
  loadRestaurants();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
