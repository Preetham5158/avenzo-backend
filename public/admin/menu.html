<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Menu — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
  <style>
    .menu-row {
      display: grid;
      grid-template-columns: 68px 1fr auto;
      gap: 14px;
      align-items: start;
    }
    .menu-img {
      width: 68px;
      height: 68px;
      border-radius: var(--r-sm);
      object-fit: cover;
      background: var(--bg-3);
      flex-shrink: 0;
    }
    .menu-name { font-size: 15px; font-weight: 700; color: var(--tx); margin-bottom: 3px; }
    .menu-meta { font-size: 12px; color: var(--tx-2); margin-bottom: 4px; }
    .menu-price { font-size: 15px; font-weight: 800; color: var(--tx); margin-bottom: 4px; }
    .menu-desc {
      font-size: 13px;
      color: var(--tx-2);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .admin-subhead {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    @media (max-width: 600px) {
      .menu-row {
        grid-template-columns: 60px 1fr;
      }
      .menu-actions {
        grid-column: 1 / -1;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .menu-img { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand"><img src="/logo.png" alt="Avenzo"><span class="admin-brand-name">AVENZO</span></a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Loading...</span>
    <div class="admin-topbar-right"><div id="accountMenu"></div></div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">
      <div id="restCtxBar" class="rest-ctx" style="display:none"></div>

      <div class="admin-ph">
        <div>
          <div class="admin-eyebrow">Menu care</div>
          <h1 class="admin-ph-title" id="restaurantName">Loading...</h1>
          <p class="admin-ph-sub">Keep dishes, prices and availability up to date.</p>
        </div>
        <div class="admin-ph-actions">
          <button id="addItemBtn" class="btn btn-primary hidden" onclick="openItemModal()">Add item</button>
        </div>
      </div>

      <div class="stat-grid" id="menuStats"></div>

      <div class="admin-subhead" style="position:sticky;top:var(--topbar-h);z-index:20;background:var(--bg);padding:14px 0 12px;margin-bottom:4px">
        <input class="input" id="menuSearch" placeholder="Search items..." oninput="setMenuSearch(this.value)">
        <div class="tab-bar" id="foodTypeTabs"></div>
        <div class="tab-bar" id="categoryTabs" style="overflow-x:auto"></div>
      </div>

      <div class="stack" id="menuList"></div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<!-- Item modal -->
<div class="modal-backdrop" id="itemModal">
  <form class="modal" onsubmit="saveItem(event)">
    <div class="modal-head">
      <div>
        <div class="modal-head-title" id="itemModalTitle">Add item</div>
        <div class="modal-head-sub">Changes appear for guests right away.</div>
      </div>
      <button type="button" class="modal-close" onclick="closeItemModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <input id="itemId" type="hidden">
      <div class="g2">
        <div class="field"><label>Name</label><input id="itemName" class="input" required placeholder="Masala dosa"></div>
        <div class="field"><label>Price (&#8377;)</label><input id="itemPrice" class="input" type="number" required min="0" step="1" placeholder="199"></div>
      </div>
      <div class="g2">
        <div class="field"><label>Category</label><select id="itemCategory" class="select"></select></div>
        <div class="field"><label>Food type</label><select id="itemFoodType" class="select"><option value="VEG">Veg</option><option value="NON_VEG">Non-veg</option></select></div>
      </div>
      <div class="field"><label>Description</label><textarea id="itemDescription" class="textarea" placeholder="Short description..." rows="2"></textarea></div>
      <div class="field"><label>Image URL</label><input id="itemImageUrl" class="input" type="url" placeholder="https://..."></div>
      <label class="toggle-row">
        <span>In stock</span>
        <label class="toggle" style="margin-left:auto"><input id="itemAvailable" type="checkbox" checked><span class="toggle-track"></span></label>
      </label>
      <label class="toggle-row">
        <span>Visible on menu</span>
        <label class="toggle" style="margin-left:auto"><input id="itemActive" type="checkbox" checked><span class="toggle-track"></span></label>
      </label>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" onclick="closeItemModal()">Cancel</button>
      <button id="saveItemBtn" class="btn btn-primary" type="submit">Save item</button>
    </div>
  </form>
</div>

<!-- Category modal -->
<div class="modal-backdrop" id="catModal">
  <form class="modal" onsubmit="saveCat(event)" style="max-width:380px">
    <div class="modal-head">
      <div><div class="modal-head-title">Add category</div></div>
      <button type="button" class="modal-close" onclick="closeCatModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Category name</label><input id="catName" class="input" required placeholder="e.g. Starters"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" onclick="closeCatModal()">Cancel</button>
      <button id="saveCatBtn" class="btn btn-primary" type="submit">Add</button>
    </div>
  </form>
</div>

<script src="/assets/app.js"></script>
<script>
const restaurantId = new URLSearchParams(location.search).get("restaurantId");
let currentUser = null, menuItems = [], categories = [], activeFood = "ALL", activeCat = "ALL", menuSearch = "";

async function loadMenu() {
  try {
    document.getElementById("menuList").innerHTML = skeletonCards(4);
    const data = await request(`/admin/menu/${restaurantId}`);
    menuItems = data.items || data.menu || [];
    categories = data.categories || [];
    const restaurantName = data.restaurant?.name || "Menu";
    document.getElementById("restaurantName").textContent = restaurantName;
    document.getElementById("adminContext").textContent = restaurantName;
    if (data.restaurant) {
      document.getElementById("restCtxBar").style.display = "";
      renderRestaurantContext(data.restaurant, "menu", restaurantId);
    }
    renderMenuStats();
    renderFoodTabs(data.restaurant?.foodType);
    renderCategoryTabs();
    renderMenu();
  } catch(err) {
    if (err.status === 423) {
      document.getElementById("menuList").innerHTML = `<div class="card card-p"><div class="admin-ph-title">Workspace paused</div><p class="muted mt-8">${escapeHtml(err.message)}</p></div>`;
    } else {
      document.getElementById("menuList").innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#127869;</div><div class="empty-state-title">Could not load menu</div><div class="empty-state-sub">${escapeHtml(err.message)}</div></div>`;
    }
    toast(err.message);
  }
}

function renderMenuStats() {
  const avail = menuItems.filter(i => i.isAvailable).length;
  const hidden = menuItems.filter(i => !i.isActive).length;
  document.getElementById("menuStats").innerHTML = `
    <div class="stat-card stat-top-brand"><div class="stat-card-label">Total items</div><div class="stat-card-value">${menuItems.length}</div></div>
    <div class="stat-card stat-top-ready"><div class="stat-card-label">In stock</div><div class="stat-card-value">${avail}</div></div>
    <div class="stat-card stat-top-warn"><div class="stat-card-label">Hidden</div><div class="stat-card-value">${hidden}</div></div>
    <div class="stat-card stat-top-brand"><div class="stat-card-label">Categories</div><div class="stat-card-value">${categories.length}</div></div>
  `;
}

function renderFoodTabs(restaurantFoodType) {
  const opts = restaurantFoodType === "PURE_VEG"
    ? [["ALL","All"],["VEG","Veg"]]
    : restaurantFoodType === "NON_VEG"
      ? [["ALL","All"],["NON_VEG","Non-veg"]]
      : [["ALL","All"],["VEG","Veg"],["NON_VEG","Non-veg"]];
  document.getElementById("foodTypeTabs").innerHTML = opts.map(([k,l]) =>
    `<button class="tab-btn ${activeFood===k?"active":""}" onclick="setFoodFilter('${k}')">${l}</button>`
  ).join("");
}

function renderCategoryTabs() {
  document.getElementById("categoryTabs").innerHTML =
    `<button class="tab-btn ${activeCat==="ALL"?"active":""}" onclick="setCatFilter('ALL')">All</button>` +
    categories.map(c =>
      `<button class="tab-btn ${activeCat===c.id?"active":""}" onclick="setCatFilter('${c.id}')">${escapeHtml(c.name)}</button>`
    ).join("");
}

function renderMenu() {
  let items = menuItems.slice();
  if (activeFood !== "ALL") items = items.filter(i => i.foodType === activeFood);
  if (activeCat !== "ALL") items = items.filter(i => i.categoryId === activeCat);
  if (menuSearch) items = items.filter(i =>
    (i.name||"").toLowerCase().includes(menuSearch) || (i.description||"").toLowerCase().includes(menuSearch)
  );
  const container = document.getElementById("menuList");
  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#127869;</div><div class="empty-state-title">No items found</div><div class="empty-state-sub">Try a different search or filter.</div></div>`;
    return;
  }
  const canManage = currentUser && currentUser.role !== "EMPLOYEE";
  container.innerHTML = items.map(item => {
    const catName = categories.find(c => c.id === item.categoryId)?.name || "Uncategorised";
    const foodLabel = item.foodType === "VEG" ? "Veg" : "Non-veg";
    return `
      <div class="card card-p">
        <div class="menu-row">
          <img class="menu-img" src="${escapeHtml(item.imageUrl||"/logo.png")}" alt="${escapeHtml(item.name)}" onerror="this.src='/logo.png'">
          <div>
            <div class="menu-name">${escapeHtml(item.name)}${!item.isActive?` <span class="pill pill-danger" style="font-size:10px;vertical-align:middle">Hidden</span>`:""}</div>
            <div class="menu-meta">${escapeHtml(catName)} &middot; ${foodLabel}</div>
            <div class="menu-price">${money(item.pricePaise)}</div>
            ${item.description ? `<div class="menu-desc">${escapeHtml(item.description)}</div>` : ""}
          </div>
          <div class="menu-actions">
            <label class="toggle" title="${item.isAvailable?"In stock — tap to mark out":"Out of stock — tap to mark in"}">
              <input type="checkbox" ${item.isAvailable?"checked":""} onchange="toggleStock(this,'${item.id}')">
              <span class="toggle-track"></span>
            </label>
            ${canManage ? `<button class="btn btn-ghost btn-sm" onclick='openItemModal(${JSON.stringify(item.id)})'>Edit</button>` : ""}
            ${canManage ? `<button class="btn btn-danger-soft btn-sm" onclick="deleteItem('${item.id}',${JSON.stringify(item.name)})">Delete</button>` : ""}
          </div>
        </div>
      </div>
    `;
  }).join("");

  // Add category button for owners/admins
  if (canManage) {
    const addCatBtn = document.createElement("div");
    addCatBtn.style.marginTop = "12px";
    addCatBtn.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="openCatModal()">+ Add category</button>`;
    container.appendChild(addCatBtn);
  }
}

function setFoodFilter(v) { activeFood = v; renderFoodTabs(); renderMenu(); }
function setCatFilter(v)  { activeCat = v; renderCategoryTabs(); renderMenu(); }
function setMenuSearch(v) { menuSearch = v.trim().toLowerCase(); renderMenu(); }

async function toggleStock(checkbox, itemId) {
  const available = checkbox.checked;
  checkbox.disabled = true;
  try {
    await request(`/menu/${itemId}`, { method: "PUT", body: JSON.stringify({ isAvailable: available }) });
    const item = menuItems.find(i => i.id === itemId);
    if (item) item.isAvailable = available;
    toast(available ? "Marked in stock" : "Marked out of stock");
  } catch(err) {
    checkbox.checked = !available;
    toast(err.message);
  } finally {
    checkbox.disabled = false;
  }
}

// Item modal
let editingItemId = null;
function openItemModal(id) {
  id = id || "";
  editingItemId = id;
  const item = menuItems.find(i => i.id === id);
  document.getElementById("itemModalTitle").textContent = item ? "Edit item" : "Add item";
  document.getElementById("itemId").value = id;
  document.getElementById("itemName").value = item?.name || "";
  document.getElementById("itemPrice").value = item ? (item.pricePaise / 100).toFixed(0) : "";
  document.getElementById("itemFoodType").value = item?.foodType || "VEG";
  document.getElementById("itemDescription").value = item?.description || "";
  document.getElementById("itemImageUrl").value = item?.imageUrl || "";
  document.getElementById("itemAvailable").checked = item ? item.isAvailable : true;
  document.getElementById("itemActive").checked = item ? item.isActive : true;
  document.getElementById("itemCategory").innerHTML =
    `<option value="">No category</option>` +
    categories.map(c =>
      `<option value="${c.id}" ${item?.categoryId === c.id ? "selected" : ""}>${escapeHtml(c.name)}</option>`
    ).join("");
  document.getElementById("itemModal").classList.add("open");
}
function closeItemModal() { document.getElementById("itemModal").classList.remove("open"); }

async function saveItem(event) {
  event.preventDefault();
  const btn = document.getElementById("saveItemBtn");
  setLoading(btn, true, "Saving...");
  try {
    const id = document.getElementById("itemId").value;
    const body = {
      name: document.getElementById("itemName").value.trim(),
      pricePaise: Math.round(parseFloat(document.getElementById("itemPrice").value) * 100),
      categoryId: document.getElementById("itemCategory").value || undefined,
      foodType: document.getElementById("itemFoodType").value,
      description: document.getElementById("itemDescription").value.trim() || undefined,
      imageUrl: document.getElementById("itemImageUrl").value.trim() || undefined,
      isAvailable: document.getElementById("itemAvailable").checked,
      isActive: document.getElementById("itemActive").checked,
      restaurantId
    };
    if (id) {
      await request(`/menu/${id}`, { method: "PUT", body: JSON.stringify(body) });
      toast("Item updated");
    } else {
      await request("/menu", { method: "POST", body: JSON.stringify(body) });
      toast("Item added");
    }
    closeItemModal();
    loadMenu();
  } catch(err) {
    toast(err.message);
  } finally {
    setLoading(btn, false);
  }
}

async function deleteItem(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await request(`/menu/${id}`, { method: "DELETE" });
    toast("Item deleted");
    loadMenu();
  } catch(err) {
    toast(err.message);
  }
}

// Category modal
function openCatModal() { document.getElementById("catName").value = ""; document.getElementById("catModal").classList.add("open"); }
function closeCatModal() { document.getElementById("catModal").classList.remove("open"); }

async function saveCat(event) {
  event.preventDefault();
  const btn = document.getElementById("saveCatBtn");
  setLoading(btn, true, "Saving...");
  try {
    await request("/category", { method: "POST", body: JSON.stringify({ name: document.getElementById("catName").value.trim(), restaurantId }) });
    toast("Category added");
    closeCatModal();
    loadMenu();
  } catch(err) {
    toast(err.message);
  } finally {
    setLoading(btn, false);
  }
}

document.getElementById("itemModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeItemModal(); });
document.getElementById("catModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeCatModal(); });

initAdminLayout("menu", restaurantId).then(user => {
  if (!user) return;
  currentUser = user;
  if (user.role !== "EMPLOYEE") {
    document.getElementById("addItemBtn").classList.remove("hidden");
  }
  loadMenu();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
