<!DOCTYPE html>
<html>

<head>
    <title>Menu Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            background: #f5f7fb;
        }

        header {
            background: white;
            padding: 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        button {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        .primary {
            background: linear-gradient(45deg, #ff7a00, #ffb300);
            color: white;
        }

        .danger {
            background: #ff4d4f;
            color: white;
        }

        select {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <header>
        <div>🍽 Menu</div>
        <button onclick="goBack()">Back</button>
    </header>

    <div class="container">
        <button class="add" onclick="addItem()">+ Add Item</button>
        <div id="menu"></div>
    </div>

    <script>
        const API = "https://avenzo.app";
        const token = localStorage.getItem("token");
        const restaurantId = new URLSearchParams(location.search).get("restaurantId");

        async function loadMenu() {
            const res = await fetch(`${API}/menu/${restaurantId}`);
            const data = await res.json();

            const container = document.getElementById("menu");
            container.innerHTML = "";

            data.forEach(i => {
                const div = document.createElement("div");
                div.className = "card";

                div.innerHTML = `
      <b>${i.name}</b> - ₹${i.price} <br>
      ${i.category}<br><br>

      <button onclick="toggle('${i.id}', ${i.isAvailable})">
        ${i.isAvailable ? "Disable" : "Enable"}
      </button>

      <button onclick="editItem('${i.id}', '${i.name}', ${i.price}, '${i.category}')">Edit</button>
<button onclick="deleteItem('${i.id}')">Delete</button>
    `;

                container.appendChild(div);
            });
        }

        async function addItem() {
            const name = prompt("Item name");
            const price = prompt("Price");
            const category = prompt("Category");

            if (!name || !price || !category) return;

            await fetch(`${API}/menu`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({ name, price, category, restaurantId })
            });

            loadMenu();
        }

        async function editItem(id, name, price, category) {
            const newName = prompt("Edit name", name);
            const newPrice = prompt("Edit price", price);
            const newCategory = prompt("Edit category", category);

            if (!newName || !newPrice || !newCategory) return;

            await fetch(`${API}/menu/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({
                    name: newName,
                    price: Number(newPrice),
                    category: newCategory
                })
            });

            loadMenu();
        }

        async function deleteItem(id) {
            await fetch(`${API}/menu/${id}`, {
                method: "DELETE",
                headers: { Authorization: "Bearer " + token }
            });

            loadMenu();
        }

        async function toggle(id, current) {
            // fetch full item first
            const res = await fetch(`${API}/menu/${restaurantId}`);
            const data = await res.json();

            const item = data.find(i => i.id === id);

            await fetch(`${API}/menu/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({
                    name: item.name,
                    price: item.price,
                    category: item.category,
                    isAvailable: !current
                })
            });

            loadMenu();
        }

        function goBack() {
            history.back();
        }

        loadMenu();
    </script>

</body>

</html>
