<!DOCTYPE html>
<html>

<head>
  <title>Menu Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: 'Inter', Arial;
      margin: 0;
      background: #f5f7fb;
    }

    header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      display: flex;
      gap: 15px;
      background: white;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    .img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      background: #eee;
      object-fit: cover;
    }

    .info {
      flex: 1;
    }

    .name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 13px;
      color: #666;
    }

    .actions {
      margin-top: 10px;
    }

    button {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 5px;
    }

    .primary {
      background: #ff7a00;
      color: white;
    }

    .secondary {
      background: #ddd;
    }

    .danger {
      background: #ff4d4f;
      color: white;
    }

    .tag {
      font-size: 12px;
      margin-top: 5px;
    }

    .out {
      color: red;
    }

    .hidden {
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <div>🍽 Menu</div>
  <button onclick="goBack()">Back</button>
</header>

<div class="container">
  <button class="primary" onclick="addItem()">+ Add Item</button>
  <div id="menu"></div>
</div>

<script>
const API = "https://avenzo.app";
const token = localStorage.getItem("token");
const restaurantId = new URLSearchParams(location.search).get("restaurantId");
let categories = [];

async function loadCategories() {
  const res = await fetch(`${API}/categories/${restaurantId}`, {
    headers: { Authorization: "Bearer " + token }
  });
  categories = await res.json();
}

async function getCategoryId(defaultCategoryId) {
  const defaultCategory = categories.find(c => c.id === defaultCategoryId);
  const options = categories.map(c => c.name).join(", ");
  const categoryName = prompt("Category" + (options ? ` (${options})` : ""), defaultCategory?.name || "");

  if (!categoryName) return null;

  const existing = categories.find(c => c.name.toLowerCase() === categoryName.trim().toLowerCase());
  if (existing) return existing.id;

  const res = await fetch(`${API}/category`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      name: categoryName.trim(),
      restaurantId
    })
  });

  const created = await res.json();
  if (!res.ok) {
    alert(created.error || "Could not create category");
    return null;
  }

  categories.push(created);
  return created.id;
}

/* ================================
   LOAD MENU (ADMIN API)
================================ */
async function loadMenu() {
  await loadCategories();

  const res = await fetch(`${API}/admin/menu/${restaurantId}`, {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();
  const container = document.getElementById("menu");

  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "No items";
    return;
  }

  data.forEach(i => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img class="img" src="${i.imageUrl || 'https://via.placeholder.com/80'}" />

      <div class="info">
        <div class="name">${i.name} - ₹${i.price}</div>
        <div class="desc">${i.category?.name || "Uncategorized"}</div>
        <div class="desc">${i.description || ""}</div>

        <div class="tag">
          ${!i.isAvailable ? '<span class="out">Out of stock</span>' : ''}
          ${!i.isActive ? '<span class="hidden">Hidden</span>' : ''}
        </div>

        <div class="actions">
          <button onclick="toggleStock('${i.id}', ${i.isAvailable})">
            ${i.isAvailable ? "Out of Stock" : "Mark Available"}
          </button>

          <button onclick="toggleVisibility('${i.id}', ${i.isActive})">
            ${i.isActive ? "Hide" : "Show"}
          </button>

          <button onclick='editItem(${JSON.stringify(i.id)}, ${JSON.stringify(i.name)}, ${Number(i.price)}, ${JSON.stringify(i.categoryId)}, ${JSON.stringify(i.description || "")}, ${JSON.stringify(i.imageUrl || "")})'>
            Edit
          </button>
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

/* ================================
   ADD ITEM
================================ */
async function addItem() {
  const name = prompt("Name");
  const price = prompt("Price");
  const categoryId = await getCategoryId();
  const description = prompt("Description");
  const imageUrl = prompt("Image URL");

  if (!name || !price || !categoryId) return;

  await fetch(`${API}/menu`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      name,
      price,
      categoryId,
      description,
      imageUrl,
      restaurantId
    })
  });

  loadMenu();
}

/* ================================
   EDIT
================================ */
async function editItem(id, name, price, categoryId, description, imageUrl) {
  const newName = prompt("Name", name);
  const newPrice = prompt("Price", price);
  const newCategoryId = await getCategoryId(categoryId);
  const newDesc = prompt("Description", description);
  const newImage = prompt("Image URL", imageUrl);

  if (!newName || !newPrice || !newCategoryId) return;

  await fetch(`${API}/menu/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      name: newName,
      price: Number(newPrice),
      categoryId: newCategoryId,
      description: newDesc,
      imageUrl: newImage
    })
  });

  loadMenu();
}

/* ================================
   STOCK TOGGLE
================================ */
async function toggleStock(id, current) {
  await fetch(`${API}/menu/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ isAvailable: !current })
  });

  loadMenu();
}

/* ================================
   VISIBILITY TOGGLE
================================ */
async function toggleVisibility(id, current) {
  await fetch(`${API}/menu/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ isActive: !current })
  });

  loadMenu();
}

function goBack() {
  history.back();
}

loadMenu();
</script>

</body>
</html>
