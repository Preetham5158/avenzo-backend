<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Menu Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .menu-item {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .menu-img {
      width: 88px;
      height: 88px;
      border-radius: var(--radius);
      object-fit: cover;
      background: #eef0f4;
    }

    .menu-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .menu-admin-tools {
      position: sticky;
      top: calc(var(--topbar-height) + 110px);
      z-index: 13;
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
      padding: 12px;
    }

    .menu-copy {
      min-width: 0;
    }

    .food-toggle {
      width: min(320px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: #fffdf8;
      border: 1px solid var(--line);
    }

    .toggle-option {
      min-height: 36px;
      border-radius: 999px;
      background: transparent;
      color: #614231;
      font-weight: 800;
      cursor: pointer;
    }

    .toggle-option.active {
      background: var(--cocoa);
      color: white;
    }

    @media (max-width: 760px) {
      .menu-item {
        grid-template-columns: 72px minmax(0, 1fr);
      }

      .menu-actions {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .menu-img {
        width: 72px;
        height: 72px;
      }

      .menu-admin-tools {
        top: calc(var(--topbar-height) + 130px);
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head restaurant-sticky">
        <div>
          <div class="eyebrow">Menu care</div>
          <h1 id="restaurantName">Getting menu...</h1>
          <p class="muted" id="restaurantAddress">Keep dishes, prices, and availability easy for guests to choose.</p>
        </div>
        <button id="addItemBtn" class="btn btn-primary" onclick="openItemModal()" hidden style="display:none">Add item</button>
      </section>

      <section class="menu-admin-tools app-panel">
        <div class="field">
          <label for="adminMenuSearch">Find an item quickly</label>
          <input id="adminMenuSearch" class="input" placeholder="Dish, category, available, hidden..." oninput="setMenuSearch(this.value)">
        </div>
        <section class="food-toggle" id="foodTypeTabs" aria-label="Food type filter"></section>
        <section class="tabbar surface-strip" id="categoryTabs"></section>
      </section>
      <section class="stack mt-12" id="menu"></section>
    </main>
  </div>
  <nav class="admin-dock">
    <a href="/admin/dashboard.html">Home</a>
    <a class="active" href="#">Menu</a>
    <a href="#" onclick="goOrders(event)">Orders</a>
  </nav>

  <div class="modal-backdrop" id="itemModal">
    <form class="modal" onsubmit="saveItem(event)">
      <div class="modal-head row-between">
        <div>
          <h3 id="modalTitle" class="section-title">Add item</h3>
          <div class="muted">Saved changes appear for guests right away.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeItemModal()">X</button>
      </div>

      <div class="modal-body stack">
        <input id="itemId" type="hidden">
        <div class="grid grid-2">
          <div class="field">
            <label for="itemName">Name</label>
            <input id="itemName" class="input" required placeholder="Masala dosa">
          </div>
          <div class="field">
            <label for="itemPrice">Price</label>
            <input id="itemPrice" class="input" type="number" min="0" step="0.01" required placeholder="120">
          </div>
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label for="itemCategory">Category</label>
            <select id="itemCategory" class="select" required></select>
          </div>
          <div class="field">
            <label for="itemFoodType">Food type</label>
            <select id="itemFoodType" class="select" required>
              <option value="VEG">Veg</option>
              <option value="NON_VEG">Non-veg</option>
            </select>
          </div>
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label for="newCategory">New category</label>
            <input id="newCategory" class="input" placeholder="Type to create one">
          </div>
        </div>

        <div class="field">
          <label for="itemDescription">Description</label>
          <textarea id="itemDescription" class="textarea" placeholder="Short customer-facing description"></textarea>
        </div>

        <div class="field">
          <label for="itemImageUrl">Image URL</label>
          <input id="itemImageUrl" class="input" placeholder="https://...">
        </div>

        <div class="grid grid-2">
          <label class="row card card-pad cursor-pointer">
            <input id="itemAvailable" type="checkbox" checked>
            <span>Available to order</span>
          </label>
          <label class="row card card-pad cursor-pointer">
            <input id="itemActive" type="checkbox" checked>
            <span>Visible on customer menu</span>
          </label>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeItemModal()">Cancel</button>
        <button id="saveItemBtn" class="btn btn-primary" type="submit">Save item</button>
      </div>
    </form>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    const restaurantId = new URLSearchParams(location.search).get("restaurantId");
    let currentUser = null;
    let categories = [];
    let menuItems = [];
    let activeCategory = "ALL";
    let activeFoodType = "ALL";
    let menuSearch = "";
    let restaurantFoodType = "BOTH";

    async function init() {
      try {
        currentUser = await initPartnerPage();
        if (!currentUser) return;
        const restaurant = await request(`/restaurant/${restaurantId}`, { headers: {} });
        restaurantFoodType = restaurant.foodType || "BOTH";
        activeFoodType = restaurantFoodType === "NON_VEG" ? "NON_VEG" : "VEG";
        document.getElementById("restaurantName").textContent = restaurant.name;
        document.getElementById("restaurantAddress").textContent = `${restaurant.address || "Keep dishes, prices, and availability easy for guests to choose."} - ${restaurantFoodTypeLabel(restaurantFoodType)}`;
        const canManage = canManageMenuDetails();
        document.getElementById("addItemBtn").hidden = !canManage;
        document.getElementById("addItemBtn").style.display = canManage ? "inline-flex" : "none";
        await loadMenu();
      } catch (err) {
        if (err.status === 423) {
          showWorkspaceBlocked(err.message);
        } else {
          document.getElementById("menu").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
        }
      }
    }

    function showWorkspaceBlocked(message) {
      document.getElementById("addItemBtn").hidden = true;
      document.getElementById("addItemBtn").style.display = "none";
      document.querySelector(".menu-admin-tools").hidden = true;
      document.getElementById("menu").innerHTML = `
        <div class="card card-pad">
          <h3>This restaurant workspace is currently paused.</h3>
          <p class="muted mb-0">Please contact the Avenzo team to activate or renew the subscription.</p>
          ${message ? `<p class="muted mt-12 mb-0">${escapeHtml(message)}</p>` : ""}
        </div>
      `;
    }

    function canManageMenuDetails() {
      return currentUser?.role === "ADMIN" || currentUser?.role === "RESTAURANT_OWNER";
    }

    async function loadCategories() {
      categories = await request(`/categories/${restaurantId}`);
      renderCategoryOptions();
    }

    function renderCategoryOptions(selectedId = "") {
      const select = document.getElementById("itemCategory");
      select.innerHTML = categories.map(c => `
        <option value="${c.id}" ${c.id === selectedId ? "selected" : ""}>${escapeHtml(c.name)}</option>
      `).join("");
    }

    async function loadMenu() {
      document.getElementById("menu").innerHTML = skeletonCards(6, "food");
      await loadCategories();
      menuItems = await request(`/admin/menu/${restaurantId}`);
      renderFoodTypeTabs();
      renderTabs();
      renderMenu();
    }

    function renderFoodTypeTabs() {
      const counts = menuItems.reduce((acc, item) => {
        const key = item.foodType || "VEG";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});

      document.getElementById("foodTypeTabs").innerHTML = `
        <button class="toggle-option ${activeFoodType === "VEG" ? "active" : ""}" onclick="setFoodType('VEG')">Veg (${counts.VEG || 0})</button>
        <button class="toggle-option ${activeFoodType === "NON_VEG" ? "active" : ""}" onclick="setFoodType('NON_VEG')">Non-veg (${counts.NON_VEG || 0})</button>
      `;
    }

    function setFoodType(value) {
      activeFoodType = value;
      renderFoodTypeTabs();
      renderTabs();
      renderMenu();
    }

    function renderTabs() {
      const filteredByType = menuItems.filter(item => (item.foodType || "VEG") === activeFoodType);
      const counts = filteredByType.reduce((acc, item) => {
        const key = item.category?.name || "Uncategorized";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      if (activeCategory !== "ALL" && !counts[activeCategory]) {
        activeCategory = "ALL";
      }

      const catNames = categories.map(c => c.name).filter(n => counts[n]);
      document.getElementById("categoryTabs").innerHTML = `
        <button class="btn tab ${activeCategory === "ALL" ? "active" : ""}" onclick="setCategory('ALL')">All (${filteredByType.length})</button>
        ${catNames.map((name, idx) => `
          <span style="display:inline-flex;align-items:center;gap:2px">
            <button class="btn tab ${activeCategory === name ? "active" : ""}" onclick='setCategory(${JSON.stringify(name)})'>${escapeHtml(name)} (${counts[name]})</button>
            ${canManageMenuDetails() ? `
              <button class="btn btn-ghost" style="padding:2px 5px;font-size:12px" title="Move up" onclick='moveCategoryUp(${JSON.stringify(name)})' ${idx === 0 ? "disabled" : ""}>↑</button>
              <button class="btn btn-ghost" style="padding:2px 5px;font-size:12px" title="Move down" onclick='moveCategoryDown(${JSON.stringify(name)})' ${idx === catNames.length - 1 ? "disabled" : ""}>↓</button>
            ` : ""}
          </span>
        `).join("")}
      `;
    }

    function setCategory(name) {
      activeCategory = name;
      renderTabs();
      renderMenu();
    }

    function renderMenu() {
      const container = document.getElementById("menu");
      const visible = activeCategory === "ALL"
        ? menuItems
        : menuItems.filter(item => (item.category?.name || "Uncategorized") === activeCategory);
      const typeFiltered = visible.filter(item => (item.foodType || "VEG") === activeFoodType);
      const filtered = menuSearch
        ? typeFiltered.filter(item => [
          item.name,
          item.description,
          item.category?.name,
          foodTypeLabel(item.foodType),
          item.isAvailable ? "available" : "out of stock",
          item.isActive ? "visible" : "hidden"
        ].join(" ").toLowerCase().includes(menuSearch))
        : typeFiltered;

      if (!filtered.length) {
        container.innerHTML = `<div class="empty">No items in this view yet.</div>`;
        return;
      }

      container.innerHTML = filtered.map(item => `
        <article class="card card-pad menu-item">
          <img class="menu-img" loading="lazy" decoding="async" src="${escapeHtml(item.imageUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300")}" alt="" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=900&q=80';">
          <div class="menu-copy">
            <div class="row row-wrap mb-6">
              <h3 class="section-title">${escapeHtml(item.name)}</h3>
              <span class="pill">${escapeHtml(item.category?.name || "Uncategorized")}</span>
              <span class="pill ${foodTypePillClass(item.foodType)}">${foodTypeLabel(item.foodType)}</span>
              <span class="pill ${item.isAvailable ? "pill-success" : "pill-danger"}">${item.isAvailable ? "Available" : "Out of stock"}</span>
              ${item.isActive ? "" : `<span class="pill pill-warning">Hidden</span>`}
            </div>
            <div class="muted">${escapeHtml(item.description || "No description")}</div>
            <strong>${money(item.price)}</strong>
          </div>
          <div class="menu-actions">
            <button class="btn btn-ghost" onclick="toggleStock('${item.id}', ${item.isAvailable})">${item.isAvailable ? "Mark out" : "Mark available"}</button>
            ${canManageMenuDetails() ? `<button class="btn btn-ghost" onclick="toggleVisibility('${item.id}', ${item.isActive})">${item.isActive ? "Hide" : "Show"}</button>` : ""}
            ${canManageMenuDetails() ? `<button class="btn btn-dark" onclick='openItemModal(${JSON.stringify(item)})'>Edit</button>` : ""}
            ${canManageMenuDetails() ? `<button class="btn btn-ghost" style="color:var(--danger,#c62828)" onclick="deleteItem('${item.id}', ${JSON.stringify(item.name)})">Delete</button>` : ""}
          </div>
        </article>
      `).join("");
    }

    function setMenuSearch(value) {
      menuSearch = value.trim().toLowerCase();
      renderMenu();
    }

    function openItemModal(item = null) {
      if (!canManageMenuDetails()) {
        toast("You can update stock availability from this page.");
        return;
      }
      document.getElementById("modalTitle").textContent = item ? "Edit item" : "Add item";
      document.getElementById("itemId").value = item?.id || "";
      document.getElementById("itemName").value = item?.name || "";
      document.getElementById("itemPrice").value = item?.price || "";
      document.getElementById("itemDescription").value = item?.description || "";
      document.getElementById("itemImageUrl").value = item?.imageUrl || "";
      document.getElementById("itemFoodType").value = item?.foodType || "VEG";
      document.getElementById("itemFoodType").querySelector('option[value="VEG"]').disabled = restaurantFoodType === "NON_VEG";
      document.getElementById("itemFoodType").querySelector('option[value="NON_VEG"]').disabled = restaurantFoodType === "PURE_VEG";
      if (restaurantFoodType === "NON_VEG") document.getElementById("itemFoodType").value = "NON_VEG";
      if (restaurantFoodType === "PURE_VEG") document.getElementById("itemFoodType").value = "VEG";
      document.getElementById("itemAvailable").checked = item ? item.isAvailable : true;
      document.getElementById("itemActive").checked = item ? item.isActive : true;
      document.getElementById("newCategory").value = "";
      renderCategoryOptions(item?.categoryId || categories[0]?.id || "");
      document.getElementById("itemModal").classList.add("open");
      document.getElementById("itemName").focus();
    }

    function closeItemModal() {
      document.getElementById("itemModal").classList.remove("open");
    }

    async function ensureCategory() {
      const newName = document.getElementById("newCategory").value.trim();
      if (!newName) return document.getElementById("itemCategory").value;

      const existing = categories.find(c => c.name.toLowerCase() === newName.toLowerCase());
      if (existing) return existing.id;

      const created = await request("/category", {
        method: "POST",
        body: JSON.stringify({ name: newName, restaurantId })
      });
      categories.push(created);
      return created.id;
    }

    async function saveItem(event) {
      event.preventDefault();
      if (!canManageMenuDetails()) {
        toast("Only restaurant owners and the Avenzo admin team can change menu details.");
        return;
      }
      const btn = document.getElementById("saveItemBtn");
      setLoading(btn, true, "Saving...");

      try {
        const id = document.getElementById("itemId").value;
        const categoryId = await ensureCategory();
        const payload = {
          name: document.getElementById("itemName").value.trim(),
          price: Number(document.getElementById("itemPrice").value),
          categoryId,
          foodType: document.getElementById("itemFoodType").value,
          description: document.getElementById("itemDescription").value.trim() || null,
          imageUrl: document.getElementById("itemImageUrl").value.trim() || null,
          isAvailable: document.getElementById("itemAvailable").checked,
          isActive: document.getElementById("itemActive").checked,
          restaurantId
        };

        if (id) {
          await request(`/menu/${id}`, { method: "PUT", body: JSON.stringify(payload) });
        } else {
          await request("/menu", { method: "POST", body: JSON.stringify(payload) });
        }

        closeItemModal();
        toast("Menu saved");
        await loadMenu();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    async function toggleStock(id, current) {
      try {
        await request(`/menu/${id}`, { method: "PUT", body: JSON.stringify({ isAvailable: !current }) });
        toast(current ? "Marked out of stock" : "Marked available");
        await loadMenu();
      } catch (err) {
        toast(err.message);
      }
    }

    async function toggleVisibility(id, current) {
      if (!canManageMenuDetails()) {
        toast("Only restaurant owners and the Avenzo admin team can hide or show menu items.");
        return;
      }
      try {
        await request(`/menu/${id}`, { method: "PUT", body: JSON.stringify({ isActive: !current }) });
        toast(current ? "Hidden from menu" : "Visible on menu");
        await loadMenu();
      } catch (err) {
        toast(err.message);
      }
    }

    async function deleteItem(id, name) {
      if (!canManageMenuDetails()) return;
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        await request(`/menu/${id}`, { method: "DELETE" });
        toast("Item deleted");
        await loadMenu();
      } catch (err) {
        toast(err.message || "Could not delete item");
      }
    }

    async function moveCategoryUp(categoryName) {
      const idx = categories.findIndex(c => c.name === categoryName);
      if (idx <= 0) return;
      const reordered = [...categories];
      [reordered[idx - 1], reordered[idx]] = [reordered[idx], reordered[idx - 1]];
      await saveCategoryOrder(reordered);
    }

    async function moveCategoryDown(categoryName) {
      const idx = categories.findIndex(c => c.name === categoryName);
      if (idx < 0 || idx >= categories.length - 1) return;
      const reordered = [...categories];
      [reordered[idx], reordered[idx + 1]] = [reordered[idx + 1], reordered[idx]];
      await saveCategoryOrder(reordered);
    }

    async function saveCategoryOrder(reordered) {
      try {
        await request(`/admin/categories/${restaurantId}/reorder`, {
          method: "PATCH",
          body: JSON.stringify({ order: reordered.map((c, i) => ({ id: c.id, sortOrder: i })) })
        });
        categories = reordered;
        renderTabs();
      } catch (err) {
        toast(err.message || "Could not reorder categories");
      }
    }

    function goBack() {
      window.location.href = "/admin/dashboard.html";
    }

    function goOrders(event) {
      event.preventDefault();
      window.location.href = `/admin/orders.html?restaurantId=${restaurantId}`;
    }

    init();
  </script>
</body>

</html>
