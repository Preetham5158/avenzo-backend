<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Avenzo Staff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b16">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    @media (max-width: 480px) {
      .page-head {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .page-head .btn, .page-head .row { width: 100%; justify-content: center; }
    }

    @media (max-width: 480px) {
      .invite-form.grid-2, form.grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .staff-remove-btn { width: 100%; margin-top: 8px; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head restaurant-sticky">
        <div>
          <div class="eyebrow">Staff access</div>
          <h1 id="pageTitle">Restaurant staff</h1>
          <p class="muted" id="pageHelp">Assign existing Avenzo users to help operate this restaurant.</p>
        </div>
        <a class="btn btn-ghost" href="/admin/dashboard.html">Dashboard</a>
      </section>

      <section class="card card-pad mb-20">
        <form class="invite-form grid grid-2" onsubmit="addStaff(event)">
          <div class="field">
            <label for="staffEmail">Employee email</label>
            <input id="staffEmail" class="input" type="email" required placeholder="employee@example.com">
          </div>
          <button id="addStaffBtn" class="btn btn-primary" type="submit">Add employee</button>
        </form>
      </section>

      <section class="stack" id="staffList"></section>
    </main>
  </div>

  <nav class="admin-dock">
    <a href="/admin/dashboard.html">Home</a>
    <a href="#" onclick="goOrders(event)">Orders</a>
    <a href="#" onclick="goMenu(event)">Menu</a>
    <a class="active" href="#">Staff</a>
    <a href="#" onclick="goPayments(event)">Payments</a>
  </nav>

  <script src="/assets/app.js"></script>
  <script>
    const restaurantId = new URLSearchParams(location.search).get("restaurantId");
    let currentUser = null;

    async function init() {
      currentUser = await initPartnerPage();
      if (!currentUser) return;
      await loadStaff();
    }

    async function loadStaff() {
      try {
        document.getElementById("staffList").innerHTML = skeletonCards(3);
        const data = await request(`/admin/staff/${restaurantId}`);
        const staff = data.staff || [];
        if (!staff.length) {
          document.getElementById("staffList").innerHTML = `<div class="empty">No staff members added yet.</div>`;
          return;
        }

        document.getElementById("staffList").innerHTML = staff.map(member => `
          <article class="card card-pad row-between">
            <div>
              <h3 class="h3-tight">${escapeHtml(member.name || member.email)}</h3>
              <div class="muted">${escapeHtml(member.email)}</div>
            </div>
            <button class="btn btn-danger staff-remove-btn" onclick="removeStaff('${member.id}', ${JSON.stringify(member.email || member.name || '')})">Remove</button>
          </article>
        `).join("");
      } catch (err) {
        // Distinguish 403 access denied from other errors
        if (err.status === 403 || (err.message && err.message.includes("403"))) {
          document.getElementById("staffList").innerHTML = `<div class="empty">You don't have access to view staff for this restaurant.</div>`;
        } else {
          document.getElementById("staffList").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
        }
      }
    }

    async function addStaff(event) {
      event.preventDefault();
      const btn = document.getElementById("addStaffBtn");
      setLoading(btn, true, "Adding...");
      try {
        await request(`/admin/staff/${restaurantId}`, {
          method: "POST",
          body: JSON.stringify({ email: document.getElementById("staffEmail").value.trim() })
        });
        document.getElementById("staffEmail").value = "";
        toast("Employee added");
        await loadStaff();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    async function removeStaff(userId, memberName) {
      // Confirm before removing — cannot be undone
      const displayName = memberName || 'this staff member';
      if (!confirm(`Remove ${displayName}? This cannot be undone.`)) return;

      try {
        await request(`/admin/staff/${restaurantId}/${userId}`, { method: "DELETE" });
        toast("Employee removed");
        await loadStaff();
      } catch (err) {
        toast(err.message);
      }
    }

    function goOrders(e) { e.preventDefault(); window.location.href = `/admin/orders.html?restaurantId=${restaurantId}`; }
    function goMenu(e) { e.preventDefault(); window.location.href = `/admin/menu.html?restaurantId=${restaurantId}`; }
    function goPayments(e) { e.preventDefault(); window.location.href = `/admin/payments.html?restaurantId=${restaurantId}`; }

    init();
  </script>
  <noscript>Please enable JavaScript.</noscript>
</body>

</html>
