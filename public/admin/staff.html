<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Staff — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand"><img src="/logo.png" alt="Avenzo"><span class="admin-brand-name">AVENZO</span></a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Loading...</span>
    <div class="admin-topbar-right"><div id="accountMenu"></div></div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">
      <div id="restCtxBar" class="rest-ctx" style="display:none"></div>

      <div class="admin-ph">
        <div>
          <div class="admin-eyebrow">Team access</div>
          <h1 class="admin-ph-title">Staff</h1>
          <p class="admin-ph-sub">Assign staff to help operate this restaurant.</p>
        </div>
      </div>

      <form id="addStaffForm" class="card card-p mb-16" onsubmit="addStaff(event)" style="margin-bottom:16px">
        <div class="g2" style="align-items:end">
          <div class="field mb-0"><label for="staffEmail">Employee email</label><input id="staffEmail" class="input" type="email" required placeholder="employee@example.com"></div>
          <button id="addStaffBtn" class="btn btn-primary" type="submit">Add employee</button>
        </div>
      </form>

      <div class="stack" id="staffList"></div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<script src="/assets/app.js"></script>
<script>
const restaurantId = new URLSearchParams(location.search).get("restaurantId");
let currentUser = null;

async function loadStaff() {
  try {
    document.getElementById("staffList").innerHTML = skeletonCards(2);
    const data = await request(`/admin/staff/${restaurantId}`);
    const staff = data.staff || [];
    document.getElementById("adminContext").textContent = data.restaurant?.name || "Staff";
    if (data.restaurant) {
      document.getElementById("restCtxBar").style.display = "";
      renderRestaurantContext(data.restaurant, "staff", restaurantId);
    }
    if (!staff.length) {
      document.getElementById("staffList").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">&#128101;</div>
          <div class="empty-state-title">No team members</div>
          <div class="empty-state-sub">Add someone by entering their Avenzo account email above.</div>
        </div>`;
      return;
    }
    document.getElementById("staffList").innerHTML = staff.map(m => `
      <div class="card card-p row-between">
        <div>
          <div style="font-weight:700">${escapeHtml(m.name || m.email)}</div>
          <div class="muted" style="font-size:13px">${escapeHtml(m.email)}</div>
        </div>
        <button class="btn btn-danger-soft btn-sm" onclick="removeStaff('${m.id}',${JSON.stringify(m.name||m.email)})">Remove</button>
      </div>
    `).join("");
  } catch(err) {
    if (err.status === 403) {
      document.getElementById("staffList").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">&#128274;</div>
          <div class="empty-state-title">No access</div>
          <div class="empty-state-sub">You don't have permission to manage staff for this restaurant.</div>
        </div>`;
    } else {
      document.getElementById("staffList").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">Could not load</div>
          <div class="empty-state-sub">${escapeHtml(err.message)}</div>
        </div>`;
    }
  }
}

async function addStaff(event) {
  event.preventDefault();
  const btn = document.getElementById("addStaffBtn");
  setLoading(btn, true, "Adding...");
  try {
    await request(`/admin/staff/${restaurantId}`, {
      method: "POST",
      body: JSON.stringify({ email: document.getElementById("staffEmail").value.trim() })
    });
    document.getElementById("staffEmail").value = "";
    toast("Employee added");
    loadStaff();
  } catch(err) {
    toast(err.message);
  } finally {
    setLoading(btn, false);
  }
}

async function removeStaff(userId, name) {
  if (!confirm(`Remove ${name}? This cannot be undone.`)) return;
  try {
    await request(`/admin/staff/${restaurantId}/${userId}`, { method: "DELETE" });
    toast("Employee removed");
    loadStaff();
  } catch(err) {
    toast(err.message);
  }
}

initAdminLayout("staff", restaurantId).then(user => {
  if (!user) return;
  currentUser = user;
  const canManage = user.role !== "EMPLOYEE";
  if (!canManage) document.getElementById("addStaffForm").hidden = true;
  loadStaff();
});
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
