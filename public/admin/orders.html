<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .order-card {
      display: grid;
      gap: 14px;
    }

    .items {
      display: grid;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .order-status-panel {
      display: grid;
      gap: 10px;
    }

    .status-help {
      font-size: 13px;
      color: var(--muted);
    }

    .order-tools {
      position: sticky;
      top: calc(var(--topbar-height) + 110px);
      z-index: 13;
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding: 12px;
    }

    @media (max-width: 760px) {
      .order-status-panel {
        width: 100%;
      }

      .order-tools {
        top: calc(var(--topbar-height) + 130px);
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div id="accountMenu"></div>
      </div>
    </header>

    <main class="page">
      <section class="page-head restaurant-sticky">
        <div>
          <div class="eyebrow">Live orders</div>
          <h1 id="restaurantName">Getting orders...</h1>
          <p class="muted" id="restaurantAddress">New orders appear here automatically.</p>
        </div>
        <span class="pill pill-dark" id="orderCount">0 orders</span>
      </section>

      <section class="grid grid-3" id="statusStats"></section>
      <section class="order-tools app-panel">
        <div class="field">
          <label for="orderSearch">Find an order</label>
          <input id="orderSearch" class="input" placeholder="Order code, order number, item..." oninput="setOrderSearch(this.value)">
        </div>
        <section class="tabbar surface-strip" id="orderFilters"></section>
      </section>
      <section class="row-between mt-12" id="paginationControls"></section>
      <section class="stack mt-16" id="list"></section>
    </main>
  </div>
  <nav class="admin-dock">
    <a href="/admin/dashboard.html">Home</a>
    <a href="#" onclick="goMenu(event)">Menu</a>
    <a class="active" href="#">Orders</a>
  </nav>

  <script src="/assets/app.js"></script>
  <script>
    const restaurantId = new URLSearchParams(location.search).get("restaurantId");
    const statusMeta = {
      PENDING: ["pill-warning", "Pending"],
      PREPARING: ["pill-warning", "Preparing"],
      READY: ["pill-success", "Ready"],
      COMPLETED: ["pill-success", "Completed"],
      CANCELLED: ["pill-danger", "Cancelled"]
    };
    const allowedTransitions = {
      PENDING: ["PREPARING", "CANCELLED"],
      PREPARING: ["READY", "CANCELLED"],
      READY: ["COMPLETED"],
      COMPLETED: [],
      CANCELLED: []
    };
    let allOrders = [];
    let activeOrderStatus = "ALL";
    let orderSearch = "";
    let ordersLoaded = false;
    let isLoadingOrders = false;
    let ordersPollingTimer = null;
    let orderPage = 1;
    const orderLimit = 50;
    let orderPagination = { page: 1, totalPages: 1, total: 0 };

    async function loadOrders() {
      if (isLoadingOrders) return;
      isLoadingOrders = true;
      try {
        if (!ordersLoaded) {
          document.getElementById("statusStats").innerHTML = skeletonCards(3);
          document.getElementById("list").innerHTML = skeletonCards(4);
        }
        const params = new URLSearchParams({
          page: String(orderPage),
          limit: String(orderLimit)
        });
        if (activeOrderStatus !== "ALL") params.set("status", activeOrderStatus);
        const data = await request(`/admin/orders/${restaurantId}?${params.toString()}`);
        allOrders = data.orders || [];
        orderPagination = data.pagination || { page: orderPage, totalPages: 1, total: allOrders.length };
        orderPage = orderPagination.page || orderPage;
        ordersLoaded = true;

        document.getElementById("restaurantName").textContent = data.restaurant?.name || "Restaurant Orders";
        document.getElementById("restaurantAddress").textContent = data.restaurant?.address || "New orders appear here automatically.";
        document.getElementById("orderCount").textContent = `${orderPagination.total || 0} order${orderPagination.total === 1 ? "" : "s"}`;
        renderStats(allOrders);
        renderOrderFilters();
        renderPagination();
        renderOrders();
      } catch (err) {
        document.getElementById("restaurantName").textContent = "No access";
        if (err.status === 423) {
          showWorkspaceBlocked(err.message);
        } else {
          document.getElementById("list").innerHTML = `<div class="empty">${escapeHtml(err.message || "You do not have access to this restaurant.")}</div>`;
        }
      } finally {
        isLoadingOrders = false;
      }
    }

    function showWorkspaceBlocked(message) {
      stopOrdersPolling();
      document.getElementById("orderCount").textContent = "Paused";
      document.querySelector(".order-tools").hidden = true;
      document.getElementById("statusStats").innerHTML = "";
      document.getElementById("paginationControls").innerHTML = "";
      document.getElementById("list").innerHTML = `
        <div class="card card-pad">
          <h3>This restaurant workspace is currently paused.</h3>
          <p class="muted mb-0">Please contact the Avenzo team to activate or renew the subscription.</p>
          ${message ? `<p class="muted mt-12 mb-0">${escapeHtml(message)}</p>` : ""}
        </div>
      `;
    }
    function startOrdersPolling() {
      if (ordersPollingTimer) return;
      ordersPollingTimer = setInterval(() => {
        if (document.hidden) return;
        loadOrders();
      }, 3000);
    }

    function stopOrdersPolling() {
      if (!ordersPollingTimer) return;
      clearInterval(ordersPollingTimer);
      ordersPollingTimer = null;
    }


    function renderStats(orders) {
      const counts = orders.reduce((acc, order) => {
        acc[order.status] = (acc[order.status] || 0) + 1;
        return acc;
      }, {});

      document.getElementById("statusStats").innerHTML = ["PENDING", "PREPARING", "READY"].map(status => `
        <div class="card card-pad">
          <div class="muted">${statusMeta[status][1]}</div>
          <h3>${counts[status] || 0}</h3>
          <span class="pill ${statusMeta[status][0]}">${statusMeta[status][1]}</span>
        </div>
      `).join("");
    }

    function renderOrderFilters() {
      const counts = allOrders.reduce((acc, order) => {
        acc[order.status] = (acc[order.status] || 0) + 1;
        return acc;
      }, {});
      document.getElementById("orderFilters").innerHTML = `
        <button class="btn tab ${activeOrderStatus === "ALL" ? "active" : ""}" onclick="setOrderStatus('ALL')">All <span class="pill">${allOrders.length}</span></button>
        ${Object.keys(statusMeta).map(status => `
          <button class="btn tab ${activeOrderStatus === status ? "active" : ""}" onclick="setOrderStatus('${status}')">${statusMeta[status][1]} <span class="pill">${counts[status] || 0}</span></button>
        `).join("")}
      `;
    }

    function renderPagination() {
      const totalPages = Math.max(orderPagination.totalPages || 1, 1);
      document.getElementById("paginationControls").innerHTML = `
        <button class="btn btn-ghost" onclick="changePage(-1)" ${orderPage <= 1 ? "disabled" : ""}>Previous</button>
        <span class="pill">Page ${orderPage} of ${totalPages}</span>
        <button class="btn btn-ghost" onclick="changePage(1)" ${orderPage >= totalPages ? "disabled" : ""}>Next</button>
      `;
    }

    function renderOrders() {
      const container = document.getElementById("list");
      let orders = allOrders.slice();

      if (orderSearch) {
        orders = orders.filter(order => [
          order.orderNumber,
          order.pickupCode,
          order.status,
          ...(order.items || []).map(item => item.nameAtOrder)
        ].join(" ").toLowerCase().includes(orderSearch));
      }

      if (!orders.length) {
        container.innerHTML = `<div class="empty">No orders found in this view.</div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const items = (order.items || []).map(item => `
          <div class="row-between">
            <span>${escapeHtml(item.nameAtOrder)} x ${item.quantity}</span>
            <strong>${money(item.priceAtOrder * item.quantity)}</strong>
          </div>
        `).join("");
        const meta = statusMeta[order.status] || ["pill", order.status];

        const nextStatuses = allowedTransitions[order.status] || [];
        const statusActions = nextStatuses.length
          ? nextStatuses.map(status => `
              <button class="btn status-action btn-ghost" onclick="updateStatus(this, '${order.id}', '${status}')">
                ${statusMeta[status][1]}
              </button>
            `).join("")
          : `<div class="status-help">No further status changes are allowed for this order.</div>`;

        return `
          <article class="card card-pad order-card">
            <div class="row-between">
              <div>
                <div class="eyebrow">Order #${Number.isInteger(order.orderNumber) ? order.orderNumber : order.pickupCode}</div>
                <h3 class="h3-tight">Code ${escapeHtml(order.pickupCode)}</h3>
                <div class="muted">Placed ${formatDate(order.createdAt)}</div>
              </div>
              <span class="pill ${meta[0]}">${escapeHtml(meta[1] || order.status)}</span>
            </div>

            <div class="grid grid-3">
              <div>
                <div class="muted">Ready time</div>
                <strong>${formatDate(order.readyAt)}</strong>
              </div>
              <div>
                <div class="muted">Total</div>
                <strong>${money(order.totalPrice)}</strong>
              </div>
              <div>
                <div class="muted">Order code</div>
                <strong>${escapeHtml(order.pickupCode)}</strong>
              </div>
              <div>
                <div class="muted">Payment</div>
                <strong class="${paymentPillClass(order.paymentStatus)}" style="font-size:13px">${paymentLabel(order.paymentStatus)}</strong>
              </div>
              ${order.tableNumber ? `<div><div class="muted">Table</div><strong>${escapeHtml(order.tableNumber)}</strong></div>` : ""}
              ${order.phone ? `<div><div class="muted">Phone</div><strong>${escapeHtml(order.phone)}</strong></div>` : ""}
            </div>

            <div class="items">${items}</div>

            ${order.paymentStatus === "PAYMENT_CLAIMED" ? `
              <div style="padding:12px 14px;border-radius:12px;background:#fff8e1;border:1px solid #ffe082;font-size:14px">
                <strong style="color:#e65100">Customer says paid — verify before preparing</strong>
                <p class="muted" style="margin:4px 0 6px">Check your UPI app to confirm payment was received, then tap the button below.</p>
                ${order.paymentReference ? `<p class="muted" style="margin:0 0 8px;font-size:12px">Customer reference: <strong>${escapeHtml(order.paymentReference)}</strong></p>` : ""}
                <button class="btn btn-primary" onclick="confirmPayment(this, '${order.id}')">Mark payment received</button>
              </div>
            ` : ""}

            ${order.paymentStatus === "PAYMENT_PENDING" ? `
              <div style="padding:12px 14px;border-radius:12px;background:#fff0f0;border:1px solid #ffcdd2;font-size:14px">
                <strong style="color:#c62828">Awaiting payment</strong>
                <p class="muted" style="margin:4px 0 0">Customer has not yet submitted payment for this order.</p>
              </div>
            ` : ""}

            <div class="order-status-panel">
              <div class="muted">Update order</div>
              <div class="status-actions">
                ${statusActions}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function setOrderStatus(status) {
      activeOrderStatus = status;
      orderPage = 1;
      loadOrders();
    }

    function changePage(delta) {
      const totalPages = Math.max(orderPagination.totalPages || 1, 1);
      orderPage = Math.min(Math.max(orderPage + delta, 1), totalPages);
      loadOrders();
    }

    function setOrderSearch(value) {
      orderSearch = value.trim().toLowerCase();
      renderOrders();
    }

    function paymentLabel(value) {
      return {
        PAYMENT_NOT_REQUIRED: "Not required",
        PAYMENT_PENDING: "Awaiting payment",
        PAYMENT_CLAIMED: "Customer says paid",
        PAID: "Paid",
        PAYMENT_FAILED: "Failed",
        REFUNDED: "Refunded",
        PARTIALLY_REFUNDED: "Partial refund"
      }[value] || "Not required";
    }

    function paymentPillClass(value) {
      if (value === "PAID") return "pill-success";
      if (value === "PAYMENT_CLAIMED") return "pill-warning";
      if (value === "PAYMENT_FAILED") return "pill-danger";
      if (value === "PAYMENT_PENDING") return "pill-danger";
      return "";
    }

    async function confirmPayment(button, id) {
      setLoading(button, true, "Confirming...");
      try {
        await request(`/admin/order/${id}/confirm-payment`, { method: "POST" });
        toast("Payment confirmed. Order can now be prepared.");
      } catch (err) {
        toast(err.message || "Could not confirm payment");
      } finally {
        setLoading(button, false);
        loadOrders();
      }
    }

    async function updateStatus(button, id, status) {
      setLoading(button, true, statusMeta[status]?.[1] || "Updating");
      try {
        await request(`/order/${id}/status`, {
          method: "PATCH",
          body: JSON.stringify({ status })
        });
        toast("Status updated");
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(button, false);
        loadOrders();
      }
    }

    function goBack() {
      window.location.href = "/admin/dashboard.html";
    }

    function goMenu(event) {
      event.preventDefault();
      window.location.href = `/admin/menu.html?restaurantId=${restaurantId}`;
    }

    initPartnerPage().then((user) => {
      if (!user) return;
      loadOrders();
      startOrdersPolling();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      loadOrders();
    });

    window.addEventListener("pagehide", stopOrdersPolling);
  </script>
</body>

</html>
