<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .order-card {
      display: grid;
      gap: 14px;
    }

    .items {
      display: grid;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .status-select {
      width: 190px;
    }

    @media (max-width: 760px) {
      .status-select {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="/logo.png" alt="Avenzo">
          <span>AVENZO</span>
        </div>
        <div class="row">
          <button class="btn btn-ghost" onclick="goBack()">Back</button>
          <button class="btn btn-ghost" onclick="logout()">Logout</button>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="page-head">
        <div>
          <div class="eyebrow">Live orders</div>
          <h1 id="restaurantName">Loading...</h1>
          <p class="muted">Auto-refresh pauses while you are changing a status.</p>
        </div>
        <div class="row">
          <span class="pill pill-dark" id="orderCount">0 orders</span>
          <button class="btn btn-soft" onclick="loadOrders(true)">Refresh</button>
        </div>
      </section>

      <section class="grid grid-3" id="statusStats"></section>
      <section class="stack" id="list" style="margin-top:16px;">Loading orders...</section>
      <div class="bottom-actions" style="padding-top:8px;">
        <button class="btn btn-dark" onclick="goBack()">Back to dashboard</button>
      </div>
    </main>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    requireAuth();

    const restaurantId = new URLSearchParams(location.search).get("restaurantId");
    let userIsEditingUntil = 0;

    const statusMeta = {
      PENDING: ["pill-warning", "Pending"],
      PREPARING: ["pill-warning", "Preparing"],
      READY: ["pill-success", "Ready"],
      COMPLETED: ["pill-success", "Completed"],
      CANCELLED: ["pill-danger", "Cancelled"]
    };

    function holdRefresh() {
      userIsEditingUntil = Date.now() + 10000;
    }

    async function loadOrders(force = false) {
      if (!force && Date.now() < userIsEditingUntil) return;

      try {
        const data = await request(`/admin/orders/${restaurantId}`);
        const orders = data.orders || [];

        document.getElementById("restaurantName").textContent = data.restaurant?.name || "Restaurant Orders";
        document.getElementById("orderCount").textContent = `${orders.length} order${orders.length === 1 ? "" : "s"}`;
        renderStats(orders);
        renderOrders(orders);
      } catch (err) {
        document.getElementById("restaurantName").textContent = "No access";
        document.getElementById("list").innerHTML = `<div class="empty">${escapeHtml(err.message || "You do not have access to this restaurant.")}</div>`;
      }
    }

    function renderStats(orders) {
      const counts = orders.reduce((acc, order) => {
        acc[order.status] = (acc[order.status] || 0) + 1;
        return acc;
      }, {});

      document.getElementById("statusStats").innerHTML = ["PENDING", "PREPARING", "READY"].map(status => `
        <div class="card card-pad">
          <div class="muted">${statusMeta[status][1]}</div>
          <h3>${counts[status] || 0}</h3>
          <span class="pill ${statusMeta[status][0]}">${status}</span>
        </div>
      `).join("");
    }

    function renderOrders(orders) {
      const container = document.getElementById("list");
      if (!orders.length) {
        container.innerHTML = `<div class="empty">No orders yet.</div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const items = (order.items || []).map(item => `
          <div class="row-between">
            <span>${escapeHtml(item.nameAtOrder)} x ${item.quantity}</span>
            <strong>${money(item.priceAtOrder * item.quantity)}</strong>
          </div>
        `).join("");
        const meta = statusMeta[order.status] || ["pill", order.status];

        return `
          <article class="card card-pad order-card">
            <div class="row-between">
              <div>
                <div class="eyebrow">Order #${order.orderNumber || order.pickupCode}</div>
                <h3 style="margin-bottom:4px;">Pickup ${escapeHtml(order.pickupCode)}</h3>
                <div class="muted">Placed ${formatDate(order.createdAt)}</div>
              </div>
              <span class="pill ${meta[0]}">${escapeHtml(order.status)}</span>
            </div>

            <div class="grid grid-3">
              <div>
                <div class="muted">Ready to collect</div>
                <strong>${formatDate(order.readyAt)}</strong>
              </div>
              <div>
                <div class="muted">Total</div>
                <strong>${money(order.totalPrice)}</strong>
              </div>
              <div>
                <div class="muted">Session</div>
                <strong>${escapeHtml(order.sessionId || "Walk-in")}</strong>
              </div>
            </div>

            <div class="items">${items}</div>

            <div class="row-between">
              <select class="select status-select" onfocus="holdRefresh()" onclick="holdRefresh()" onchange="updateStatus('${order.id}', this.value)">
                ${["PENDING", "PREPARING", "READY", "COMPLETED", "CANCELLED"].map(status => `
                  <option value="${status}" ${order.status === status ? "selected" : ""}>${statusMeta[status][1]}</option>
                `).join("")}
              </select>
              <button class="btn btn-soft" onclick="loadOrders(true)">Sync now</button>
            </div>
          </article>
        `;
      }).join("");
    }

    async function updateStatus(id, status) {
      holdRefresh();
      try {
        await request(`/order/${id}/status`, {
          method: "PATCH",
          body: JSON.stringify({ status })
        });
        toast("Status updated");
      } catch (err) {
        toast(err.message);
      } finally {
        userIsEditingUntil = 0;
        loadOrders(true);
      }
    }

    function goBack() {
      window.location.href = "/admin/dashboard.html";
    }

    setInterval(() => loadOrders(false), 3000);
    loadOrders(true);
  </script>
</body>

</html>
