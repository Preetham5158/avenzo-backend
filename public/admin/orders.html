<!DOCTYPE html>
<html>

<head>
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #111827;
        }

        header {
            background: white;
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
        }

        .container {
            padding: 20px;
            max-width: 920px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        .order-top {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        button {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 9px;
        }

        .muted {
            color: #667085;
            font-size: 13px;
        }

        .items {
            border-top: 1px solid #eef0f4;
            border-bottom: 1px solid #eef0f4;
            padding: 12px 0;
            margin: 12px 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .footer-actions {
            padding: 0 20px 24px;
            max-width: 920px;
            margin: 0 auto;
        }

        .back-btn {
            background: #111827;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <div class="muted">Orders</div>
        <h2 id="restaurantName">Loading...</h2>
    </header>

    <div class="container" id="list">Loading orders...</div>
    <div class="footer-actions">
        <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <script>
        let userIsEditingUntil = 0;

        const API = "https://avenzo.app";
        const token = localStorage.getItem("token");
        const restaurantId = new URLSearchParams(location.search).get("restaurantId");

        /* ================================
           STATUS COLOR
        ================================ */
        function getColor(status) {
            return {
                PENDING: "#ff9800",
                PREPARING: "#ff5722",
                READY: "#4caf50",
                COMPLETED: "#2e7d32",
                CANCELLED: "#667085"
            }[status] || "#000";
        }

        function formatDate(value) {
            if (!value) return "Not yet";
            return new Date(value).toLocaleString("en-IN", {
                dateStyle: "medium",
                timeStyle: "short"
            });
        }

        function holdRefresh() {
            userIsEditingUntil = Date.now() + 8000;
        }

        /* ================================
           LOAD ORDERS
        ================================ */
        async function loadOrders() {
            if (Date.now() < userIsEditingUntil) return;

            try {
                const res = await fetch(`${API}/admin/orders/${restaurantId}`, {
                    headers: { Authorization: "Bearer " + token }
                });

                const container = document.getElementById("list");
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("restaurantName").innerText = "No access";
                    container.innerHTML = data.error || "You do not have access to this restaurant.";
                    return;
                }

                const orders = Array.isArray(data) ? data : data.orders || [];
                document.getElementById("restaurantName").innerText = data.restaurant?.name || "Restaurant Orders";

                if (orders.length === 0) {
                    container.innerHTML = "No orders yet";
                    return;
                }

                container.innerHTML = "";

                orders.forEach(o => {
                    const div = document.createElement("div");
                    div.className = "card";

                    let items = "";
                    o.items.forEach(i => {
                        items += `
                            <div class="item-row">
                                <span>${i.nameAtOrder} x ${i.quantity}</span>
                                <span>₹${i.priceAtOrder * i.quantity}</span>
                            </div>
                        `;
                    });

                    div.innerHTML = `
        <div class="order-top">
            <div>
                <b>Order #${o.orderNumber || o.pickupCode}</b>
                <div class="muted">Pickup code: ${o.pickupCode}</div>
            </div>
            <span class="status" style="background:${getColor(o.status)}">${o.status}</span>
        </div>

        <div class="muted">Placed: ${formatDate(o.createdAt)}</div>
        <div class="muted">Ready to collect: ${formatDate(o.readyAt)}</div>

        <div class="items">${items}</div>
        <div><b>Total:</b> ₹${o.totalPrice}</div><br>

        <select 
  onfocus="holdRefresh()"
  onclick="holdRefresh()"
  onchange="updateStatus('${o.id}', this.value)">
  
  <option ${o.status === "PENDING" ? "selected" : ""}>PENDING</option>
  <option ${o.status === "PREPARING" ? "selected" : ""}>PREPARING</option>
  <option ${o.status === "READY" ? "selected" : ""}>READY</option>
  <option ${o.status === "COMPLETED" ? "selected" : ""}>COMPLETED</option>
  <option ${o.status === "CANCELLED" ? "selected" : ""}>CANCELLED</option>
</select>
      `;

                    container.appendChild(div);
                });

            } catch {
                document.getElementById("list").innerHTML = "Error loading orders";
            }
        }

        /* ================================
           UPDATE STATUS
        ================================ */
        async function updateStatus(id, status) {
            holdRefresh();

            const res = await fetch(`${API}/order/${id}/status`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },
                body: JSON.stringify({ status })
            });

            if (!res.ok) {
                const data = await res.json();
                alert(data.error || "Could not update status");
            }

            userIsEditingUntil = 0;
            loadOrders();
        }

        /* ================================
           NAV
        ================================ */
        function goBack() {
            history.back();
        }

        /* ================================
           AUTO REFRESH
        ================================ */
        setInterval(() => {
            loadOrders();
        }, 3000);

        loadOrders();
    </script>

</body>

</html>
