<!DOCTYPE html>
<html>
<head>
  <title>Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f6f7fb;
    }

    header {
      background: white;
      padding: 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 15px;
    }

    .order {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .code {
      font-weight: bold;
      font-size: 18px;
    }

    .status {
      padding: 5px 10px;
      border-radius: 10px;
      color: white;
      font-size: 12px;
    }

    .pending { background: orange; }
    .preparing { background: red; }
    .ready { background: green; }
    .completed { background: #333; }

    .item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn1 { background: orange; color:white; }
    .btn2 { background: red; color:white; }
    .btn3 { background: green; color:white; }
    .btn4 { background: black; color:white; }

  </style>
</head>

<body>

<header>
  <b>Orders</b>
  <button onclick="goBack()">⬅ Back</button>
</header>

<div class="container" id="orders"></div>

<script>
const API = "https://avenzo.app";
const token = localStorage.getItem("token");

if (!token) window.location.href = "/login.html";

const params = new URLSearchParams(window.location.search);
const restaurantId = params.get("restaurantId");

function getClass(status) {
  return status.toLowerCase();
}

async function loadOrders() {
  const res = await fetch(`${API}/admin/orders/${restaurantId}`, {
    headers: { "Authorization": token }
  });

  const data = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  data.forEach(order => {

    let itemsHTML = "";
    let total = 0;

    order.items.forEach(i => {
      const price = i.menu.price * i.quantity;
      total += price;

      itemsHTML += `
        <div class="item">
          <span>${i.menu.name} x ${i.quantity}</span>
          <span>₹${price}</span>
        </div>
      `;
    });

    const div = document.createElement("div");
    div.className = "order";

    div.innerHTML = `
      <div class="top">
        <div class="code">#${order.pickupCode}</div>
        <div class="status ${getClass(order.status)}">${order.status}</div>
      </div>

      ${itemsHTML}

      <hr>

      <b>Total: ₹${total}</b>

      <div class="actions">
        <button class="btn1" onclick="update('${order.id}','PENDING')">Pending</button>
        <button class="btn2" onclick="update('${order.id}','PREPARING')">Preparing</button>
        <button class="btn3" onclick="update('${order.id}','READY')">Ready</button>
        <button class="btn4" onclick="update('${order.id}','COMPLETED')">Done</button>
      </div>
    `;

    container.appendChild(div);
  });
}

async function update(id, status) {
  await fetch(`${API}/order/${id}/status`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ status })
  });

  loadOrders();
}

function goBack() {
  window.history.back();
}

// auto refresh
setInterval(loadOrders, 3000);

// initial
loadOrders();
</script>

</body>
</html>
