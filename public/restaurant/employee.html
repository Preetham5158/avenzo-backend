<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kitchen — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8401C">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
  <style>
    .order-card { display: grid; gap: 14px; }
    .order-items {
      display: grid;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .order-items-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .order-status-panel { display: grid; gap: 10px; }
    .status-help { font-size: 13px; color: var(--tx-2); }
    .status-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .stock-category-label {
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--tx-2); padding: 18px 0 6px;
    }
    .stock-item {
      display: grid; grid-template-columns: 1fr auto; gap: 12px;
      align-items: center; padding: 14px 16px;
      border-radius: var(--r-sm); background: var(--bg-3);
      border: 1px solid var(--line);
    }
    .stock-item + .stock-item { margin-top: 8px; }
    .stock-item-name { font-weight: 700; font-size: 15px; color: var(--tx); }
    .stock-item-meta { font-size: 12px; color: var(--tx-2); margin-top: 2px; }

    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 13px; font-weight: 700; min-width: 48px; text-align: right; }
    .toggle-label.available { color: var(--success); }
    .toggle-label.unavailable { color: var(--danger); }

    .refresh-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--tx-2); }
    .refresh-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .payment-banner-warn {
      padding: 12px 14px; border-radius: var(--r-sm);
      background: var(--brand-soft); border: 1px solid var(--brand-2);
      font-size: 14px;
    }
    .payment-banner-warn strong { color: var(--brand-2); }
    .payment-banner-pending {
      padding: 12px 14px; border-radius: var(--r-sm);
      background: var(--danger-soft); border: 1px solid rgba(232,64,64,0.3);
      font-size: 14px;
    }
    .payment-banner-pending strong { color: var(--danger); }

    @media (max-width: 640px) {
      .status-actions { flex-direction: column; }
      .status-actions .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <a href="/admin/dashboard.html" class="admin-brand">
      <img src="/logo.png" alt="Avenzo">
      <span class="admin-brand-name">AVENZO</span>
    </a>
    <span class="admin-brand-sep"></span>
    <span class="admin-context" id="adminContext">Kitchen</span>
    <div class="admin-topbar-right">
      <div id="accountMenu"></div>
    </div>
  </header>
  <nav class="admin-sidebar" id="adminSidebar"></nav>
  <main class="admin-main">
    <div class="admin-page">

      <div class="admin-ph">
        <div class="admin-ph-left">
          <div class="admin-eyebrow">Kitchen view</div>
          <h1 class="admin-ph-title" id="restaurantName">Getting workspace...</h1>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px">
            <p class="admin-ph-sub" id="restaurantAddress">Loading restaurant...</p>
            <span class="refresh-indicator" id="refreshIndicator" hidden>
              <span class="refresh-dot"></span>
              Auto-refreshing
            </span>
          </div>
        </div>
        <span class="pill pill-success" id="activeCount">— active</span>
      </div>

      <div class="tab-bar" id="empTabs" style="margin-bottom:16px">
        <button class="tab-btn active" id="tabOrders" onclick="showTab('orders')">Live Orders</button>
        <button class="tab-btn" id="tabStock" onclick="showTab('stock')">Stock</button>
      </div>

      <!-- Orders panel -->
      <div id="ordersPanel">
        <div class="stat-grid" id="statusStats" style="margin-bottom:16px"></div>
        <div class="tab-bar" id="orderFilters" style="margin-bottom:12px"></div>
        <div class="stack" id="orderList"></div>
      </div>

      <!-- Stock panel -->
      <div id="stockPanel" hidden>
        <div class="card card-p" style="margin-bottom:12px">
          <div class="field mb-0">
            <label for="stockSearch">Find an item</label>
            <input id="stockSearch" class="input" placeholder="Dish name..." oninput="filterStock(this.value)" autocomplete="off">
          </div>
        </div>
        <div id="stockList"></div>
      </div>

    </div>
  </main>
</div>
<nav class="admin-bnav" id="adminBnav"></nav>

<script src="/assets/app.js"></script>
<script>
  let restaurantId = null;
  let activeTab = "orders";
  let activeOrderStatus = "ALL";
  let allOrders = [];
  let allMenuItems = [];
  let stockSearchQuery = "";
  let ordersLoaded = false;
  let isLoadingOrders = false;
  let pollingTimer = null;

  const statusMeta = {
    PENDING:   ["pill-warn",    "Pending"],
    PREPARING: ["pill-brand",   "Preparing"],
    READY:     ["pill-success", "Ready"],
    COMPLETED: ["pill-default", "Completed"],
    CANCELLED: ["pill-danger",  "Cancelled"]
  };
  const allowedTransitions = {
    PENDING:   ["PREPARING", "CANCELLED"],
    PREPARING: ["READY", "CANCELLED"],
    READY:     ["COMPLETED"],
    COMPLETED: [],
    CANCELLED: []
  };

  function showTab(tab) {
    activeTab = tab;
    document.getElementById("ordersPanel").hidden = tab !== "orders";
    document.getElementById("stockPanel").hidden  = tab !== "stock";
    document.getElementById("tabOrders").classList.toggle("active", tab === "orders");
    document.getElementById("tabStock").classList.toggle("active", tab === "stock");
    if (tab === "stock" && allMenuItems.length === 0) loadStock();
  }

  async function loadOrders() {
    if (isLoadingOrders) return;
    isLoadingOrders = true;
    try {
      if (!ordersLoaded) {
        document.getElementById("statusStats").innerHTML = skeletonCards(3);
        document.getElementById("orderList").innerHTML = skeletonCards(3);
      }
      const params = new URLSearchParams();
      if (activeOrderStatus !== "ALL") params.set("status", activeOrderStatus);
      const data = await request(`/admin/orders/${restaurantId}?${params.toString()}`);
      allOrders = data.orders || [];
      ordersLoaded = true;
      updateActiveCount(allOrders);
      renderStats(allOrders);
      renderFilters(allOrders);
      renderOrders(allOrders);
    } catch (err) {
      if (err.status === 423) {
        stopPolling();
        document.getElementById("orderList").innerHTML = `
          <div class="card card-p">
            <div style="font-weight:700;font-size:16px;margin-bottom:6px">Workspace paused</div>
            <p style="color:var(--tx-2);margin:0">${escapeHtml(err.message || "Contact the Avenzo team to reactivate.")}</p>
          </div>`;
      } else {
        document.getElementById("orderList").innerHTML = `<div class="empty-state"><div class="empty-state-title">${escapeHtml(err.message || "Could not load orders.")}</div></div>`;
      }
    } finally {
      isLoadingOrders = false;
    }
  }

  function updateActiveCount(orders) {
    const active = orders.filter(o => o.status === "PENDING" || o.status === "PREPARING" || o.status === "READY").length;
    document.getElementById("activeCount").textContent = `${active} active`;
  }

  function renderStats(orders) {
    const counts = orders.reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {});
    document.getElementById("statusStats").innerHTML = ["PENDING", "PREPARING", "READY"].map(s => `
      <div class="stat-card">
        <div class="stat-card-label">${statusMeta[s][1]}</div>
        <div class="stat-card-value">${counts[s] || 0}</div>
        <span class="pill ${statusMeta[s][0]}">${statusMeta[s][1]}</span>
      </div>
    `).join("");
  }

  function renderFilters(orders) {
    const counts = orders.reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {});
    document.getElementById("orderFilters").innerHTML =
      `<button class="tab-btn ${activeOrderStatus === "ALL" ? "active" : ""}" onclick="setStatus('ALL')">All <span class="pill pill-default">${orders.length}</span></button>` +
      ["PENDING","PREPARING","READY","COMPLETED","CANCELLED"].map(s => `
        <button class="tab-btn ${activeOrderStatus === s ? "active" : ""}" onclick="setStatus('${s}')">
          ${statusMeta[s][1]} <span class="pill pill-default">${counts[s] || 0}</span>
        </button>
      `).join("");
  }

  function renderOrders(orders) {
    const container = document.getElementById("orderList");
    let filtered = orders.slice();
    if (activeOrderStatus !== "ALL") filtered = filtered.filter(o => o.status === activeOrderStatus);
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍽️</div><div class="empty-state-title">No orders in this view</div></div>`;
      return;
    }
    container.innerHTML = filtered.map(order => {
      const items = (order.items || []).map(item => `
        <div class="order-items-row">
          <span>${escapeHtml(item.nameAtOrder)} × ${item.quantity}</span>
          <strong>${money(item.priceAtOrder * item.quantity)}</strong>
        </div>
      `).join("");
      const meta = statusMeta[order.status] || ["pill-default", order.status];
      const nextStatuses = allowedTransitions[order.status] || [];
      const statusActions = nextStatuses.length
        ? nextStatuses.map(s => {
            let cls = s === "CANCELLED" ? "btn-ghost" : s === "COMPLETED" ? "btn-primary" : "btn-soft";
            return `<button class="btn ${cls}" onclick="updateStatus(this,'${order.id}','${s}')">${statusMeta[s][1]}</button>`;
          }).join("")
        : `<div class="status-help">No further changes allowed.</div>`;

      const paymentBanner = order.paymentStatus === "PAYMENT_CLAIMED" ? `
        <div class="payment-banner-warn">
          <strong>Customer says paid — verify before preparing</strong>
          <p style="color:var(--tx-2);margin:4px 0 6px;font-size:13px">Check your UPI app to confirm payment was received, then tap below.</p>
          ${order.paymentReference ? `<p style="color:var(--tx-2);margin:0 0 8px;font-size:12px">Reference: <strong>${escapeHtml(order.paymentReference)}</strong></p>` : ""}
          <button class="btn btn-primary btn-sm" onclick="confirmPayment(this,'${order.id}')">Mark payment received</button>
        </div>
      ` : order.paymentStatus === "PAYMENT_PENDING" ? `
        <div class="payment-banner-pending">
          <strong>Awaiting payment</strong>
          <p style="color:var(--tx-2);margin:4px 0 0;font-size:13px">Customer has not yet paid for this order.</p>
        </div>
      ` : "";

      return `
        <article class="card card-p order-card">
          <div class="row-between" style="align-items:flex-start">
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--tx-2);margin-bottom:2px">Order #${Number.isInteger(order.orderNumber) ? order.orderNumber : order.pickupCode}</div>
              <div style="font-size:28px;font-weight:800;color:var(--tx);line-height:1">Code ${escapeHtml(order.pickupCode)}</div>
              <div style="font-size:13px;color:var(--tx-2);margin-top:4px">Placed ${formatDate(order.createdAt)}</div>
            </div>
            <span class="pill ${meta[0]}">${escapeHtml(meta[1] || order.status)}</span>
          </div>
          <div class="g3">
            <div><div style="font-size:12px;color:var(--tx-2)">Total</div><strong>${money(order.totalPrice)}</strong></div>
            <div><div style="font-size:12px;color:var(--tx-2)">Payment</div><strong style="font-size:13px">${paymentLabel(order.paymentStatus)}</strong></div>
            ${order.phone ? `<div><div style="font-size:12px;color:var(--tx-2)">Phone</div><strong>${escapeHtml(order.phone)}</strong></div>` : ""}
            ${order.tableNumber ? `<div><div style="font-size:12px;color:var(--tx-2)">Table</div><strong>${escapeHtml(order.tableNumber)}</strong></div>` : ""}
          </div>
          <div class="order-items">${items}</div>
          ${paymentBanner}
          <div class="order-status-panel">
            <div style="font-size:12px;color:var(--tx-2)">Update status</div>
            <div class="status-actions">${statusActions}</div>
          </div>
        </article>
      `;
    }).join("");
  }

  function setStatus(status) {
    activeOrderStatus = status;
    renderFilters(allOrders);
    renderOrders(allOrders);
  }

  async function updateStatus(button, id, status) {
    setLoading(button, true, statusMeta[status]?.[1] || "Updating");
    try {
      await request(`/order/${id}/status`, { method: "PATCH", body: JSON.stringify({ status }) });
      toast("Status updated");
    } catch (err) {
      toast(err.message);
    } finally {
      setLoading(button, false);
      loadOrders();
    }
  }

  async function confirmPayment(button, id) {
    setLoading(button, true, "Confirming...");
    try {
      await request(`/admin/order/${id}/confirm-payment`, { method: "POST" });
      toast("Payment confirmed");
    } catch (err) {
      toast(err.message || "Could not confirm payment");
    } finally {
      setLoading(button, false);
      loadOrders();
    }
  }

  function paymentLabel(value) {
    return {
      PAYMENT_NOT_REQUIRED: "Not required",
      PAYMENT_PENDING:      "Awaiting payment",
      PAYMENT_CLAIMED:      "Customer says paid",
      PAID:                 "Paid",
      PAYMENT_FAILED:       "Failed",
      REFUNDED:             "Refunded",
      PARTIALLY_REFUNDED:   "Partial refund"
    }[value] || "—";
  }

  async function loadStock() {
    document.getElementById("stockList").innerHTML = skeletonCards(4);
    try {
      const data = await request(`/admin/menu/${restaurantId}`);
      allMenuItems = data.items || data.menu || [];
      renderStock();
    } catch (err) {
      document.getElementById("stockList").innerHTML = `<div class="empty-state"><div class="empty-state-title">${escapeHtml(err.message || "Could not load menu items.")}</div></div>`;
    }
  }

  function filterStock(query) {
    stockSearchQuery = query.trim().toLowerCase();
    renderStock();
  }

  function renderStock() {
    const container = document.getElementById("stockList");
    let items = allMenuItems.slice();
    if (stockSearchQuery) {
      items = items.filter(i => (i.name || "").toLowerCase().includes(stockSearchQuery));
    }
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-title">No items found</div></div>`;
      return;
    }
    const groups = {};
    items.forEach(item => {
      const cat = item.category?.name || item.categoryName || "Uncategorised";
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });
    container.innerHTML = Object.entries(groups).map(([cat, catItems]) => `
      <div class="stock-category-label">${escapeHtml(cat)}</div>
      ${catItems.map(item => `
        <div class="stock-item" id="stock-item-${item.id}">
          <div>
            <div class="stock-item-name">${escapeHtml(item.name)}</div>
            <div class="stock-item-meta">
              ${money(item.pricePaise)}
              ${item.foodType ? ` · ${item.foodType === "VEG" ? "Veg" : "Non-veg"}` : ""}
              ${!item.isActive ? ` · <span style="color:var(--danger)">Hidden</span>` : ""}
            </div>
          </div>
          <div class="toggle-wrap">
            <span class="toggle-label ${item.isAvailable ? "available" : "unavailable"}" id="stock-label-${item.id}">
              ${item.isAvailable ? "In stock" : "Out"}
            </span>
            <label class="toggle" aria-label="Toggle stock for ${escapeHtml(item.name)}">
              <input type="checkbox" ${item.isAvailable ? "checked" : ""} onchange="toggleStock(this,'${item.id}')">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>
      `).join("")}
    `).join("");
  }

  async function toggleStock(checkbox, itemId) {
    const available = checkbox.checked;
    checkbox.disabled = true;
    const label = document.getElementById(`stock-label-${itemId}`);
    try {
      await request(`/menu/${itemId}`, { method: "PUT", body: JSON.stringify({ isAvailable: available }) });
      const item = allMenuItems.find(i => i.id === itemId);
      if (item) item.isAvailable = available;
      if (label) {
        label.textContent = available ? "In stock" : "Out";
        label.className = `toggle-label ${available ? "available" : "unavailable"}`;
      }
      toast(available ? "Marked in stock" : "Marked out of stock");
    } catch (err) {
      checkbox.checked = !available;
      toast(err.message || "Could not update stock");
    } finally {
      checkbox.disabled = false;
    }
  }

  function startPolling() {
    if (pollingTimer) return;
    document.getElementById("refreshIndicator").hidden = false;
    pollingTimer = setInterval(() => {
      if (document.hidden || activeTab !== "orders") return;
      loadOrders();
    }, 5000);
  }

  function stopPolling() {
    if (!pollingTimer) return;
    clearInterval(pollingTimer);
    pollingTimer = null;
    document.getElementById("refreshIndicator").hidden = true;
  }

  async function init() {
    const user = await initAdminLayout("orders");
    if (!user) return;

    if (user.role !== "EMPLOYEE") {
      window.location.href = "/admin/dashboard.html";
      return;
    }

    try {
      const data = await request("/restaurants");
      const restaurants = data.restaurants || [];
      if (!restaurants.length) {
        document.getElementById("restaurantName").textContent = "No restaurant assigned";
        document.getElementById("restaurantAddress").textContent = "Ask your owner to add you as a staff member.";
        return;
      }
      restaurantId = restaurants[0].id;
      document.getElementById("restaurantName").textContent = restaurants[0].name;
      document.getElementById("restaurantAddress").textContent = restaurants[0].address || restaurants[0].locality || "Your kitchen workspace";
      document.getElementById("adminContext").textContent = restaurants[0].name;

      // Update sidebar links with restaurantId now that we have it
      const sidebar = document.getElementById("adminSidebar");
      const bnav = document.getElementById("adminBnav");
      if (sidebar) sidebar.innerHTML = adminSidebarHtml("orders", restaurantId, user.role);
      if (bnav) bnav.innerHTML = adminBottomNavHtml("orders", restaurantId, user.role);
    } catch (err) {
      toast(err.message || "Could not load restaurant");
      return;
    }

    loadOrders();
    startPolling();
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) return;
    if (activeTab === "orders" && restaurantId) loadOrders();
  });

  window.addEventListener("pagehide", stopPolling);

  init();
</script>
<noscript>Please enable JavaScript to use Avenzo.</noscript>
</body>
</html>
