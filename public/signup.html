<!DOCTYPE html>
<html>
<head>
  <title>Avenzo Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ffffff, #f4f6fb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      width: 340px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      text-align: center;
      transition: 0.3s;
    }

    .logo {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo img {
      height: 35px;
    }

    .logo span {
      font-weight: bold;
      font-size: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #ff9d00;
      box-shadow: 0 0 0 2px rgba(255,157,0,0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg,#ff7a00,#ffb300);
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(255,157,0,0.3);
    }

    .success {
      color: green;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .link span {
      color: #ff7a00;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="/logo.png">
    <span>Avenzo</span>
  </div>

  <h2>Create Account</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="signupBtn" onclick="signup()">Sign Up</button>

  <div id="message"></div>

  <div class="link">
    Already have an account?
    <span onclick="location.href='/login.html'">Login</span>
  </div>

</div>

<script>
const API = "https://avenzo.app";

async function signup() {
  const btn = document.getElementById("signupBtn");
  const msg = document.getElementById("message");

  msg.innerHTML = "";
  btn.innerText = "Creating...";
  btn.disabled = true;

  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API}/auth/signup`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.userId) {
      msg.innerHTML = `<div class="success">Account created! Redirecting...</div>`;
      setTimeout(() => {
        window.location.href = "/login.html";
      }, 1500);
    } else {
      msg.innerHTML = `<div class="error">${data.error}</div>`;
    }

  } catch {
    msg.innerHTML = `<div class="error">Something went wrong</div>`;
  }

  btn.innerText = "Sign Up";
  btn.disabled = false;
}
</script>

</body>
</html>
