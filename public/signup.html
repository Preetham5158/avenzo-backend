<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>

<body>
  <main class="auth-page">
    <section class="card auth-card">
      <div class="brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>

      <div class="stack" style="text-align:center; margin-bottom:20px;">
        <div class="eyebrow">Create account</div>
        <h1 style="font-size:30px;">Start with Avenzo</h1>
        <p class="muted">Create your account. Restaurant access can be assigned by the Avenzo team.</p>
      </div>

      <form class="stack" onsubmit="signup(event)">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" class="input" placeholder="Your name">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" autocomplete="new-password" placeholder="Create password" required>
        </div>

        <button id="signupBtn" class="btn btn-primary" type="submit">Create account</button>
        <div id="message" class="muted" style="min-height:20px;"></div>
      </form>

      <p class="muted" style="text-align:center; margin:18px 0 0;">
        Already have access?
        <a href="/login.html" style="color:var(--brand); font-weight:800;">Login</a>
      </p>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    async function signup(event) {
      event.preventDefault();
      const btn = document.getElementById("signupBtn");
      const msg = document.getElementById("message");
      msg.textContent = "";
      setLoading(btn, true, "Creating...");

      try {
        const payload = {
          name: document.getElementById("name").value.trim() || null,
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        };
        const res = await fetch(`${API}/auth/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.userId) throw new Error(data.error || "Signup failed");

        msg.textContent = "Account created. Redirecting to login...";
        toast("Account created");
        setTimeout(() => window.location.href = "/login.html", 900);
      } catch (err) {
        msg.textContent = err.message;
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>

</html>
