<!DOCTYPE html>
<html>

<head>
  <title>Reset password — Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>

<body>
  <main class="auth-page">
    <section class="card auth-card">
      <div class="brand center-brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>

      <!-- Step 1: Email -->
      <div id="step1">
        <div class="stack text-center mb-20">
          <div class="eyebrow">Reset password</div>
          <h1 class="h1-auth">Forgot your password?</h1>
          <p class="muted">Enter your email and we'll send a verification code to reset it.</p>
        </div>
        <form class="stack" id="emailForm" onsubmit="requestReset(event)">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <button id="requestBtn" class="btn btn-primary" type="submit">Send verification code</button>
          <div id="emailError" class="muted feedback-line"></div>
        </form>
        <p class="muted auth-footnote">
          <a href="/customer-login.html" class="auth-link">Back to sign in</a>
        </p>
      </div>

      <!-- Step 2: OTP -->
      <div id="step2" hidden>
        <div class="stack text-center mb-20">
          <div class="eyebrow">Verification code</div>
          <h1 class="h1-auth">Check your email</h1>
          <p class="muted" id="otpHint">We sent a 6-digit code to your email.</p>
        </div>
        <form class="stack" id="otpForm" onsubmit="goToStep3(event)">
          <div class="field">
            <label for="otp">Verification code</label>
            <input id="otp" class="input" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6-digit code" required>
          </div>
          <button id="otpBtn" class="btn btn-primary" type="submit">Continue</button>
          <div id="otpError" class="muted feedback-line"></div>
        </form>
        <p class="muted auth-footnote">
          <a href="/customer-login.html" class="auth-link">Back to sign in</a>
        </p>
      </div>

      <!-- Step 3: New password -->
      <div id="step3" hidden>
        <div class="stack text-center mb-20">
          <div class="eyebrow">New password</div>
          <h1 class="h1-auth">Choose a new password</h1>
          <p class="muted">Must be at least 8 characters.</p>
        </div>
        <form class="stack" id="passwordForm" onsubmit="confirmReset(event)">
          <div class="field">
            <label for="newPassword">New password</label>
            <input id="newPassword" class="input" type="password" autocomplete="new-password" placeholder="At least 8 characters" minlength="8" required>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" class="input" type="password" autocomplete="new-password" placeholder="Repeat your new password" required>
          </div>
          <button id="confirmBtn" class="btn btn-primary" type="submit">Set new password</button>
          <div id="passwordError" class="muted feedback-line"></div>
        </form>
      </div>

    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    let challengeId = "";
    let otpValue = "";

    async function requestReset(event) {
      event.preventDefault();
      const btn = document.getElementById("requestBtn");
      const errorEl = document.getElementById("emailError");
      errorEl.textContent = "";
      setLoading(btn, true, "Sending...");
      try {
        const email = document.getElementById("email").value.trim();
        const data = await request("/auth/password-reset/request", {
          method: "POST",
          body: JSON.stringify({ email }),
          auth: false
        });
        challengeId = data.challengeId || "";
        const hint = data.maskedEmail ? `We sent a 6-digit code to ${data.maskedEmail}.` : "We sent a 6-digit code to your email.";
        document.getElementById("otpHint").textContent = hint;
        document.getElementById("step1").hidden = true;
        document.getElementById("step2").hidden = false;
        document.getElementById("otp").focus();
      } catch (err) {
        errorEl.textContent = err.message || "Something went wrong. Please try again.";
      } finally {
        setLoading(btn, false);
      }
    }

    function goToStep3(event) {
      event.preventDefault();
      const otp = document.getElementById("otp").value.trim();
      const errorEl = document.getElementById("otpError");
      errorEl.textContent = "";
      if (!/^\d{6}$/.test(otp)) {
        errorEl.textContent = "Enter the 6-digit code from your email.";
        return;
      }
      otpValue = otp;
      document.getElementById("step2").hidden = true;
      document.getElementById("step3").hidden = false;
      document.getElementById("newPassword").focus();
    }

    async function confirmReset(event) {
      event.preventDefault();
      const btn = document.getElementById("confirmBtn");
      const errorEl = document.getElementById("passwordError");
      errorEl.textContent = "";
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      if (newPassword !== confirmPassword) {
        errorEl.textContent = "Passwords do not match.";
        return;
      }
      setLoading(btn, true, "Saving...");
      try {
        await request("/auth/password-reset/confirm", {
          method: "POST",
          body: JSON.stringify({ challengeId, otp: otpValue, newPassword }),
          auth: false
        });
        toast("Password updated. Sign in with your new password.");
        setTimeout(() => { window.location.href = "/customer-login.html"; }, 1500);
      } catch (err) {
        errorEl.textContent = err.message || "Could not reset password. Please try again.";
        setLoading(btn, false);
      }
    }
  </script>
</body>

</html>
