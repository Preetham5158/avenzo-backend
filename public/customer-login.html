<!DOCTYPE html>
<html>

<head>
  <title>Customer sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>

<body>
  <main class="auth-page">
    <section class="card auth-card">
      <div class="brand center-brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>

      <div class="stack text-center mb-20">
        <div class="eyebrow">Customer sign in</div>
        <h1 class="h1-auth">Customer sign in</h1>
        <p class="muted">Open your dine-in dashboard, track signed-in orders, and get back to menus faster.</p>
      </div>

      <div class="auth-benefits mb-20">
        <span>Order history</span>
        <span>Fast tracking</span>
        <span>Profile saved</span>
      </div>

      <form class="stack" onsubmit="login(event)">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </div>

        <button id="loginBtn" class="btn btn-primary" type="submit">Sign in</button>
        <div id="error" class="muted feedback-line"></div>
      </form>

      <p class="muted auth-footnote">
        New to Avenzo?
        <a href="/customer-signup.html" class="auth-link">Create customer account</a>
      </p>
      <p class="muted auth-footnote">
        <a href="/privacy.html" class="auth-link">Privacy</a> ·
        <a href="/terms.html" class="auth-link">Terms</a> ·
        <a href="/refund-policy.html" class="auth-link">Refund policy</a>
      </p>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    async function login(event) {
      event.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";
      setLoading(btn, true, "Signing in...");

      try {
        const data = await request("/auth/customer/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });

        if (data.otpRequired) {
          throw new Error("OTP is required for this account. Please use restaurant login if this is a partner account.");
        }

        sessionStorage.setItem("token", data.token);
        window.location.href = data.user?.role === "USER" ? "/customer.html" : "/admin/dashboard.html";
      } catch (err) {
        errorEl.textContent = err.message;
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>

</html>
