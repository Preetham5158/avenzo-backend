<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    body {
      padding-bottom: 92px;
    }

    .customer-hero {
      position: sticky;
      top: 0;
      z-index: 24;
      background:
        radial-gradient(circle at 12% 24%, rgba(255, 106, 0, 0.22), transparent 28%),
        linear-gradient(135deg, #0a0a0a, #1c1c1c);
      color: white;
      padding: 14px 0;
    }

    .customer-hero .muted {
      color: rgba(255, 255, 255, 0.72);
    }

    .customer-hero .topbar-inner > div:first-child {
      min-width: 0;
    }

    .customer-hero p {
      overflow-wrap: anywhere;
    }

    #pickupNote {
      margin-bottom: 0;
    }

    .menu-card {
      display: grid;
      grid-template-columns: 86px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .food-img {
      width: 86px;
      height: 86px;
      border-radius: var(--radius);
      object-fit: cover;
      background: #eef0f4;
    }

    .item-copy {
      min-width: 0;
    }

    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f6f7fb;
      border-radius: var(--radius);
      padding: 6px;
    }

    .qty-control .icon-btn {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      min-height: 34px;
      border-radius: 10px;
    }

    .qty-control .btn-dark {
      background: #ffffff;
      color: #101114;
      border-color: #dfe3ea;
      box-shadow: none;
    }

    .food-desc {
      display: -webkit-box;
      margin-bottom: 8px;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .cart-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -16px 42px rgba(16, 17, 20, 0.08);
    }

    .cart-inner {
      width: min(920px, calc(100% - 24px));
      margin: 0 auto;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    @media (max-width: 760px) {
      body {
        padding-bottom: 88px;
      }

      .customer-hero {
        padding: 10px 0;
      }

      .customer-hero h1 {
        font-size: 18px;
        line-height: 1.15;
        margin-bottom: 3px;
      }

      .customer-hero .brand {
        display: none;
      }

      .customer-hero p {
        font-size: 13px;
        line-height: 1.35;
      }

      #restaurantAddress {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      #pickupNote {
        display: none;
      }

      .menu-card {
        grid-template-columns: 68px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 12px;
      }

      .food-img {
        width: 68px;
        height: 68px;
      }

      .qty-control {
        grid-column: 2;
        justify-content: flex-start;
        justify-self: start;
        width: fit-content;
        margin-top: 8px;
        padding: 4px;
      }

      .qty-control .icon-btn {
        flex-basis: 32px;
        width: 32px;
        height: 32px;
        min-height: 32px;
      }

      .menu-card h3 {
        font-size: 15px;
        line-height: 1.2;
      }

      .food-desc {
        display: none;
      }

      .cart-inner {
        width: 100%;
        min-height: 72px;
        padding: 0 10px;
        gap: 10px;
      }

      .cart-inner > div:first-child {
        min-width: 52px;
      }

      .cart-inner .btn {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <header class="customer-hero">
    <div class="topbar-inner" style="min-height:auto;">
      <div>
        <div class="eyebrow">Order without waiting</div>
        <h1 id="restaurantName">Loading...</h1>
        <p class="muted" id="restaurantAddress">Choose your favourites now. We will keep the pickup simple.</p>
        <p class="muted" id="pickupNote"></p>
      </div>
      <div class="brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>
    </div>
  </header>

  <main class="page" style="max-width:920px;">
    <section class="search-wrap">
      <div class="field">
        <label for="menuSearch">What would you like today?</label>
        <input id="menuSearch" class="input" placeholder="Search dosa, idli, coffee..." oninput="setSearch(this.value)">
      </div>
    </section>
    <section class="tabbar" id="categoryTabs"></section>
    <section class="stack" id="menu" style="margin-top:12px;">Loading menu...</section>
  </main>

  <div class="cart-bar">
    <div class="cart-inner">
      <div>
        <strong><span id="count">0</span> items</strong>
        <div class="muted" id="total">₹0</div>
      </div>
      <button id="orderBtn" class="btn btn-primary" onclick="openCheckout()" disabled>Continue</button>
    </div>
  </div>

  <div class="modal-backdrop" id="checkoutModal">
    <form class="modal" onsubmit="placeOrder(event)">
      <div class="modal-head row-between">
        <div>
          <h3 style="margin:0;">Almost done</h3>
          <div class="muted">Please check your items. Payment can come in the next step.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeCheckout()">X</button>
      </div>
      <div class="modal-body stack">
        <div id="cartItems" class="stack"></div>
        <div class="field">
          <label for="phone">Mobile number optional</label>
          <input id="phone" class="input" inputmode="tel" placeholder="Only if the hotel needs to reach you">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeCheckout()">Add more</button>
        <button id="placeBtn" class="btn btn-primary" type="submit">Send to kitchen</button>
      </div>
    </form>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let restaurantId = new URLSearchParams(location.search).get("restaurantId");
    const slug = window.location.pathname.startsWith("/r/")
      ? decodeURIComponent(window.location.pathname.split("/r/")[1] || "")
      : new URLSearchParams(location.search).get("slug");
    let cart = [];
    let menuData = [];
    let activeCategory = "ALL";
    let searchTerm = "";

    async function init() {
      try {
        const restaurant = slug
          ? await request(`/restaurant/slug/${slug}`, { headers: {} })
          : await request(`/restaurant/${restaurantId}`, { headers: {} });
        restaurantId = restaurant.id;
        document.getElementById("restaurantName").textContent = restaurant.name;
        document.getElementById("restaurantAddress").textContent = restaurant.address || restaurant.locality || "Choose your favourites now. We will keep the pickup simple.";
        document.getElementById("pickupNote").textContent = restaurant.pickupNote || "";
        await loadMenu();
      } catch (err) {
        document.getElementById("menu").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadMenu() {
      menuData = slug
        ? await request(`/menu/by-slug/${slug}`, { headers: {} })
        : await request(`/menu/${restaurantId}`, { headers: {} });
      menuData.sort((a, b) => Number(b.isAvailable) - Number(a.isAvailable));
      renderTabs();
      renderMenu();
      updateUI();
    }

    function categoryName(item) {
      return item.category?.name || "Others";
    }

    function renderTabs() {
      const categories = [...new Set(menuData.map(categoryName))].sort();
      document.getElementById("categoryTabs").innerHTML = `
        <button class="btn tab ${activeCategory === "ALL" ? "active" : ""}" onclick="setCategory('ALL')">All</button>
        ${categories.map(name => `
          <button class="btn tab ${activeCategory === name ? "active" : ""}" onclick='setCategory(${JSON.stringify(name)})'>${escapeHtml(name)}</button>
        `).join("")}
      `;
    }

    function setCategory(name) {
      activeCategory = name;
      renderTabs();
      renderMenu();
    }

    function setSearch(value) {
      searchTerm = value.trim().toLowerCase();
      renderMenu();
    }

    function renderMenu() {
      let visible = activeCategory === "ALL"
        ? menuData
        : menuData.filter(item => categoryName(item) === activeCategory);

      if (searchTerm) {
        visible = visible.filter(item => [
          item.name,
          item.description,
          categoryName(item)
        ].join(" ").toLowerCase().includes(searchTerm));
      }

      const grouped = visible.reduce((acc, item) => {
        const name = categoryName(item);
        acc[name] = acc[name] || [];
        acc[name].push(item);
        return acc;
      }, {});

      const container = document.getElementById("menu");
      if (!visible.length) {
        container.innerHTML = `<div class="empty">We could not find that dish here. Try another name or category.</div>`;
        return;
      }

      container.innerHTML = Object.keys(grouped).map(cat => `
        <div class="eyebrow" style="margin-top:12px;">${escapeHtml(cat)}</div>
        ${grouped[cat].map(item => itemHtml(item)).join("")}
      `).join("");
      updateUI();
    }

    function itemHtml(item) {
      const disabled = !item.isAvailable;
      return `
        <article class="card card-pad menu-card">
          <img class="food-img" src="${escapeHtml(item.imageUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300")}" alt="">
          <div class="item-copy">
            <div class="row" style="flex-wrap:wrap; margin-bottom:6px;">
              <h3 style="margin:0;">${escapeHtml(item.name)}</h3>
              ${disabled ? `<span class="pill pill-danger">Out of stock</span>` : ""}
            </div>
            <p class="muted food-desc">${escapeHtml(item.description || "Freshly prepared by the restaurant.")}</p>
            <strong>${money(item.price)}</strong>
          </div>
          <div class="qty-control">
            <button class="btn btn-dark icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', -1)">-</button>
            <strong id="qty-${item.id}">0</strong>
            <button class="btn btn-primary icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </article>
      `;
    }

    function changeQty(id, delta) {
      const itemData = menuData.find(m => m.id === id);
      if (!itemData || !itemData.isAvailable) return;

      let item = cart.find(i => i.menuId === id);
      if (!item && delta > 0) {
        item = { menuId: id, quantity: 0 };
        cart.push(item);
      }

      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) cart = cart.filter(i => i.menuId !== id);
      }

      updateUI();
    }

    function updateUI() {
      let totalItems = 0;
      let totalPrice = 0;

      menuData.forEach(item => {
        const found = cart.find(i => i.menuId === item.id);
        const qty = found?.quantity || 0;
        const qtyEl = document.getElementById(`qty-${item.id}`);
        if (qtyEl) qtyEl.textContent = qty;
      });

      cart.forEach(i => {
        const data = menuData.find(m => m.id === i.menuId);
        if (!data) return;
        totalItems += i.quantity;
        totalPrice += i.quantity * data.price;
      });

      document.getElementById("count").textContent = totalItems;
      document.getElementById("total").textContent = money(totalPrice);
      document.getElementById("orderBtn").disabled = totalItems === 0;
    }

    function openCheckout() {
      if (!cart.length) return toast("Your cart is empty");
      document.getElementById("cartItems").innerHTML = cart.map(i => {
        const item = menuData.find(m => m.id === i.menuId);
        return `
          <div class="row-between card card-pad">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <div class="muted">${i.quantity} x ${money(item.price)}</div>
            </div>
            <strong>${money(item.price * i.quantity)}</strong>
          </div>
        `;
      }).join("");
      document.getElementById("checkoutModal").classList.add("open");
    }

    function closeCheckout() {
      document.getElementById("checkoutModal").classList.remove("open");
    }

    async function placeOrder(event) {
      event.preventDefault();
      const btn = document.getElementById("placeBtn");
      setLoading(btn, true, "Placing...");

      try {
        const data = await request("/order", {
          method: "POST",
          body: JSON.stringify({
            restaurantId,
            sessionId: "web-" + Date.now(),
            phone: document.getElementById("phone").value.trim() || null,
            items: cart
          })
        });
        window.location.href = `/track/${data.orderId}`;
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    init();
  </script>
</body>

</html>
