<!DOCTYPE html>
<html>
<head>
  <title>Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .category {
      margin-top: 25px;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .menu-item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .info {
      max-width: 60%;
    }

    .name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .price {
      color: #666;
    }

    .controls {
      display: flex;
      align-items: center;
    }

    .btn {
      background: black;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .qty {
      margin: 0 10px;
      font-weight: bold;
    }

    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-btn {
      background: white;
      color: black;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header id="restaurantName">Loading...</header>

<div class="container" id="menu"></div>

<div class="cart-bar">
  <div>
    🛒 <span id="count">0</span> items<br>
    ₹ <span id="total">0</span>
  </div>
  <button class="cart-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
const API = "https://avenzo.app";

const params = new URLSearchParams(window.location.search);
const restaurantId = params.get("restaurantId");

if (!restaurantId) {
  alert("Invalid QR");
}

let cart = [];
let menuData = [];

async function loadRestaurant() {
  const res = await fetch(`${API}/restaurant/${restaurantId}`);
  const data = await res.json();
  document.getElementById("restaurantName").innerText = data.name;
}

async function loadMenu() {
  const res = await fetch(`${API}/menu/${restaurantId}`);
  menuData = await res.json();

  const grouped = {};

  menuData.forEach(item => {
    if (!grouped[item.category]) {
      grouped[item.category] = [];
    }
    grouped[item.category].push(item);
  });

  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.keys(grouped).forEach(category => {
    const catTitle = document.createElement("div");
    catTitle.className = "category";
    catTitle.innerText = category;
    container.appendChild(catTitle);

    grouped[category].forEach(item => {
      const div = document.createElement("div");
      div.className = "menu-item";

      div.innerHTML = `
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="price">₹${item.price}</div>
        </div>
        <div class="controls">
          <button class="btn" onclick="changeQty('${item.id}', -1)">−</button>
          <span class="qty" id="qty-${item.id}">0</span>
          <button class="btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      `;

      container.appendChild(div);
    });
  });
}

function changeQty(menuId, delta) {
  let item = cart.find(i => i.menuId === menuId);

  if (!item && delta > 0) {
    item = { menuId, quantity: 0 };
    cart.push(item);
  }

  if (item) {
    item.quantity += delta;

    if (item.quantity <= 0) {
      cart = cart.filter(i => i.menuId !== menuId);
    }
  }

  updateUI();
}

function updateUI() {
  let totalItems = 0;
  let totalPrice = 0;

  cart.forEach(item => {
    const data = menuData.find(m => m.id === item.menuId);

    if (!data) return;

    totalItems += item.quantity;
    totalPrice += item.quantity * data.price;

    const el = document.getElementById(`qty-${item.menuId}`);
    if (el) el.innerText = item.quantity;
  });

  document.getElementById("count").innerText = totalItems;
  document.getElementById("total").innerText = totalPrice;
}

async function placeOrder() {
  if (cart.length === 0) {
    alert("Cart empty");
    return;
  }

  const res = await fetch(`${API}/order`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      restaurantId,
      sessionId: "web-" + Date.now(),
      items: cart
    })
  });

  const data = await res.json();

  window.location.href = `${API}/track/${data.orderId}`;
}

loadRestaurant();
loadMenu();
</script>

</body>
</html>
