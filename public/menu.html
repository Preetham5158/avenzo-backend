<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    :root {
      --dine-top: 72px;
      --search-top: 76px;
      --rail-top: 148px;
      --saffron: #ff6b16;
      --turmeric: #ffc857;
      --leaf: #12745b;
      --cocoa: #25130e;
      --cream: #fff6e8;
      --paper: #fffdf8;
    }

    body {
      min-height: 100vh;
      padding-bottom: 94px;
      overflow-x: hidden;
      background:
        linear-gradient(135deg, rgba(18, 116, 91, 0.18), transparent 42%),
        linear-gradient(180deg, #2b1711 0, #2b1711 72px, #eaf7ef 72px, #fff6ed 48%, #eef6ff 100%);
      color: #20120d;
    }

    .dine-top {
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--dine-top);
      display: flex;
      align-items: center;
      color: white;
      background:
        linear-gradient(100deg, #20100c 0%, #3a1c11 48%, #102c25 100%);
      box-shadow: 0 18px 42px rgba(32, 16, 12, 0.24);
    }

    .dine-inner {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .dine-copy {
      flex: 1 1 auto;
      min-width: 0;
      max-width: 100%;
    }

    .dine-copy h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dine-copy p {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dine-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      color: #ffe9cb;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.13);
      font-size: 12px;
      font-weight: 800;
    }

    .order-page {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 96px;
    }

    .quick-search {
      position: sticky;
      top: var(--search-top);
      z-index: 42;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 20px;
      background: rgba(255, 253, 248, 0.86);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(64, 31, 15, 0.12);
    }

    .search-mini {
      position: relative;
      min-width: 0;
    }

    .search-mini span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #8a5b3a;
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
    }

    .search-mini .input {
      min-height: 40px;
      padding-left: 62px;
      border-radius: 999px;
      background: #fffaf2;
      border-color: rgba(108, 71, 47, 0.16);
      box-shadow: none;
    }

    .quick-count {
      white-space: nowrap;
      padding: 9px 12px;
      border-radius: 999px;
      color: #ffffff;
      background: #12745b;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(18, 116, 91, 0.22);
    }

    .menu-layout {
      display: grid;
      grid-template-columns: 122px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .category-rail {
      position: sticky;
      top: var(--rail-top);
      z-index: 30;
      max-height: calc(100vh - var(--rail-top) - 98px);
      display: grid;
      gap: 8px;
      padding: 8px;
      overflow: auto;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 247, 235, 0.84));
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 20px 42px rgba(64, 31, 15, 0.12);
      backdrop-filter: blur(18px);
    }

    .category-button {
      min-height: 60px;
      width: 100%;
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 8px;
      border-radius: 16px;
      text-align: left;
      background: rgba(255, 255, 255, 0.74);
      color: #4f2e20;
      border: 1px solid rgba(108, 71, 47, 0.12);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .category-button:hover {
      transform: translateY(-1px);
    }

    .category-button.active {
      color: white;
      background: linear-gradient(135deg, var(--saffron), #d44a15);
      box-shadow: 0 12px 24px rgba(255, 107, 22, 0.22);
    }

    .category-button strong {
      font-size: 13px;
      line-height: 1.12;
    }

    .category-button span {
      color: inherit;
      opacity: 0.72;
      font-size: 11px;
      font-weight: 800;
    }

    .menu-feed {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .menu-section {
      display: grid;
      gap: 10px;
      scroll-margin-top: calc(var(--rail-top) + 4px);
    }

    .section-head {
      position: sticky;
      top: var(--rail-top);
      z-index: 22;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 18px;
      color: #321b12;
      background: rgba(255, 250, 242, 0.9);
      border: 1px solid rgba(108, 71, 47, 0.12);
      box-shadow: 0 12px 28px rgba(64, 31, 15, 0.08);
      backdrop-filter: blur(14px);
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-head p {
      margin: 2px 0 0;
      color: #7a5d4c;
      font-size: 13px;
    }

    .section-head button {
      flex: 0 0 38px;
      width: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 13px;
      color: white;
      background: #12745b;
      box-shadow: 0 10px 20px rgba(18, 116, 91, 0.18);
    }

    .food-card {
      position: relative;
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px;
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(108, 71, 47, 0.1);
      box-shadow: 0 14px 34px rgba(64, 31, 15, 0.1);
      transform: translateZ(0);
      animation: card-pop 0.22s ease both;
    }

    .food-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: linear-gradient(180deg, var(--saffron), var(--turmeric), var(--leaf));
      opacity: 0.8;
    }

    .food-card:hover {
      transform: translateY(-2px) perspective(800px) rotateX(1deg);
      box-shadow: 0 20px 42px rgba(64, 31, 15, 0.14);
    }

    .food-img-wrap {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 20px;
      overflow: hidden;
      background: #f1e5d5;
      box-shadow: 0 12px 24px rgba(64, 31, 15, 0.16);
    }

    .food-img-wrap::after {
      content: "";
      position: absolute;
      inset: auto 10px 8px;
      height: 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.18);
      filter: blur(9px);
    }

    .food-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.03);
      transition: transform 0.24s ease;
    }

    .food-card:hover .food-img {
      transform: scale(1.08);
    }

    .item-copy {
      min-width: 0;
    }

    .item-copy h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .food-desc {
      display: -webkit-box;
      margin-bottom: 8px;
      overflow: hidden;
      color: #6f5b4f;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .price-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .price-row strong {
      font-size: 17px;
    }

    .add-btn {
      min-width: 92px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--saffron), #ff9f1c);
      color: #231006;
      box-shadow: 0 16px 28px rgba(255, 107, 22, 0.22);
    }

    .add-btn.is-hidden,
    .qty-control.is-hidden {
      display: none;
    }

    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: #fff6e8;
      border: 1px solid rgba(255, 107, 22, 0.2);
      box-shadow: 0 14px 24px rgba(255, 107, 22, 0.14);
    }

    .qty-control .icon-btn {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      min-height: 34px;
      border-radius: 999px;
    }

    .qty-control .btn-dark {
      background: white;
      color: #20120d;
      border: 1px solid rgba(108, 71, 47, 0.14);
      box-shadow: none;
    }

    .cart-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 48;
      background: rgba(255, 253, 248, 0.92);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(108, 71, 47, 0.12);
      box-shadow: 0 -18px 48px rgba(64, 31, 15, 0.1);
    }

    .cart-bar.has-items {
      box-shadow: 0 -22px 52px rgba(255, 107, 22, 0.16);
    }

    .cart-inner {
      width: min(1180px, calc(100% - 24px));
      min-height: 78px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-inner .btn {
      min-width: 180px;
      border-radius: 18px;
    }

    @keyframes card-pop {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .food-card,
      .food-img,
      .category-button,
      .menu-layout {
        animation: none;
        transition: none;
      }
    }

    @media (max-width: 760px) {
      :root {
        --dine-top: 66px;
        --search-top: 68px;
        --rail-top: 132px;
      }

      body {
        padding-bottom: 88px;
        background:
          linear-gradient(135deg, rgba(18, 116, 91, 0.18), transparent 50%),
          linear-gradient(180deg, #2b1711 0, #2b1711 68px, #eaf7ef 68px, #fff6ed 54%, #eef6ff 100%);
      }

      .dine-top {
        height: var(--dine-top);
      }

      .dine-inner {
        width: min(100% - 18px, 1180px);
      }

      .dine-copy {
        width: 100%;
      }

      .dine-copy h1 {
        font-size: 17px;
        max-width: 100%;
      }

      .dine-copy p {
        font-size: 12px;
        width: 100%;
        max-width: 100%;
      }

      .dine-badge {
        display: none;
      }

      .order-page {
        width: min(100% - 16px, 1180px);
        padding-top: 8px;
      }

      .quick-search {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 8px;
        border-radius: 18px;
      }

      .quick-count {
        display: none;
      }

      .search-mini .input {
        min-height: 38px;
      }

      .menu-layout {
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 8px;
      }

      .category-rail {
        top: var(--rail-top);
        max-height: calc(100vh - var(--rail-top) - 92px);
        padding: 6px;
        border-radius: 18px;
      }

      .category-button {
        min-height: 48px;
        padding: 6px;
        border-radius: 13px;
      }

      .category-button strong {
        font-size: 11px;
      }

      .category-button span {
        font-size: 10px;
      }

      .section-head {
        top: var(--rail-top);
        padding: 9px 10px;
        border-radius: 16px;
      }

      .section-head h2 {
        font-size: 15px;
      }

      .section-head p {
        font-size: 12px;
      }

      .food-card {
        grid-template-columns: 68px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border-radius: 18px;
      }

      .food-card:hover {
        transform: none;
      }

      .food-img-wrap {
        width: 68px;
        height: 68px;
        border-radius: 16px;
      }

      .item-copy h3 {
        font-size: 15px;
        line-height: 1.2;
      }

      .food-desc {
        display: none;
      }

      .add-btn,
      .qty-control {
        grid-column: 2;
        justify-self: start;
        margin-top: 6px;
      }

      .add-btn {
        width: 76px;
        min-width: 76px;
        min-height: 34px;
        padding: 0 14px;
      }

      .food-card .btn {
        width: auto;
      }

      .qty-control {
        padding: 4px;
      }

      .qty-control .icon-btn {
        flex-basis: 30px;
        width: 30px;
        height: 30px;
        min-height: 30px;
      }

      .cart-inner {
        width: 100%;
        min-height: 72px;
        padding: 0 10px;
      }

      .cart-inner .btn {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <header class="dine-top">
    <div class="dine-inner">
      <div class="dine-copy">
        <div class="eyebrow">Avenzo dine-in order</div>
        <h1 id="restaurantName">Opening menu...</h1>
        <p id="restaurantAddress">Choose here. Eat here. Skip the billing queue.</p>
      </div>
      <div class="dine-badge" id="dineNote">Live dine-in menu</div>
    </div>
  </header>

  <main class="order-page">
    <section class="quick-search">
      <div class="search-mini">
        <span>Find</span>
        <input id="menuSearch" class="input" placeholder="dosa, idli, coffee..." oninput="setSearch(this.value)">
      </div>
      <div class="quick-count" id="matchCount">Finding favourites...</div>
    </section>

    <section class="menu-layout" id="menuLayout">
      <aside class="category-rail">
        <div id="categoryRail"></div>
      </aside>
      <section class="menu-feed" id="menu"></section>
    </section>
  </main>

  <div class="cart-bar">
    <div class="cart-inner">
      <div>
        <strong><span id="count">0</span> items</strong>
        <div class="muted" id="total">₹0</div>
      </div>
      <button id="orderBtn" class="btn btn-primary" onclick="openCheckout()" disabled>Continue</button>
    </div>
  </div>

  <div class="modal-backdrop" id="checkoutModal">
    <form class="modal" onsubmit="placeOrder(event)">
      <div class="modal-head row-between">
        <div>
          <h3 class="section-title">Ready to enjoy</h3>
          <div class="muted">Review once. Your order goes straight to the restaurant team.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeCheckout()">X</button>
      </div>
      <div class="modal-body stack">
        <div id="cartItems" class="stack"></div>
        <div class="field">
          <label for="phone">Mobile number optional</label>
          <input id="phone" class="input" inputmode="tel" placeholder="Only if the hotel needs to reach you">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeCheckout()">Add more</button>
        <button id="placeBtn" class="btn btn-primary" type="submit">Place order</button>
      </div>
    </form>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let restaurantId = new URLSearchParams(location.search).get("restaurantId");
    const slug = window.location.pathname.startsWith("/r/")
      ? decodeURIComponent(window.location.pathname.split("/r/")[1] || "")
      : new URLSearchParams(location.search).get("slug");
    let cart = [];
    let menuData = [];
    let activeCategory = "ALL";
    let searchTerm = "";
    const collapsedCategories = new Set();

    async function init() {
      try {
        document.getElementById("menu").innerHTML = skeletonCards(6, "food");
        const restaurant = slug
          ? await request(`/restaurant/slug/${slug}`, { headers: {} })
          : await request(`/restaurant/${restaurantId}`, { headers: {} });
        restaurantId = restaurant.id;
        document.getElementById("restaurantName").textContent = restaurant.name;
        document.getElementById("restaurantAddress").textContent = restaurant.address || restaurant.locality || "Choose here. Eat here. Skip the billing queue.";
        document.getElementById("dineNote").textContent = "Live dine-in menu";
        if (restaurant.serviceAvailable === false) {
          document.getElementById("menu").innerHTML = `
            <div class="empty">
              <h3 class="card-title-gap">Ordering will be back soon</h3>
              <p class="muted mb-0">${escapeHtml(restaurant.serviceMessage || "This restaurant is taking a short pause on Avenzo. Please check back soon.")}</p>
            </div>`;
          document.getElementById("orderBtn").disabled = true;
          return;
        }
        await loadMenu();
      } catch (err) {
        document.getElementById("menu").innerHTML = `<div class="empty">${escapeHtml(err.message || "Ordering will be back soon")}</div>`;
      }
    }

    async function loadMenu() {
      menuData = slug
        ? await request(`/menu/by-slug/${slug}`, { headers: {} })
        : await request(`/menu/${restaurantId}`, { headers: {} });
      menuData.sort((a, b) => Number(b.isAvailable) - Number(a.isAvailable));
      renderRail();
      renderMenu();
      updateUI();
    }

    function categoryName(item) {
      return item.category?.name || "Others";
    }

    function visibleItems() {
      let visible = activeCategory === "ALL"
        ? menuData
        : menuData.filter(item => categoryName(item) === activeCategory);

      if (searchTerm) {
        visible = visible.filter(item => [
          item.name,
          item.description,
          categoryName(item)
        ].join(" ").toLowerCase().includes(searchTerm));
      }

      return visible;
    }

    function renderRail() {
      const categories = [...new Set(menuData.map(categoryName))].sort();
      const counts = categories.reduce((acc, name) => {
        acc[name] = menuData.filter(item => categoryName(item) === name).length;
        return acc;
      }, {});

      document.getElementById("categoryRail").innerHTML = `
        <button class="category-button ${activeCategory === "ALL" ? "active" : ""}" onclick="setCategory('ALL')">
          <strong>All</strong>
          <span>${menuData.length} items</span>
        </button>
        ${categories.map(name => `
          <button class="category-button ${activeCategory === name ? "active" : ""}" onclick='setCategory(${JSON.stringify(name)})'>
            <strong>${escapeHtml(name)}</strong>
            <span>${counts[name]} items</span>
          </button>
        `).join("")}
      `;
    }

    function setCategory(name) {
      activeCategory = name;
      renderRail();
      renderMenu();
      const target = name === "ALL" ? document.getElementById("menu") : document.getElementById(`section-${slugifyLocal(name)}`);
      target?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function setSearch(value) {
      searchTerm = value.trim().toLowerCase();
      renderMenu();
    }

    function toggleSection(name) {
      if (collapsedCategories.has(name)) collapsedCategories.delete(name);
      else collapsedCategories.add(name);
      renderMenu();
    }

    function renderMenu() {
      const visible = visibleItems();
      const grouped = visible.reduce((acc, item) => {
        const name = categoryName(item);
        acc[name] = acc[name] || [];
        acc[name].push(item);
        return acc;
      }, {});

      document.getElementById("matchCount").textContent = `${visible.length} item${visible.length === 1 ? "" : "s"}`;

      if (!visible.length) {
        document.getElementById("menu").innerHTML = `<div class="empty">No dish found here. Try a simpler search like dosa, idli, rice, or coffee.</div>`;
        return;
      }

      document.getElementById("menu").innerHTML = Object.keys(grouped).map(cat => `
        <section class="menu-section" id="section-${slugifyLocal(cat)}">
          <div class="section-head">
            <div>
              <h2>${escapeHtml(cat)}</h2>
              <p>${grouped[cat].length} tasty pick${grouped[cat].length === 1 ? "" : "s"}</p>
            </div>
            <button class="btn" type="button" onclick='toggleSection(${JSON.stringify(cat)})' aria-label="Toggle ${escapeHtml(cat)}">
              ${collapsedCategories.has(cat) ? "+" : "-"}
            </button>
          </div>
          ${collapsedCategories.has(cat) ? "" : grouped[cat].map(item => itemHtml(item)).join("")}
        </section>
      `).join("");
      updateUI();
    }

    function slugifyLocal(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function itemHtml(item) {
      const disabled = !item.isAvailable;
      return `
        <article class="food-card">
          <div class="food-img-wrap">
            <img class="food-img" src="${escapeHtml(item.imageUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300")}" alt="" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=900&q=80';">
          </div>
          <div class="item-copy">
            <h3>${escapeHtml(item.name)}</h3>
            <p class="food-desc">${escapeHtml(item.description || "Freshly prepared by the restaurant.")}</p>
            <div class="price-row">
              <strong>${money(item.price)}</strong>
              ${disabled ? `<span class="pill pill-danger">Out of stock</span>` : ""}
            </div>
          </div>
          <button class="btn btn-primary add-btn" id="add-${item.id}" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', 1)">Add</button>
          <div class="qty-control is-hidden" id="stepper-${item.id}">
            <button class="btn btn-dark icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', -1)">-</button>
            <strong id="qty-${item.id}">0</strong>
            <button class="btn btn-primary icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </article>
      `;
    }

    function changeQty(id, delta) {
      const itemData = menuData.find(m => m.id === id);
      if (!itemData || !itemData.isAvailable) return;

      let item = cart.find(i => i.menuId === id);
      if (!item && delta > 0) {
        item = { menuId: id, quantity: 0 };
        cart.push(item);
      }

      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) cart = cart.filter(i => i.menuId !== id);
      }

      updateUI();
    }

    function updateUI() {
      let totalItems = 0;
      let totalPrice = 0;

      menuData.forEach(item => {
        const found = cart.find(i => i.menuId === item.id);
        const qty = found?.quantity || 0;
        const qtyEl = document.getElementById(`qty-${item.id}`);
        if (qtyEl) qtyEl.textContent = qty;
        document.getElementById(`add-${item.id}`)?.classList.toggle("is-hidden", qty > 0);
        document.getElementById(`stepper-${item.id}`)?.classList.toggle("is-hidden", qty === 0);
      });

      cart.forEach(i => {
        const data = menuData.find(m => m.id === i.menuId);
        if (!data) return;
        totalItems += i.quantity;
        totalPrice += i.quantity * data.price;
      });

      document.getElementById("count").textContent = totalItems;
      document.getElementById("total").textContent = money(totalPrice);
      document.getElementById("orderBtn").disabled = totalItems === 0;
      document.querySelector(".cart-bar")?.classList.toggle("has-items", totalItems > 0);
    }

    function openCheckout() {
      if (!cart.length) return toast("Your cart is empty");
      document.getElementById("cartItems").innerHTML = cart.map(i => {
        const item = menuData.find(m => m.id === i.menuId);
        if (!item) return "";
        return `
          <div class="row-between card card-pad">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <div class="muted">${i.quantity} x ${money(item.price)}</div>
            </div>
            <strong>${money(item.price * i.quantity)}</strong>
          </div>
        `;
      }).join("");
      document.getElementById("checkoutModal").classList.add("open");
    }

    function closeCheckout() {
      document.getElementById("checkoutModal").classList.remove("open");
    }

    async function placeOrder(event) {
      event.preventDefault();
      const btn = document.getElementById("placeBtn");
      setLoading(btn, true, "Sending...");

      try {
        const data = await request("/order", {
          method: "POST",
          body: JSON.stringify({
            restaurantId,
            sessionId: "web-" + Date.now(),
            phone: document.getElementById("phone").value.trim() || null,
            items: cart
          })
        });
        window.location.href = `/track/${data.orderId}`;
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    init();
  </script>
</body>

</html>
