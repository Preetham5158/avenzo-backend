<!DOCTYPE html>
<html>

<head>
  <title>Avenzo Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    :root {
      --customer-hero-height: 96px;
      --customer-discovery-top: 96px;
      --customer-section-top: 246px;
    }

    body {
      padding-bottom: 104px;
      background:
        linear-gradient(180deg, #15110f 0, #15110f 96px, #fff6ee 96px, #fffaf6 52%, #f6f7fb 100%);
      overflow-x: hidden;
    }

    .customer-hero {
      position: sticky;
      top: 0;
      z-index: 34;
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 138, 36, 0.32), transparent 28%),
        linear-gradient(135deg, #120d0a, #1b1b1c 62%, #0a0a0a);
      color: white;
      padding: 12px 0;
      box-shadow: 0 16px 36px rgba(16, 17, 20, 0.18);
    }

    .customer-hero .muted {
      color: rgba(255, 255, 255, 0.72);
    }

    .customer-hero .topbar-inner > div:first-child {
      min-width: 0;
    }

    .customer-hero p {
      overflow-wrap: anywhere;
    }

    #pickupNote {
      margin-bottom: 0;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .hero-meta .pill {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .discovery-dock {
      position: sticky;
      top: var(--customer-discovery-top);
      z-index: 28;
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      padding: 12px;
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input-wrap::before {
      content: "Search";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
    }

    .search-input-wrap .input {
      min-height: 52px;
      padding-left: 68px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(16, 17, 20, 0.02);
    }

    .category-bar {
      display: grid;
      gap: 8px;
    }

    .category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .category-head .btn {
      min-height: 34px;
      border-radius: 999px;
      font-size: 13px;
    }

    .category-rail {
      max-height: 92px;
      transition: max-height 0.22s ease, opacity 0.18s ease;
    }

    .categories-collapsed .category-rail {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding-bottom: 0;
    }

    .menu-section {
      display: grid;
      gap: 10px;
      scroll-margin-top: var(--customer-section-top);
    }

    .category-heading {
      position: sticky;
      top: var(--customer-section-top);
      z-index: 16;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(231, 233, 239, 0.82);
      border-radius: 999px;
      background: rgba(255, 250, 246, 0.94);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 26px rgba(16, 17, 20, 0.05);
    }

    .category-heading button {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      min-width: 72px;
      background: #101114;
      color: white;
      border-color: #101114;
    }

    .menu-card {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border-radius: 18px;
      overflow: hidden;
    }

    .food-img {
      width: 96px;
      height: 96px;
      border-radius: 16px;
      object-fit: cover;
      background: #eef0f4;
    }

    .item-copy {
      min-width: 0;
    }

    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff7ef;
      border: 1px solid rgba(255, 106, 0, 0.18);
      border-radius: 999px;
      padding: 6px;
      box-shadow: 0 10px 22px rgba(255, 106, 0, 0.12);
    }

    .qty-control .icon-btn {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      min-height: 34px;
      border-radius: 10px;
    }

    .qty-control .btn-dark {
      background: #ffffff;
      color: #101114;
      border-color: #dfe3ea;
      box-shadow: none;
    }

    .qty-control.is-hidden {
      display: none;
    }

    .add-btn {
      min-width: 96px;
      border-radius: 999px;
    }

    .add-btn.is-hidden {
      display: none;
    }

    .food-desc {
      display: -webkit-box;
      margin-bottom: 8px;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .cart-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -16px 42px rgba(16, 17, 20, 0.08);
      transform: translateY(0);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cart-bar.has-items {
      box-shadow: 0 -18px 48px rgba(255, 106, 0, 0.14);
    }

    .cart-inner {
      width: min(920px, calc(100% - 24px));
      margin: 0 auto;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    @media (max-width: 760px) {
      :root {
        --customer-hero-height: 89px;
        --customer-discovery-top: 89px;
        --customer-section-top: 243px;
      }

      body {
        padding-bottom: 90px;
        background:
          linear-gradient(180deg, #15110f 0, #15110f 89px, #fff3e9 89px, #fffaf6 54%, #f6f7fb 100%);
      }

      .customer-hero {
        padding: 10px 0;
      }

      .customer-hero h1 {
        font-size: 18px;
        line-height: 1.15;
        margin-bottom: 3px;
      }

      .customer-hero .brand {
        display: none;
      }

      .customer-hero p {
        font-size: 13px;
        line-height: 1.35;
      }

      .hero-meta {
        display: none;
      }

      .discovery-dock {
        top: var(--customer-discovery-top);
        width: calc(100% + 4px);
        margin-left: -2px;
        padding: 10px;
        border-radius: 18px;
      }

      .discovery-dock .btn,
      .category-heading .btn,
      .menu-card .btn {
        width: auto;
      }

      .category-rail .tab {
        flex: 0 0 auto;
        min-width: max-content;
        padding: 0 14px;
      }

      .category-head .btn,
      .category-heading .btn {
        flex: 0 0 auto;
      }

      .category-heading {
        top: var(--customer-section-top);
      }

      .category-heading button {
        display: none;
      }

      #restaurantAddress {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      #pickupNote {
        display: none;
      }

      .menu-card {
        grid-template-columns: 74px minmax(0, 1fr);
        gap: 11px;
        align-items: start;
        padding: 12px;
      }

      .food-img {
        width: 74px;
        height: 74px;
      }

      .qty-control {
        grid-column: 2;
        justify-content: flex-start;
        justify-self: start;
        width: fit-content;
        margin-top: 6px;
        padding: 4px;
      }

      .add-btn {
        grid-column: 2;
        justify-self: start;
        min-width: 64px;
        min-height: 34px;
        margin-top: 6px;
        padding: 0 12px;
      }

      .qty-control .icon-btn {
        flex-basis: 32px;
        width: 32px;
        height: 32px;
        min-height: 32px;
      }

      .menu-card h3 {
        font-size: 15px;
        line-height: 1.2;
      }

      .food-desc {
        display: none;
      }

      .cart-inner {
        width: 100%;
        min-height: 72px;
        padding: 0 10px;
        gap: 10px;
      }

      .cart-inner > div:first-child {
        min-width: 52px;
      }

      .cart-inner .btn {
        flex: 1;
        min-width: 0;
        width: auto;
      }
    }
  </style>
</head>

<body>
  <header class="customer-hero">
    <div class="topbar-inner" style="min-height:auto;">
      <div>
        <div class="eyebrow">Order without waiting</div>
        <h1 id="restaurantName">Loading...</h1>
        <p class="muted" id="restaurantAddress">Choose your favourites now. We will keep the pickup simple.</p>
        <p class="muted" id="pickupNote"></p>
        <div class="hero-meta">
          <span class="pill">Live counter menu</span>
          <span class="pill">Fast pickup codes</span>
        </div>
      </div>
      <div class="brand">
        <img src="/logo.png" alt="Avenzo">
        <span>AVENZO</span>
      </div>
    </div>
  </header>

  <main class="page" style="max-width:920px;">
    <section id="discoveryDock" class="discovery-dock app-panel">
      <div class="field">
        <label for="menuSearch">What would you like today?</label>
        <div class="search-input-wrap">
          <input id="menuSearch" class="input" placeholder="dosa, idli, coffee..." oninput="setSearch(this.value)">
        </div>
      </div>
      <div class="category-bar">
        <div class="category-head">
          <div>
            <strong>Browse menu</strong>
            <div class="muted" id="matchCount">Finding favourites...</div>
          </div>
          <button class="btn btn-ghost" type="button" id="categoryToggle" onclick="toggleCategories()">Hide</button>
        </div>
        <section class="tabbar surface-strip category-rail" id="categoryTabs"></section>
      </div>
    </section>
    <section class="stack" id="menu" style="margin-top:12px;"></section>
  </main>

  <div class="cart-bar">
    <div class="cart-inner">
      <div>
        <strong><span id="count">0</span> items</strong>
        <div class="muted" id="total">₹0</div>
      </div>
      <button id="orderBtn" class="btn btn-primary" onclick="openCheckout()" disabled>Continue</button>
    </div>
  </div>

  <div class="modal-backdrop" id="checkoutModal">
    <form class="modal" onsubmit="placeOrder(event)">
      <div class="modal-head row-between">
        <div>
          <h3 style="margin:0;">Almost done</h3>
          <div class="muted">Please check your items. Payment can come in the next step.</div>
        </div>
        <button type="button" class="btn btn-ghost icon-btn" onclick="closeCheckout()">X</button>
      </div>
      <div class="modal-body stack">
        <div id="cartItems" class="stack"></div>
        <div class="field">
          <label for="phone">Mobile number optional</label>
          <input id="phone" class="input" inputmode="tel" placeholder="Only if the hotel needs to reach you">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeCheckout()">Add more</button>
        <button id="placeBtn" class="btn btn-primary" type="submit">Send to kitchen</button>
      </div>
    </form>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let restaurantId = new URLSearchParams(location.search).get("restaurantId");
    const slug = window.location.pathname.startsWith("/r/")
      ? decodeURIComponent(window.location.pathname.split("/r/")[1] || "")
      : new URLSearchParams(location.search).get("slug");
    let cart = [];
    let menuData = [];
    let activeCategory = "ALL";
    let searchTerm = "";
    const collapsedCategories = new Set();

    async function init() {
      try {
        document.getElementById("menu").innerHTML = skeletonCards(6, "food");
        const restaurant = slug
          ? await request(`/restaurant/slug/${slug}`, { headers: {} })
          : await request(`/restaurant/${restaurantId}`, { headers: {} });
        restaurantId = restaurant.id;
        document.getElementById("restaurantName").textContent = restaurant.name;
        document.getElementById("restaurantAddress").textContent = restaurant.address || restaurant.locality || "Choose your favourites now. We will keep the pickup simple.";
        document.getElementById("pickupNote").textContent = restaurant.pickupNote || "";
        if (restaurant.serviceAvailable === false) {
          document.getElementById("menu").innerHTML = `
            <div class="empty">
              <h3 style="margin-bottom:8px;">Ordering will be back soon</h3>
              <p class="muted" style="margin:0;">${escapeHtml(restaurant.serviceMessage || "This restaurant is taking a short pause on Avenzo. Please check back soon.")}</p>
            </div>`;
          document.getElementById("orderBtn").disabled = true;
          return;
        }
        await loadMenu();
      } catch (err) {
        document.getElementById("menu").innerHTML = `<div class="empty">${escapeHtml(err.message || "Ordering will be back soon")}</div>`;
      }
    }

    async function loadMenu() {
      menuData = slug
        ? await request(`/menu/by-slug/${slug}`, { headers: {} })
        : await request(`/menu/${restaurantId}`, { headers: {} });
      menuData.sort((a, b) => Number(b.isAvailable) - Number(a.isAvailable));
      renderTabs();
      renderMenu();
      updateUI();
    }

    function categoryName(item) {
      return item.category?.name || "Others";
    }

    function renderTabs() {
      const categories = [...new Set(menuData.map(categoryName))].sort();
      document.getElementById("categoryTabs").innerHTML = `
        <button class="btn tab ${activeCategory === "ALL" ? "active" : ""}" onclick="setCategory('ALL')">All <span class="pill">${menuData.length}</span></button>
        ${categories.map(name => `
          <button class="btn tab ${activeCategory === name ? "active" : ""}" onclick='setCategory(${JSON.stringify(name)})'>${escapeHtml(name)} <span class="pill">${menuData.filter(item => categoryName(item) === name).length}</span></button>
        `).join("")}
      `;
    }

    function setCategory(name) {
      activeCategory = name;
      renderTabs();
      renderMenu();
      document.getElementById("menu")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function setSearch(value) {
      searchTerm = value.trim().toLowerCase();
      renderMenu();
    }

    function toggleCategories() {
      const dock = document.getElementById("discoveryDock");
      const isCollapsed = dock.classList.toggle("categories-collapsed");
      document.getElementById("categoryToggle").textContent = isCollapsed ? "Show" : "Hide";
    }

    function toggleSection(name) {
      if (collapsedCategories.has(name)) collapsedCategories.delete(name);
      else collapsedCategories.add(name);
      renderMenu();
    }

    function renderMenu() {
      let visible = activeCategory === "ALL"
        ? menuData
        : menuData.filter(item => categoryName(item) === activeCategory);

      if (searchTerm) {
        visible = visible.filter(item => [
          item.name,
          item.description,
          categoryName(item)
        ].join(" ").toLowerCase().includes(searchTerm));
      }

      const grouped = visible.reduce((acc, item) => {
        const name = categoryName(item);
        acc[name] = acc[name] || [];
        acc[name].push(item);
        return acc;
      }, {});

      const container = document.getElementById("menu");
      document.getElementById("matchCount").textContent = `${visible.length} item${visible.length === 1 ? "" : "s"} ready to browse`;
      if (!visible.length) {
        container.innerHTML = `<div class="empty">We could not find that dish here. Try another name or category.</div>`;
        return;
      }

      container.innerHTML = Object.keys(grouped).map(cat => `
        <section class="menu-section" id="section-${slugifyLocal(cat)}">
          <div class="category-heading">
            <div>
              <div class="eyebrow">${escapeHtml(cat)}</div>
              <div class="muted">${grouped[cat].length} item${grouped[cat].length === 1 ? "" : "s"}</div>
            </div>
            <button class="btn btn-ghost" type="button" onclick='toggleSection(${JSON.stringify(cat)})'>${collapsedCategories.has(cat) ? "Open" : "Close"}</button>
          </div>
          ${collapsedCategories.has(cat) ? "" : grouped[cat].map(item => itemHtml(item)).join("")}
        </section>
      `).join("");
      updateUI();
    }

    function slugifyLocal(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function itemHtml(item) {
      const disabled = !item.isAvailable;
      return `
        <article class="card card-pad menu-card">
          <img class="food-img" src="${escapeHtml(item.imageUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300")}" alt="" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1631452180519-c014fe946bc7?auto=format&fit=crop&w=900&q=80';">
          <div class="item-copy">
            <div class="row" style="flex-wrap:wrap; margin-bottom:6px;">
              <h3 style="margin:0;">${escapeHtml(item.name)}</h3>
              ${disabled ? `<span class="pill pill-danger">Out of stock</span>` : ""}
            </div>
            <p class="muted food-desc">${escapeHtml(item.description || "Freshly prepared by the restaurant.")}</p>
            <strong>${money(item.price)}</strong>
          </div>
          <button class="btn btn-primary add-btn" id="add-${item.id}" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', 1)">Add</button>
          <div class="qty-control is-hidden" id="stepper-${item.id}">
            <button class="btn btn-dark icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', -1)">-</button>
            <strong id="qty-${item.id}">0</strong>
            <button class="btn btn-primary icon-btn" ${disabled ? "disabled" : ""} onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </article>
      `;
    }

    function changeQty(id, delta) {
      const itemData = menuData.find(m => m.id === id);
      if (!itemData || !itemData.isAvailable) return;

      let item = cart.find(i => i.menuId === id);
      if (!item && delta > 0) {
        item = { menuId: id, quantity: 0 };
        cart.push(item);
      }

      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) cart = cart.filter(i => i.menuId !== id);
      }

      updateUI();
    }

    function updateUI() {
      let totalItems = 0;
      let totalPrice = 0;

      menuData.forEach(item => {
        const found = cart.find(i => i.menuId === item.id);
        const qty = found?.quantity || 0;
        const qtyEl = document.getElementById(`qty-${item.id}`);
        if (qtyEl) qtyEl.textContent = qty;
        document.getElementById(`add-${item.id}`)?.classList.toggle("is-hidden", qty > 0);
        document.getElementById(`stepper-${item.id}`)?.classList.toggle("is-hidden", qty === 0);
      });

      cart.forEach(i => {
        const data = menuData.find(m => m.id === i.menuId);
        if (!data) return;
        totalItems += i.quantity;
        totalPrice += i.quantity * data.price;
      });

      document.getElementById("count").textContent = totalItems;
      document.getElementById("total").textContent = money(totalPrice);
      document.getElementById("orderBtn").disabled = totalItems === 0;
      document.querySelector(".cart-bar")?.classList.toggle("has-items", totalItems > 0);
    }

    function openCheckout() {
      if (!cart.length) return toast("Your cart is empty");
      document.getElementById("cartItems").innerHTML = cart.map(i => {
        const item = menuData.find(m => m.id === i.menuId);
        return `
          <div class="row-between card card-pad">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <div class="muted">${i.quantity} x ${money(item.price)}</div>
            </div>
            <strong>${money(item.price * i.quantity)}</strong>
          </div>
        `;
      }).join("");
      document.getElementById("checkoutModal").classList.add("open");
    }

    function closeCheckout() {
      document.getElementById("checkoutModal").classList.remove("open");
    }

    async function placeOrder(event) {
      event.preventDefault();
      const btn = document.getElementById("placeBtn");
      setLoading(btn, true, "Placing...");

      try {
        const data = await request("/order", {
          method: "POST",
          body: JSON.stringify({
            restaurantId,
            sessionId: "web-" + Date.now(),
            phone: document.getElementById("phone").value.trim() || null,
            items: cart
          })
        });
        window.location.href = `/track/${data.orderId}`;
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    init();
  </script>
</body>

</html>
