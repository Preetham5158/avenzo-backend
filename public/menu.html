<!DOCTYPE html>
<html>
<head>
  <title>Avenzo Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .menu-item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .info {
      max-width: 60%;
    }

    .name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .price {
      color: #555;
    }

    .controls {
      display: flex;
      align-items: center;
    }

    .btn {
      background: black;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .qty {
      margin: 0 10px;
      font-weight: bold;
    }

    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-btn {
      background: white;
      color: black;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🍽 Avenzo Menu</header>

<div class="container" id="menu"></div>

<div class="cart-bar">
  <div>
    🛒 <span id="count">0</span> items<br>
    ₹ <span id="total">0</span>
  </div>
  <button class="cart-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
const API = "https://avenzo.app";

const params = new URLSearchParams(window.location.search);
const restaurantId = params.get("restaurantId");

if (!restaurantId) {
  alert("Invalid QR");
}

let cart = [];

async function loadMenu() {
  const res = await fetch(`${API}/menu/${restaurantId}`);
  const data = await res.json();

  const container = document.getElementById("menu");

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "menu-item";

    div.innerHTML = `
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="price">₹${item.price}</div>
      </div>
      <div class="controls">
        <button class="btn" onclick="changeQty('${item.id}', -1)">−</button>
        <span class="qty" id="qty-${item.id}">0</span>
        <button class="btn" onclick="changeQty('${item.id}', 1)">+</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function changeQty(menuId, delta) {
  let item = cart.find(i => i.menuId === menuId);

  if (!item && delta > 0) {
    item = { menuId, quantity: 0 };
    cart.push(item);
  }

  if (item) {
    item.quantity += delta;

    if (item.quantity <= 0) {
      cart = cart.filter(i => i.menuId !== menuId);
    }
  }

  updateUI();
}

function updateUI() {
  let totalItems = 0;
  let totalPrice = 0;

  cart.forEach(item => {
    const qtyEl = document.getElementById(`qty-${item.menuId}`);
    if (qtyEl) qtyEl.innerText = item.quantity;

    totalItems += item.quantity;
  });

  document.getElementById("count").innerText = totalItems;

  // calculate price again from DOM (simple approach)
  document.querySelectorAll(".menu-item").forEach(div => {
    const id = div.querySelector(".controls button").getAttribute("onclick").split("'")[1];
    const price = parseFloat(div.querySelector(".price").innerText.replace("₹",""));
    const item = cart.find(i => i.menuId === id);
    if (item) totalPrice += item.quantity * price;
  });

  document.getElementById("total").innerText = totalPrice;
}

async function placeOrder() {
  if (cart.length === 0) {
    alert("Cart empty");
    return;
  }

  const res = await fetch(`${API}/order`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      restaurantId,
      sessionId: "web-" + Date.now(),
      phone: null,
      items: cart
    })
  });

  const data = await res.json();

  window.location.href = `${API}/track/${data.orderId}`;
}

loadMenu();
</script>

</body>
</html>
