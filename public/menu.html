<!DOCTYPE html>
<html>

<head>
  <title>Avenzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f6f7fb;
    }

    /* ✅ FIX: Sticky header */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      padding-bottom: 90px; /* keep */
    }

    .category {
      margin-top: 25px;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      display: flex;
      gap: 12px;
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      background: #eee;
    }

    .info {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      color: #666;
    }

    .price {
      margin-top: 5px;
    }

    .controls {
      display: flex;
      align-items: center;
    }

    /* ✅ FIX: Better + / - UI */
    .btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: #111;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: #333;
    }

    .qty {
      margin: 0 8px;
      font-weight: bold;
      min-width: 20px;
      text-align: center;
    }

    .disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .out {
      color: red;
      font-size: 12px;
      margin-top: 5px;
    }

    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-btn {
      background: white;
      color: black;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header id="restaurantName">Loading...</header>

<div class="container" id="menu"></div>

<div class="cart-bar">
  <div>
    🛒 <span id="count">0</span> items<br>
    ₹ <span id="total">0</span>
  </div>
  <button id="orderBtn" class="cart-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
const API = "https://avenzo.app";
const restaurantId = new URLSearchParams(location.search).get("restaurantId");

let cart = [];
let menuData = [];

async function loadRestaurant() {
  const res = await fetch(`${API}/restaurant/${restaurantId}`);
  const data = await res.json();
  document.getElementById("restaurantName").innerText = data.name;
}

async function loadMenu() {
  const res = await fetch(`${API}/menu/${restaurantId}`);
  menuData = await res.json();

  menuData.sort((a, b) => b.isAvailable - a.isAvailable);

  const grouped = {};
  menuData.forEach(i => {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.keys(grouped).forEach(cat => {
    container.innerHTML += `<div class="category">${cat}</div>`;

    grouped[cat].forEach(item => {
      const disabled = !item.isAvailable;

      container.innerHTML += `
        <div class="card">
          <img class="img" src="${item.imageUrl || 'https://via.placeholder.com/80'}"/>

          <div class="info">
            <div class="name">${item.name}</div>
            <div class="desc">${item.description || ''}</div>
            <div class="price">₹${item.price}</div>
            ${disabled ? '<div class="out">Out of stock</div>' : ''}
          </div>

          <div class="controls">
            <button class="btn ${disabled ? 'disabled' : ''}" onclick="${disabled ? '' : 'changeQty(\'' + item.id + '\', -1)'}">−</button>
            <span class="qty" id="qty-${item.id}">0</span>
            <button class="btn ${disabled ? 'disabled' : ''}" onclick="${disabled ? '' : 'changeQty(\'' + item.id + '\', 1)'}">+</button>
          </div>
        </div>
      `;
    });
  });
}

function changeQty(id, delta) {
  const itemData = menuData.find(m => m.id === id);
  if (!itemData || !itemData.isAvailable) return;

  let item = cart.find(i => i.menuId === id);

  if (!item && delta > 0) {
    item = { menuId: id, quantity: 0 };
    cart.push(item);
  }

  if (item) {
    item.quantity += delta;
    if (item.quantity <= 0) {
      cart = cart.filter(i => i.menuId !== id);
    }
  }

  updateUI();
}

function updateUI() {
  let totalItems = 0, totalPrice = 0;

  cart.forEach(i => {
    const data = menuData.find(m => m.id === i.menuId);
    totalItems += i.quantity;
    totalPrice += i.quantity * data.price;

    const el = document.getElementById(`qty-${i.menuId}`);
    if (el) el.innerText = i.quantity;
  });

  document.getElementById("count").innerText = totalItems;
  document.getElementById("total").innerText = totalPrice;
}

async function placeOrder() {
  if (cart.length === 0) return alert("Cart empty");

  const btn = document.getElementById("orderBtn");
  btn.disabled = true;
  btn.innerText = "Placing...";

  try {
    const res = await fetch(`${API}/order`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        restaurantId,
        sessionId: "web-" + Date.now(),
        items: cart
      })
    });

    const data = await res.json();
    window.location.href = `${API}/track/${data.orderId}`;

  } catch {
    btn.disabled = false;
    btn.innerText = "Place Order";
    alert("Order failed");
  }
}

loadRestaurant();
loadMenu();
</script>

</body>
</html>
